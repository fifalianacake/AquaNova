<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <title>Saisie mouvement</title>
</head>

<body>

    <h1>Saisie mouvement</h1>

    <p th:if="${erreur}" th:text="${erreur}"></p>

    <form method="post"
        th:action="${mouvement != null} ? @{/stocks/mouvements/{id}/edit(id=${mouvement.id})} : @{/stocks/mouvements}">

        <label>Date:
            <input type="date" name="date" th:value="${mouvement != null} ? ${mouvement.dateMouvement} : ${null}"
                required>
        </label>
        <br>

        <label>Aliment:
            <select name="alimentId" required>
                <option th:each="a : ${aliments}" th:value="${a.id}" th:text="${a.nom}"
                    th:selected="${mouvement != null and mouvement.aliment.id == a.id}"></option>
            </select>
        </label>
        <br>

        <label>Type:
            <select name="type" required>
                <option value="ENTREE"
                    th:selected="${mouvement != null and mouvement.typeMouvement.name() == 'ENTREE'}">Entrée</option>
                <option value="SORTIE"
                    th:selected="${mouvement != null and mouvement.typeMouvement.name() == 'SORTIE'}">Sortie</option>
                <option value="PERTE" th:selected="${mouvement != null and mouvement.typeMouvement.name() == 'PERTE'}">
                    Perte</option>
            </select>
        </label>
        <br>

        <label>Montant (kg):
            <input type="number" step="0.01" name="montant"
                th:value="${mouvement != null} ? ${mouvement.quantiteKg} : ${null}" required>
        </label>
        <br>

        <label>Commentaire:
            <textarea name="commentaire" th:text="${mouvement != null} ? ${mouvement.commentaire} : ${''}"></textarea>
        </label>
        <br>

        <button type="submit">Enregistrer</button>
    </form>

    <a th:href="@{/stocks/mouvements}">Retour</a>

</body>

</html>
