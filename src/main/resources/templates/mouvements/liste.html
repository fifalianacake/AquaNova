<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <title>Liste mouvements de stocks</title>
</head>

<body>

    <h1>Liste mouvements de stocks</h1>

    <p th:if="${erreur}" th:text="${erreur}"></p>
    <p th:if="${succes}" th:text="${succes}"></p>

    <form method="get" th:action="@{/stocks/mouvements}">
        <label>Id: <input type="number" name="id" th:value="${id}"></label>
        <label>Date début: <input type="date" name="dateDebut" th:value="${dateDebut}"></label>
        <label>Date fin: <input type="date" name="dateFin" th:value="${dateFin}"></label>
        <label>Aliment:
            <select name="alimentId">
                <option value="">Tous</option>
                <option th:each="a : ${aliments}" th:value="${a.id}" th:text="${a.nom}"
                    th:selected="${a.id == alimentId}"></option>
            </select>
        </label>
        <label>Type:
            <select name="type">
                <option value="">Tous</option>
                <option value="ENTREE" th:selected="${type == 'ENTREE'}">Entrée</option>
                <option value="SORTIE" th:selected="${type == 'SORTIE'}">Sortie</option>
                <option value="PERTE" th:selected="${type == 'PERTE'}">Perte</option>
            </select>
        </label>
        <button type="submit">Rechercher</button>
    </form>

    <a th:href="@{/stocks/mouvements/new}">Nouveau mouvement</a>

    <table border="1">
        <tr>
            <th>Id</th>
            <th>Date</th>
            <th>Aliment</th>
            <th>Type</th>
            <th>Montant</th>
        </tr>
        <tr th:each="m : ${mouvements}">
            <td><a th:href="@{/stocks/mouvements/{id}(id=${m.id})}" th:text="${m.id}"></a></td>
            <td th:text="${m.dateMouvement}"></td>
            <td th:text="${m.aliment.nom}"></td>
            <td th:text="${m.typeMouvement}"></td>
            <td th:text="${m.quantiteKg}"></td>
        </tr>
    </table>

    <a th:href="@{/stocks}">Retour</a>

</body>

</html>
