<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>AquaNova - Saisie Traitement</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 20px; background-color: #f4f6f9; }
        .form-container { background: white; max-width: 500px; margin: 30px auto; padding: 25px; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        .form-group { margin-bottom: 15px; }
        .form-group label { display: block; margin-bottom: 5px; font-weight: bold; }
        .form-group input, .form-group select, .form-group textarea { width: 100%; padding: 8px; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box; }
        .btn-box { display: flex; justify-content: space-between; margin-top: 20px; }
        .btn { padding: 10px 20px; border: none; border-radius: 4px; cursor: pointer; text-decoration: none; }
        .btn-primary { background-color: #28a745; color: white; }
        .btn-secondary { background-color: #6c757d; color: white; }
    </style>
</head>
<body>

    <div class="form-container">
        <h2>Saisie de Traitement de l'Eau</h2>
        <form id="traitementForm" onsubmit="enregistrer(event)">
            
            <div class="form-group">
                <label>Bassin *</label>
                <select id="bassin" required>
                    <option value="">-- Choisir un bassin --</option>
                </select>
            </div>

            <div class="form-group">
                <label>Type de traitement *</label>
                <select id="typeTraitement" required>
                    <option value="">-- Sélectionner un type --</option>
                </select>
            </div>

            <div class="form-group">
                <label>Date du traitement *</label>
                <input type="date" id="dateTraitement" required>
            </div>

            <div class="form-group">
                <label>Détails techniques *</label>
                <textarea id="detail" rows="3" placeholder="Ex: Ajustement suite à baisse de pH" required></textarea>
            </div>

            <div class="form-group">
                <label>Observations complémentaires</label>
                <textarea id="observation" rows="2" placeholder="Remarques éventuelles..."></textarea>
            </div>

            <div class="btn-box">
                <a href="/traitements-eau" class="btn btn-secondary">Retour</a>
                <button type="submit" class="btn btn-primary">Enregistrer</button>
            </div>
        </form>
    </div>

    <script>
        document.addEventListener("DOMContentLoaded", () => {
            document.getElementById('dateTraitement').valueAsDate = new Date();

            // Remplissage des référentiels obligatoires
            fetch('/api/production/types-traitements-eau').then(r => r.json()).then(data => {
                data.forEach(t => document.getElementById('typeTraitement').innerHTML += `<option value="${t.id}">${t.libelle}</option>`);
            });
            fetch('/api/bassin').then(r => r.json()).then(data => {
                data.forEach(b => document.getElementById('bassin').innerHTML += `<option value="${b.id}">${b.nom}</option>`);
            });
        });

        function enregistrer(e) {
            e.preventDefault();
            
            const payload = {
                bassin: { id: document.getElementById('bassin').value },
                typeTraitementEau: { id: document.getElementById('typeTraitement').value },
                dateTraitement: document.getElementById('dateTraitement').value,
                detail: document.getElementById('detail').value,
                observation: document.getElementById('observation').value,
                utilisateur: { id: 1 } // Id de l'utilisateur connecté statique pour l'instant
            };

            fetch('/api/production/traitements-eau', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(payload)
            }).then(res => {
                if(res.ok) { window.location.href = "/traitements-eau"; }
                else { alert("Erreur lors de la validation du traitement."); }
            });
        }
    </script>
</body>
</html>
