<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <title>Fiche état de stock</title>
</head>

<body>

    <h1>Fiche état de stock</h1>

    <p th:if="${erreur}" th:text="${erreur}"></p>

    <p>Date: <span th:text="${date}"></span></p>
    <p>Nom: <span th:text="${aliment.nom}"></span></p>
    <p>Stock: <span th:text="${stock}"></span> kg</p>
    <p>Seuil: <span th:text="${aliment.seuilAlerteKg}"></span> kg</p>
    <p>Alerte: <span th:text="${alerte} ? 'OUI' : 'NON'"></span></p>

    <h2>Historique des mouvements récents</h2>
    <table border="1">
        <tr>
            <th>Date</th>
            <th>Type</th>
            <th>Montant</th>
            <th>Commentaire</th>
        </tr>
        <tr th:each="m : ${historique}">
            <td th:text="${m.dateMouvement}"></td>
            <td th:text="${m.typeMouvement}"></td>
            <td th:text="${m.quantiteKg}"></td>
            <td th:text="${m.commentaire}"></td>
        </tr>
    </table>

    <form method="get" th:action="@{/aliments/{id}/edit(id=${aliment.id})}">
        <button type="submit">Modifier</button>
    </form>

    <form method="post" th:action="@{/aliments/{id}/delete(id=${aliment.id})}">
        <button type="submit">Supprimer</button>
    </form>

    <a th:href="@{/stocks(date=${date})}">Retour</a>

</body>

</html>
