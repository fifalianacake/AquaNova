<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="fr">
<head>
    <meta charset="UTF-8">
    <title>AquaNova - Saisie de Mouvement</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 20px; background-color: #f4f6f9; }
        .form-container { background: white; max-width: 500px; margin: 40px auto; padding: 30px; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        .form-group { margin-bottom: 20px; }
        .form-group label { display: block; margin-bottom: 8px; font-weight: bold; }
        .form-group input, .form-group select, .form-group textarea { width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box; }
        .btn-box { display: flex; justify-content: space-between; margin-top: 25px; }
        .btn { padding: 10px 20px; border: none; border-radius: 4px; cursor: pointer; text-decoration: none; }
        .btn-primary { background-color: #28a745; color: white; }
        .btn-secondary { background-color: #6c757d; color: white; }
        .alert-error { background-color: #f8d7da; color: #721c24; padding: 12px; border-radius: 4px; margin-bottom: 20px; border: 1px solid #f5c6cb; }
    </style>
</head>
<body>

    <div class="form-container">
        <h2>Saisie de Mouvement de Stock</h2>
        
        <div class="alert-error" th:if="${erreur}" th:text="${erreur}">
            Erreur de validation du stock.
        </div>

        <form th:action="@{/stocks/mouvements}" th:object="${mouvement}" method="post">
            <div class="form-group">
                <label>Date du mouvement</label>
                <input type="date" th:field="*{dateMouvement}" required>
            </div>

            <div class="form-group">
                <label>Aliment</label>
                <select th:field="*{aliment.id}" required>
                    <option value="">-- Choisir un aliment --</option>
                    <option th:each="al : ${aliments}" th:value="${al.id}" th:text="${al.nom}"></option>
                </select>
            </div>

            <div class="form-group">
                <label>Type de mouvement</label>
                <select th:field="*{typeMouvement}" required>
                    <option value="ENTREE">ENTREE (Achat / Approvisionnement)</option>
                    <option value="SORTIE">SORTIE (Utilisation externe / Ration)</option>
                    <option value="PERTE">PERTE (Aliment avarié / Périmé)</option>
                </select>
            </div>

            <div class="form-group">
                <label>Quantité (en kg)</label>
                <input type="number" step="0.01" th:field="*{quantite}" placeholder="Ex: 50.5" required>
            </div>

            <div class="form-group">
                <label>Commentaire / Note</label>
                <textarea th:field="*{commentaire}" rows="3" placeholder="Détails du mouvement..."></textarea>
            </div>

            <div class="btn-box">
                <a th:href="@{/stocks/mouvements}" class="btn btn-secondary">Retour</a>
                <button type="submit" class="btn btn-primary">Enregistrer</button>
            </div>
        </form>
    </div>

</body>
</html>
