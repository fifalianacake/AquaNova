<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="fr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>AquaNova - Inscription</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"/>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet"/>
    <link rel="preconnect" href="https://fonts.googleapis.com"/>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@500;600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet"/>
    <link th:href="@{/css/aquanova.css}" rel="stylesheet"/>
</head>

<body>

<div class="login-page">
    <div class="card login-card">
        <div class="login-head">
            <span class="brand-badge"><i class="bi bi-water"></i></span>
            <h3 class="mt-3 mb-1">Créer un compte</h3>
            <p class="text-secondary mb-0">Rejoignez la plateforme AquaNova</p>
        </div>
        <div class="card-body p-4">
            <div th:if="${error}" class="alert alert-danger py-2" th:text="${error}"></div>

            <form th:action="@{/register}" method="post">
                <div class="mb-3">
                    <label class="form-label" for="name">Nom</label>
                    <input class="form-control" type="text" id="name" name="name" th:value="${name}" required>
                </div>

                <div class="mb-3">
                    <label class="form-label" for="lastname">Prénom</label>
                    <input class="form-control" type="text" id="lastname" name="lastname" th:value="${lastname}" required>
                </div>

                <div class="mb-3">
                    <label class="form-label" for="email">Adresse e-mail</label>
                    <input class="form-control" type="email" id="email" name="email" th:value="${email}" placeholder="vous@ferme.mg" required>
                </div>

                <div class="mb-3">
                    <label class="form-label" for="password">Mot de passe</label>
                    <input class="form-control" type="password" id="password" name="password" minlength="6" required>
                </div>

                <div class="mb-4">
                    <label class="form-label" for="confirmation">Confirmer le mot de passe</label>
                    <input class="form-control" type="password" id="confirmation" name="confirmation" minlength="6" required>
                </div>

                <button type="submit" class="btn btn-primary w-100 py-2">
                    Créer mon compte
                </button>
            </form>

            <p class="text-center text-secondary small mt-3 mb-0">
                Déjà un compte ?
                <a th:href="@{/login}">Se connecter</a>
            </p>
        </div>
    </div>
</div>

</body>

</html>
