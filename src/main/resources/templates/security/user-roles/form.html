<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" th:replace="~{fragments/layout :: layout(~{::title}, ~{::main})}">
<head>
    <title>Affecter un Rôle</title>
</head>
<body>
<main>
    <h1>Affecter un rôle à un utilisateur</h1>

    <p th:if="${error}" th:text="${error}" style="color: red;"></p>

    <form th:action="@{/user-roles}" th:object="${userRole}" method="post">

        <input type="hidden" th:field="*{id}" />

        <label class="form-label" for="user">Choisir l'utilisateur :</label>
        <select class="form-select" id="user" th:field="*{user.id}" required>
            <option value="">-- Selectionner un utilisateur --</option>
            <option th:each="u : ${users}" th:value="${u.id}"
                th:text="${u.name} + ' ' + ${u.lastname} + ' (' + ${u.email} + ')'"></option>
        </select>
        <br><br>

        <label class="form-label" for="role">Choisir le rôle :</label>
        <select class="form-select" id="role" th:field="*{role.id}" required>
            <option value="">-- Selectionner un rôle --</option>
            <option th:each="r : ${roles}" th:value="${r.id}" th:text="${r.name}"></option>
        </select>
        <br><br>

        <button class="btn btn-primary" type="submit">Lier le rôle</button>
    </form>

    <br>
    <a class="btn btn-secondary" th:href="@{/user-roles}">Annuler et retourner à la liste</a>
</main>
</body>
</html>
