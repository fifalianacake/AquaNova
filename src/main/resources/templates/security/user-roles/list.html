<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" th:replace="~{fragments/layout :: layout(~{::title}, ~{::main})}">
<head>
    <title>Affectations des Rôles</title>
</head>
<body>
<main>
    <h1>Liste des Rôles par Utilisateur</h1>

    <a th:href="@{/user-roles/new}">Affecter un rôle à un utilisateur</a>
    <br><br>

    <table class="table table-hover align-middle">
        <thead>
            <tr>
                <th>ID</th>
                <th>Utilisateur (Email)</th>
                <th>Rôle Assigne</th>
                <th>Actions</th>
            </tr>
        </thead>
        <tbody>
            <tr th:each="ur : ${userRoles}">
                <td th:text="${ur.id}">1</td>
                <td th:text="${ur.user.email}">user@exemple.com</td>
                <td th:text="${ur.role.name}">ROLE_USER</td>
                <td>
                    <a th:href="@{/user-roles/{id}/delete(id=${ur.id})}"
                        onclick="return confirm('Retirer ce rôle à l\'utilisateur ?');">
                        Retirer le rôle
                    </a>
                </td>
            </tr>
            <tr th:if="${#lists.isEmpty(userRoles)}">
                <td colspan="4" style="text-align: center;">Aucune affectation trouvee.</td>
            </tr>
        </tbody>
    </table>

    <br>
    <a class="btn btn-secondary" th:href="@{/users}">Retour à la liste des utilisateurs</a>
</main>
</body>
</html>
