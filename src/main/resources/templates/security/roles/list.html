<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" th:replace="~{fragments/layout :: layout(~{::title}, ~{::main})}">
<head>
    <title>Liste des Rôles</title>
</head>
<body>
<main>
    <h1>Liste des Rôles</h1>

    <p th:if="${error}" th:text="${error}" style="color: red;"></p>

    <a class="btn btn-primary" th:href="@{/roles/new}"> Ajouter un nouveau rôle</a>
    <br><br>

    <table class="table table-hover align-middle">
        <thead>
            <tr>
                <th>ID</th>
                <th>Nom du Rôle</th>
                <th>Actions</th>
            </tr>
        </thead>
        <tbody>
            <tr th:each="role : ${roles}">
                <td th:text="${role.id}">1</td>
                <td th:text="${role.name}">ROLE_ADMIN</td>
                <td>
                    <a class="btn btn-sm btn-outline-danger" th:href="@{/roles/{id}/delete(id=${role.id})}"
                        onclick="return confirm('Êtes-vous sur de vouloir supprimer ce rôle ?');">
                        Supprimer
                    </a>
                </td>
            </tr>
            <tr th:if="${#lists.isEmpty(roles)}">
                <td colspan="3" style="text-align: center;">Aucun rôle trouve.</td>
            </tr>
        </tbody>
    </table>

    <br>
    <a class="btn btn-secondary" th:href="@{/users}">Retour à la liste des utilisateurs</a>
</main>
</body>
</html>
