<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" th:replace="~{fragments/layout :: layout(~{::title}, ~{::main})}">
<head>
    <title>Liste des Rôles</title>
</head>
<body>
<main>

<div class="toolbar">
    <a class="btn btn-primary" th:href="@{/roles/new}"><i class="bi bi-plus-lg"></i> Ajouter un rôle</a>
    <a class="btn btn-outline-primary" th:href="@{/users}">Retour à la liste des utilisateurs</a>
</div>

<p class="error" th:if="${error}" th:text="${error}"></p>

<div class="panel">
    <div class="panel-header">
        <h5>Liste des rôles</h5>
        <span class="result-count" th:text="${#lists.size(roles)} + ' rôle(s)'"></span>
    </div>

    <div class="table-responsive">
        <table class="table table-hover align-middle">
            <thead>
            <tr>
                <th>ID</th>
                <th>Nom du rôle</th>
                <th class="text-end">Actions</th>
            </tr>
            </thead>
            <tbody>
            <tr th:each="role : ${roles}">
                <td th:text="${role.id}"></td>
                <td class="fw-semibold" th:text="${role.name}"></td>
                <td class="text-end">
                    <a class="btn btn-sm btn-outline-danger" th:href="@{/roles/{id}/delete(id=${role.id})}" title="Supprimer"
                       onclick="return confirm('Êtes-vous sur de vouloir supprimer ce rôle ?');"><i class="bi bi-trash3"></i></a>
                </td>
            </tr>
            <tr th:if="${#lists.isEmpty(roles)}">
                <td colspan="3" class="text-center text-secondary py-4">Aucun rôle trouve.</td>
            </tr>
            </tbody>
        </table>
    </div>
</div>
</main>
</body>
</html>
