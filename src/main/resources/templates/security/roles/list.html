<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <title>Liste des Rôles</title>
</head>

<body>

    <h1>Liste des Rôles</h1>

    <a th:href="@{/roles/new}"> Ajouter un nouveau rôle</a>
    <br><br>

    <table border="1">
        <thead>
            <tr>
                <th>ID</th>
                <th>Nom du Rôle</th>
                <th>Actions</th>
            </tr>
        </thead>
        <tbody>
            <tr th:each="role : ${roles}">
                <td th:text="${role.id}">1</td>
                <td th:text="${role.name}">ROLE_ADMIN</td>
                <td>
                    <a th:href="@{/roles/delete/{id}(id=${role.id})}"
                        onclick="return confirm('Êtes-vous sur de vouloir supprimer ce rôle ?');">
                        Supprimer
                    </a>
                </td>
            </tr>
            <tr th:if="${#lists.isEmpty(roles)}">
                <td colspan="3" style="text-align: center;">Aucun rôle trouve.</td>
            </tr>
        </tbody>
    </table>

    <br>
    <a th:href="@{/users}">Retour à la liste des utilisateurs</a>

</body>

</html>
