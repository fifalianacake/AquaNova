<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" th:replace="~{fragments/layout :: layout(~{::title}, ~{::main})}">
<head>
    <title>AquaNova - Formulaire d'ajout d'utilisateur</title>
</head>
<body>
<main>
    <h2>Formulaire d'ajout d'utilisateur</h2>

    <div class="error" th:if="${error}" th:text="${error}"></div>

    <form class="form-panel" th:action="@{/users}" th:object="${user}" method="post">
        <div class="mb-3">
            <label class="form-label" for="name">Nom</label>
            <input class="form-control" type="text" id="name" th:field="*{name}" required>
        </div>

        <div class="mb-3">
            <label class="form-label" for="lastname">Prenom</label>
            <input class="form-control" type="text" id="lastname" th:field="*{lastname}" required>
        </div>

        <div class="mb-3">
            <label class="form-label" for="email">Email</label>
            <input class="form-control" type="email" id="email" th:field="*{email}" required>
        </div>

        <div class="mb-3">
            <label class="form-label" for="password">Mot de passe</label>
            <input class="form-control" type="password" id="password" th:field="*{password}" required>
        </div>

        <div class="mb-3">
            <label class="form-label" for="dateHired">Date d'embauche</label>
            <input class="form-control" type="date" id="dateHired" th:field="*{dateHired}" required>
        </div>

        <div class="d-flex gap-2 mt-4">
            <button class="btn btn-primary" type="submit">Enregistrer</button>
            <a class="btn btn-secondary" th:href="@{/users}">Retour à la liste</a>
        </div>
    </form>
</main>
</body>
</html>
