<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" th:replace="~{fragments/layout :: layout(~{::title}, ~{::main})}">
<head>
    <title>Liste des Utilisateurs</title>
</head>
<body>
<main>
    <h1>Liste des Utilisateurs</h1>

    <p th:if="${error}" th:text="${error}" style="color: red;"></p>

    <a class="btn btn-primary" th:href="@{/users/new}">Ajouter un utilisateur</a> |
    <a th:href="@{/roles}">Gerer les rôles</a>
    <br><br>

    <table class="table table-hover align-middle">
        <thead>
            <tr>
                <th>ID</th>
                <th>Nom</th>
                <th>Prenom</th>
                <th>Email</th>
                <th>Date d'embauche</th>
                <th>Actions</th>
            </tr>
        </thead>
        <tbody>
            <tr th:each="user : ${users}">
                <td th:text="${user.id}">1</td>
                <td th:text="${user.name}">Nom</td>
                <td th:text="${user.lastname}">Prenom</td>
                <td th:text="${user.email}">email@exemple.com</td>
                <td th:text="${user.dateHired}">2026-06-18</td>
                <td>
                    <a class="btn btn-sm btn-outline-danger" th:href="@{/users/{id}/delete(id=${user.id})}"
                        onclick="return confirm('Supprimer cet utilisateur ?');">
                        Supprimer
                    </a>
                </td>
            </tr>
            <tr th:if="${#lists.isEmpty(users)}">
                <td colspan="6" style="text-align: center;">Aucun utilisateur trouve.</td>
            </tr>
        </tbody>
    </table>
</main>
</body>
</html>
