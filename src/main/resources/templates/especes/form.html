<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" th:replace="~{fragments/layout :: layout(~{::title}, ~{::main})}">
<head>
    <title>AquaNova - Form Espece</title>
</head>
<body>
<main>
    <h2>Form Espece</h2>

    <div class="error" th:if="${error}" th:text="${error}"></div>

    <form class="form-panel" action="/especes" method="post" th:object="${espece}">
        <input type="hidden" th:field="*{id}" />

        <div class="mb-3">
            <label class="form-label" for="nom">Nom</label>
            <input class="form-control" type="text" id="nom" th:field="*{nom}" />
        </div>

        <div class="mb-3">
            <label class="form-label" for="poidsCibleMoyen">Poids cible (g)</label>
            <input class="form-control" type="number" step="0.01" id="poidsCibleMoyen" th:field="*{poidsCibleMoyen}" />
        </div>

        <div class="mb-3">
            <label class="form-label" for="image">Image</label>
            <input class="form-control" type="text" id="image" th:field="*{image}" />
        </div>

        <div class="d-flex gap-2 mt-4">
            <button class="btn btn-primary" type="submit">Enregistrer</button>
            <a class="btn btn-secondary" th:href="@{/especes}">Retour à la liste</a>
        </div>
    </form>
</main>
</body>
</html>
