<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" th:replace="~{fragments/layout :: layout(~{::title}, ~{::main})}">
<head>
    <title>AquaNova - Liste des espèces</title>
</head>
<body>
<main>
<h2>Liste des espèces</h2>

<a class="btn btn-primary" href="/especes/new">Ajouter</a>

<table class="table table-hover align-middle">
    <tr>
        <th>ID</th>
        <th>Nom</th>
        <th>Poids</th>
        <th>Image</th>
        <th>Actions</th>
    </tr>

    <tr th:each="e : ${especes}">
        <td th:text="${e.id}"></td>
        <td th:text="${e.nom}"></td>
        <td th:text="${e.poidsCibleMoyen}"></td>
        <td th:text="${e.image}"></td>
        <td>
            <a class="btn btn-sm btn-outline-primary" th:href="@{/especes/{id}(id=${e.id})}">Edit</a>
            <a class="btn btn-sm btn-outline-danger" th:href="@{/especes/{id}/delete(id=${e.id})}">Delete</a>
        </td>
    </tr>
</table>
</main>
</body>
</html>
