<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" th:replace="~{fragments/layout :: layout(~{::title}, ~{::main})}">
<head>
    <title>AquaNova - Fiche type de traitement eau</title>
</head>
<body>
<main>
    <h2>Type de traitement eau</h2>

    <section>
        <div>
            <span>ID</span>
            <span th:text="${typeTraitement.id}"></span>
        </div>

        <div>
            <span>Libellé</span>
            <span th:text="${typeTraitement.libelle}"></span>
        </div>

        <div>
            <span>Description</span>
            <span th:text="${typeTraitement.description ?: '-'}"></span>
        </div>

        <div>
            <a class="btn btn-secondary" th:href="@{/types-traitements-eau}">Retour</a>
            <a class="btn btn-sm btn-outline-primary" th:href="@{/types-traitements-eau/{id}/edit(id=${typeTraitement.id})}">Modifier</a>
            <form th:action="@{/types-traitements-eau/{id}/delete(id=${typeTraitement.id})}"
                  method="post"
                  onsubmit="return confirm('Supprimer ce type de traitement ?')">
                <button class="btn btn-danger" type="submit">Supprimer</button>
            </form>
        </div>
    </section>
</main>
</body>
</html>
