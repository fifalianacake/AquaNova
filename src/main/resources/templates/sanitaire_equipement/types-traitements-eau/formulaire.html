<!DOCTYPE html>
<html lang="fr" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>AquaNova - Type de traitement eau</title>
</head>
<body>
    <h2 th:text="${typeTraitement.id != null} ? 'Modifier un type de traitement' : 'Nouveau type de traitement'">
        Nouveau type de traitement
    </h2>

    <section>
        <div th:if="${erreur}" th:text="${erreur}"></div>

        <form th:action="${typeTraitement.id == null} ? @{/types-traitements-eau} : @{/types-traitements-eau/{id}(id=${typeTraitement.id})}"
              th:object="${typeTraitement}"
              method="post">
            <label for="libelle">Libellé *</label>
            <input id="libelle" type="text" th:field="*{libelle}" required>

            <label for="description">Description</label>
            <textarea id="description" th:field="*{description}" rows="5"></textarea>

            <div>
                <button type="submit"
                        th:text="${typeTraitement.id != null} ? 'Modifier' : 'Créer'">
                    Créer
                </button>
                <a th:href="@{/types-traitements-eau}">Retour</a>
            </div>
        </form>
    </section>
</body>
</html>
