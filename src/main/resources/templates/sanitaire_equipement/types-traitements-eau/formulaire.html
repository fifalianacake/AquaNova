<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" th:replace="~{fragments/layout :: layout(~{::title}, ~{::main})}">
<head>
    <title>AquaNova - Type de traitement eau</title>
</head>
<body>
<main>
    <h2 th:text="${typeTraitement.id != null} ? 'Modifier un type de traitement' : 'Nouveau type de traitement'">
        Nouveau type de traitement
    </h2>

    <section>
        <div th:if="${erreur}" th:text="${erreur}"></div>

        <form th:action="${typeTraitement.id == null} ? @{/types-traitements-eau} : @{/types-traitements-eau/{id}(id=${typeTraitement.id})}"
              th:object="${typeTraitement}"
              method="post">
            <label class="form-label" for="libelle">Libellé *</label>
            <input class="form-control" id="libelle" type="text" th:field="*{libelle}" required>

            <label class="form-label" for="description">Description</label>
            <textarea class="form-control" id="description" th:field="*{description}" rows="5"></textarea>

            <div>
                <button class="btn btn-primary" type="submit"
                        th:text="${typeTraitement.id != null} ? 'Modifier' : 'Créer'">
                    Créer
                </button>
                <a class="btn btn-secondary" th:href="@{/types-traitements-eau}">Retour</a>
            </div>
        </form>
    </section>
</main>
</body>
</html>
