<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" th:replace="~{fragments/layout :: layout(~{::title}, ~{::main})}">
<head>
    <title>AquaNova</title>
</head>
<body>
<main>
    <h2>Détail du relevé</h2>

    <p>
        ID :
        <span th:text="${releve.id}"></span>
    </p>

    <p>
        Bassin :
        <span th:text="${releve.bassin.reference}"></span>
    </p>

    <p>
        Utilisateur :
        <span th:text="${releve.user.name + ' ' + releve.user.lastname}"></span>
    </p>

    <p>
        Date :
        <span th:text="${releve.dateReleve}"></span>
    </p>

    <p>
        Température :
        <span th:text="${releve.temperature}"></span>
    </p>

    <p>
        pH :
        <span th:text="${releve.ph}"></span>
    </p>

    <p>
        Oxygène :
        <span th:text="${releve.oxygene}"></span>
    </p>

    <p>
        Observation :
        <span th:text="${releve.observation}"></span>
    </p>

    <p th:if="${alerte}" style="color:red;">

        ⚠ Une ou plusieurs valeurs sont hors seuil.

    </p>

    <hr>

    <a class="btn btn-secondary" href="/releves-eau">
        Retour
    </a>

    <a class="btn btn-sm btn-outline-primary" th:href="@{'/releves-eau/' + ${releve.id} + '/edit'}">
        Modifier
    </a>

    <form th:action="@{'/releves-eau/' + ${releve.id} + '/delete'}" method="post" style="display:inline;"
        onsubmit="return confirm('Supprimer ce relevé ?');">
        <button class="btn btn-danger" type="submit">Supprimer</button>
    </form>
</main>
</body>
</html>
