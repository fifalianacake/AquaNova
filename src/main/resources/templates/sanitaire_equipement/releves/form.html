<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" th:replace="~{fragments/layout :: layout(~{::title}, ~{::main})}">
<head>
    <title>AquaNova</title>
</head>
<body>
<main>
    <h2>Nouveau relevé d'eau</h2>

    <div class="error" th:if="${error}" th:text="${error}"></div>

    <form class="form-panel" method="post" th:action="${releve.id} == null ? @{/releves-eau} : @{'/releves-eau/' + ${releve.id}}"
        th:object="${releve}">

        <div class="mb-3">
            <label class="form-label" for="bassin">Bassin</label>
            <select class="form-select" id="bassin" th:field="*{bassin.id}" required>
                <option value="">Choisir</option>
                <option th:each="b : ${bassins}" th:value="${b.id}" th:text="${b.reference}">
                </option>
            </select>
        </div>

        <div class="mb-3">
            <label class="form-label" for="dateReleve">Date</label>
            <input class="form-control" type="date" id="dateReleve" th:field="*{dateReleve}" required />
        </div>

        <div class="mb-3">
            <label class="form-label" for="temperature">Température</label>
            <input class="form-control" type="number" step="0.1" min="0" id="temperature" th:field="*{temperature}" required />
        </div>

        <div class="mb-3">
            <label class="form-label" for="ph">pH</label>
            <input class="form-control" type="number" step="0.1" min="0" max="14" id="ph" th:field="*{ph}" required />
        </div>

        <div class="mb-3">
            <label class="form-label" for="oxygene">Oxygène</label>
            <input class="form-control" type="number" step="0.1" min="0" id="oxygene" th:field="*{oxygene}" required />
        </div>

        <div class="mb-3">
            <label class="form-label" for="observation">Observation</label>
            <textarea class="form-control" id="observation" th:field="*{observation}"></textarea>
        </div>

        <div class="d-flex gap-2 mt-4">
            <button class="btn btn-primary" type="submit">Enregistrer</button>
            <a class="btn btn-secondary" href="/releves-eau">Retour à la liste</a>
        </div>
    </form>
</main>
</body>
</html>
