<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" th:replace="~{fragments/layout :: layout(~{::title}, ~{::main})}">
<head>
    <title>AquaNova</title>
</head>
<body>
<main>
    <h2>Nouveau relevé d'eau</h2>

    <form method="post" th:action="${releve.id} == null ? @{/releves-eau} : @{'/releves-eau/' + ${releve.id}}"
        th:object="${releve}">

        <p>
            <label class="form-label">Bassin</label>
            <select class="form-select" th:field="*{bassin.id}" required>
                <option value="">Choisir</option>
                <option th:each="b : ${bassins}" th:value="${b.id}" th:text="${b.reference}">
                </option>
            </select>
        </p>

        <p>
            <label class="form-label">Date</label>
            <input class="form-control" type="date" th:field="*{dateReleve}" required />
        </p>

        <p>
            <label class="form-label">Température</label>
            <input class="form-control" type="number" step="0.1" th:field="*{temperature}" required />
        </p>

        <p>
            <label class="form-label">pH</label>
            <input class="form-control" type="number" step="0.1" th:field="*{ph}" required />
        </p>

        <p>
            <label class="form-label">Oxygène</label>
            <input class="form-control" type="number" step="0.1" th:field="*{oxygene}" required />
        </p>

        <p>
            <label class="form-label">Observation</label>
            <textarea class="form-control" th:field="*{observation}"></textarea>
        </p>

        <button class="btn btn-primary" type="submit">Enregistrer</button>
    </form>

    <br>

    <a class="btn btn-secondary" href="/releves-eau">
        Retour
    </a>
</main>
</body>
</html>
