<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" th:replace="~{fragments/layout :: layout(~{::title}, ~{::main})}">
<head>
    <title>AquaNova - Relevés de qualité de l'eau</title>
</head>
<body>
<main>

<div class="toolbar">
    <a class="btn btn-primary" th:href="@{/releves-eau/new}"><i class="bi bi-plus-lg"></i> Nouveau relevé</a>
</div>

<div class="panel">
    <div class="panel-header">
        <h5>Relevés de qualité de l'eau</h5>
        <span class="result-count"
              th:text="${releves.totalElements} + ' relevé' + (${releves.totalElements} > 1 ? 's' : '') + ' trouvé' + (${releves.totalElements} > 1 ? 's' : '')"></span>
    </div>

    <form method="get" th:action="@{/releves-eau}" class="filters-bar">
        <input type="hidden" name="page" value="0" />
        <select class="form-select" name="bassinId">
            <option value="">Tous les bassins</option>
            <option th:each="b : ${bassins}"
                    th:value="${b.id}"
                    th:text="${b.reference}"
                    th:selected="${filter.bassinId == b.id}"></option>
        </select>
        <div class="input-group">
            <span class="input-group-text">Du</span>
            <input class="form-control" type="date" name="dateDebut" th:value="${filter.dateDebut}">
        </div>
        <div class="input-group">
            <span class="input-group-text">Au</span>
            <input class="form-control" type="date" name="dateFin" th:value="${filter.dateFin}">
        </div>
        <input class="form-control fc-sm" type="number" step="0.1" name="temperatureMin" placeholder="T° min" th:value="${filter.temperatureMin}">
        <input class="form-control fc-sm" type="number" step="0.1" name="temperatureMax" placeholder="T° max" th:value="${filter.temperatureMax}">
        <input class="form-control fc-sm" type="number" step="0.1" name="phMin" placeholder="pH min" th:value="${filter.phMin}">
        <input class="form-control fc-sm" type="number" step="0.1" name="phMax" placeholder="pH max" th:value="${filter.phMax}">
        <input class="form-control fc-sm" type="number" step="0.1" name="oxygeneMin" placeholder="O₂ min" th:value="${filter.oxygeneMin}">
        <input class="form-control fc-sm" type="number" step="0.1" name="oxygeneMax" placeholder="O₂ max" th:value="${filter.oxygeneMax}">
        <button class="btn btn-primary" type="submit"><i class="bi bi-search"></i> Filtrer</button>
        <a class="btn btn-outline-secondary" th:href="@{/releves-eau}"><i class="bi bi-x-circle"></i> Réinitialiser</a>
    </form>

    <div class="table-responsive">
        <table class="table table-hover align-middle">
            <thead>
            <tr>
                <th th:replace="~{fragments/tableau :: sortableHeader(${releves}, 'id', 'ID', '')}"></th>
                <th th:replace="~{fragments/tableau :: sortableHeader(${releves}, 'dateReleve', 'Date', '')}"></th>
                <th th:replace="~{fragments/tableau :: sortableHeader(${releves}, 'bassin.reference', 'Bassin', '')}"></th>
                <th th:replace="~{fragments/tableau :: sortableHeader(${releves}, 'temperature', 'Température', 'text-end')}"></th>
                <th th:replace="~{fragments/tableau :: sortableHeader(${releves}, 'ph', 'pH', 'text-end')}"></th>
                <th th:replace="~{fragments/tableau :: sortableHeader(${releves}, 'oxygene', 'Oxygène', 'text-end')}"></th>
                <th>Utilisateur</th>
                <th>Alerte</th>
                <th class="text-end">Actions</th>
            </tr>
            </thead>
            <tbody>
            <tr th:each="r : ${releves.content}">
                <td th:text="${r.id}"></td>
                <td th:text="${r.dateReleve}"></td>
                <td class="fw-semibold" th:text="${r.bassin.reference}"></td>
                <td class="text-end" th:text="${r.temperature}"></td>
                <td class="text-end" th:text="${r.ph}"></td>
                <td class="text-end" th:text="${r.oxygene}"></td>
                <td th:text="${r.user.name + ' ' + r.user.lastname}"></td>
                <td>
                    <span class="badge badge-warning" th:if="${r.temperature > 30
                    || r.temperature < 18
                    || r.ph > 8.5
                    || r.ph < 6.5
                    || r.oxygene < 5}">
                        ⚠
                    </span>
                </td>
                <td class="text-end">
                    <a class="btn btn-sm btn-outline-primary" th:href="@{/releves-eau/{id}(id=${r.id})}" title="Voir"><i class="bi bi-eye"></i></a>
                    <a class="btn btn-sm btn-outline-primary" th:href="@{/releves-eau/{id}/edit(id=${r.id})}" title="Modifier"><i class="bi bi-pencil"></i></a>
                    <form class="inline-form" th:action="@{/releves-eau/{id}/delete(id=${r.id})}" method="post"
                          onsubmit="return confirm('Supprimer ce relevé ?');">
                        <button class="btn btn-sm btn-outline-danger" type="submit" title="Supprimer"><i class="bi bi-trash3"></i></button>
                    </form>
                </td>
            </tr>
            <tr th:if="${releves.empty}">
                <td colspan="9" class="text-center text-secondary py-4">Aucun relevé ne correspond à ces critères.</td>
            </tr>
            </tbody>
        </table>
    </div>

    <div th:replace="~{fragments/tableau :: tableFooter(${releves})}"></div>
</div>
</main>
</body>
</html>
