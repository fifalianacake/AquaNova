<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" th:replace="~{fragments/layout :: layout(~{::title}, ~{::main})}">
<head>
    <title>AquaNova - Fiche Traitement</title>
</head>
<body>
<main>
    <div>
        <h2>Fiche de Traitement d'Eau #<span th:text="${traitement.id}"></span></h2>
        
        <div>
            <div>Date de l'action</div>
            <div th:text="${traitement.dateTraitement}"></div>
        </div>
        <div>
            <div>Bassin ciblé</div>
            <div th:text="${traitement.bassin != null ? traitement.bassin.reference : 'N/A'}"></div>
        </div>
        <div>
            <div>Type de traitement appliqué</div>
            <div th:text="${traitement.typeTraitementEau.libelle}"></div>
        </div>
        <div>
            <div>Détails techniques</div>
            <div th:text="${traitement.detail}"></div>
        </div>
        <div>
            <div>Observations enregistrées</div>
            <div th:text="${traitement.observation ?: 'Aucune observation'}"></div>
        </div>
        <div>
            <div>Opérateur / Utilisateur</div>
            <div th:text="${traitement.utilisateur != null ? traitement.utilisateur.name : 'N/A'}"></div>
        </div>

        <div>
            <a class="btn btn-secondary" th:href="@{/traitements-eau}">Retour</a>
            <a class="btn btn-sm btn-outline-primary" th:href="@{/traitements-eau/{id}/edit(id=${traitement.id})}">Modifier</a>
            <form th:action="@{/traitements-eau/{id}/delete(id=${traitement.id})}" method="post" onsubmit="return confirm('Voulez-vous vraiment effacer ce traitement ?')">
                <button class="btn btn-danger" type="submit">Supprimer</button>
            </form>
        </div>
    </div>
</main>
</body>
</html>
