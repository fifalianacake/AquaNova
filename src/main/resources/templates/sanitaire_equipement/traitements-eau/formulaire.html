<!DOCTYPE html>
<html lang="fr" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>AquaNova - Saisie Traitement</title>
</head>
<body>

    <div>
        <h2 th:text="${traitement.id != null} ? 'Modification du traitement eau' : 'Saisie du traitement eau'">
            Saisie de Traitement de l'Eau
        </h2>
        
        <div th:if="${erreur}" th:text="${erreur}"></div>

        <form th:action="${traitement.id} == null ? @{/traitements-eau} : @{'/traitements-eau/' + ${traitement.id}}"
              th:object="${traitement}"
              method="post">
            <div>
                <label>Bassin *</label>
                <select th:field="*{bassin.id}" required>
                    <option value="">-- Choisir un bassin --</option>
                    <option th:each="b : ${bassins}"
                            th:value="${b.id}"
                            th:text="${b.reference}"></option>
                </select>
            </div>

            <div>
                <label>Type de traitement *</label>
                <select th:field="*{typeTraitementEau.id}" required>
                    <option value="">-- Sélectionner un type --</option>
                    <option th:each="t : ${types}" th:value="${t.id}" th:text="${t.libelle}"></option>
                </select>
            </div>

            <div>
                <label>Date du traitement *</label>
                <input type="date" th:field="*{dateTraitement}" required>
            </div>

            <div>
                <label>Détails techniques *</label>
                <textarea th:field="*{detail}" rows="3" required></textarea>
            </div>

            <div>
                <label>Observations complémentaires</label>
                <textarea th:field="*{observation}" rows="2"></textarea>
            </div>

            <div>
                <a th:href="@{/traitements-eau}">Retour</a>
                <button type="submit"
                        th:text="${traitement.id != null} ? 'Modifier' : 'Enregistrer'">
                    Enregistrer
                </button>
            </div>
        </form>
    </div>

</body>
</html>
