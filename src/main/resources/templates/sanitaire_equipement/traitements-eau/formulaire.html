<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" th:replace="~{fragments/layout :: layout(~{::title}, ~{::main})}">
<head>
    <title>AquaNova - Saisie Traitement</title>
</head>
<body>
<main>
    <h2 th:text="${traitement.id != null} ? 'Modification du traitement eau' : 'Saisie du traitement eau'">
        Saisie de Traitement de l'Eau
    </h2>

    <div class="error" th:if="${erreur}" th:text="${erreur}"></div>

    <form class="form-panel" th:action="${traitement.id} == null ? @{/traitements-eau} : @{'/traitements-eau/' + ${traitement.id}}"
          th:object="${traitement}"
          method="post">
        <div class="mb-3">
            <label class="form-label" for="bassin">Bassin *</label>
            <select class="form-select" id="bassin" th:field="*{bassin.id}" required>
                <option value="">-- Choisir un bassin --</option>
                <option th:each="b : ${bassins}"
                        th:value="${b.id}"
                        th:text="${b.reference}"></option>
            </select>
        </div>

        <div class="mb-3">
            <label class="form-label" for="typeTraitementEau">Type de traitement *</label>
            <select class="form-select" id="typeTraitementEau" th:field="*{typeTraitementEau.id}" required>
                <option value="">-- Sélectionner un type --</option>
                <option th:each="t : ${types}" th:value="${t.id}" th:text="${t.libelle}"></option>
            </select>
        </div>

        <div class="mb-3">
            <label class="form-label" for="dateTraitement">Date du traitement *</label>
            <input class="form-control" type="date" id="dateTraitement" th:field="*{dateTraitement}" required>
        </div>

        <div class="mb-3">
            <label class="form-label" for="detail">Détails techniques *</label>
            <textarea class="form-control" id="detail" th:field="*{detail}" rows="3" required></textarea>
        </div>

        <div class="mb-3">
            <label class="form-label" for="observation">Observations complémentaires</label>
            <textarea class="form-control" id="observation" th:field="*{observation}" rows="2"></textarea>
        </div>

        <div class="d-flex gap-2 mt-4">
            <button class="btn btn-primary" type="submit"
                    th:text="${traitement.id != null} ? 'Modifier' : 'Enregistrer'">
                Enregistrer
            </button>
            <a class="btn btn-secondary" th:href="@{/traitements-eau}">Retour à la liste</a>
        </div>
    </form>
</main>
</body>
</html>
