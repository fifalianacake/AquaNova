<!DOCTYPE html>
<html lang="fr" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <title>AquaNova - Saisie Traitement</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 20px;
            background-color: #f4f6f9;
        }

        .form-container {
            background: white;
            max-width: 500px;
            margin: 30px auto;
            padding: 25px;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
        }

        .form-group {
            margin-bottom: 15px;
        }

        .form-group label {
            display: block;
            margin-bottom: 5px;
            font-weight: bold;
        }

        .form-group input,
        .form-group select,
        .form-group textarea {
            width: 100%;
            padding: 8px;
            border: 1px solid #ccc;
            border-radius: 4px;
            box-sizing: border-box;
        }

        .btn-box {
            display: flex;
            justify-content: space-between;
            margin-top: 20px;
        }

        .btn {
            padding: 10px 20px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            text-decoration: none;
            display: inline-block;
        }

        .btn-primary {
            background-color: #28a745;
            color: white;
        }

        .btn-secondary {
            background-color: #6c757d;
            color: white;
        }

        .error {
            color: red;
            margin-bottom: 15px;
            font-weight: bold;
        }
    </style>
</head>

<body>

    <div class="form-container">
        <h2>Saisie de Traitement de l'Eau</h2>

        <div class="error" th:if="${erreur}" th:text="${erreur}"></div>

        <form th:action="@{/traitements-eau}" th:object="${traitement}" method="post">
            <div class="form-group">
                <label>Bassin *</label>
                <select th:field="*{bassin.id}" required>
                    <option value="">-- Choisir un bassin --</option>
                </select>
            </div>

            <div class="form-group">
                <label>Type de traitement *</label>
                <select th:field="*{typeTraitementEau.id}" required>
                    <option value="">-- Sélectionner un type --</option>
                    <option th:each="t : ${types}" th:value="${t.id}" th:text="${t.libelle}"></option>
                </select>
            </div>

            <div class="form-group">
                <label>Date du traitement *</label>
                <input type="date" th:field="*{dateTraitement}" required>
            </div>

            <div class="form-group">
                <label>Détails techniques *</label>
                <textarea th:field="*{detail}" rows="3" required></textarea>
            </div>

            <div class="form-group">
                <label>Observations complémentaires</label>
                <textarea th:field="*{observation}" rows="2"></textarea>
            </div>

            <div class="btn-box">
                <a th:href="@{/traitements-eau}" class="btn btn-secondary">Retour</a>
                <button type="submit" class="btn btn-primary">Enregistrer</button>
            </div>
        </form>
    </div>

</body>

</html>
