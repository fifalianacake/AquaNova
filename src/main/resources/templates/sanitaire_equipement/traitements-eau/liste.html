<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" th:replace="~{fragments/layout :: layout(~{::title}, ~{::main})}">
<head>
    <title>AquaNova - Historique des Traitements</title>
</head>
<body>
<main>
    <div>
        <a class="btn btn-primary" th:href="@{/traitements-eau/new}">Saisir un traitement</a>
        <h2>Traitements de l'Eau Appliqués</h2>
    </div>

    <div>
        <form th:action="@{/traitements-eau}" method="get">
            <input class="form-control" type="number" name="id" placeholder="id" th:value="${currentId}">
            <select class="form-select" name="bassinId">
                <option value="">-- bassin --</option>
                <option th:each="b : ${bassins}"
                        th:value="${b.id}"
                        th:text="${b.reference}"
                        th:selected="${b.id == currentBassinId}"></option>
            </select>
            <select class="form-select" name="typeId">
                <option value="">-- type traitement --</option>
                <option th:each="t : ${types}" th:value="${t.id}" th:text="${t.libelle}" th:selected="${t.id == currentTypeId}"></option>
            </select>
            <input class="form-control" type="date" name="debut" th:value="${currentDebut}">
            <input class="form-control" type="date" name="fin" th:value="${currentFin}">
            <button class="btn btn-primary" type="submit">Filtrer</button>
        </form>
    </div>

    <table class="table table-hover align-middle">
        <thead>
            <tr>
                <th>id</th>
                <th>date</th>
                <th>bassin</th>
                <th>type traitement</th>
                <th>détail</th>
                <th>utilisateur</th>
            </tr>
        </thead>
        <tbody>
            <tr th:each="t : ${traitements}" th:onclick="|window.location.href='@{/traitements-eau/}' + ${t.id}|">
                <td th:text="${t.id}"></td>
                <td th:text="${t.dateTraitement}"></td>
                <td th:text="${t.bassin != null ? t.bassin.reference : 'N/A'}"></td>
                <td><strong th:text="${t.typeTraitementEau.libelle}"></strong></td>
                <td th:text="${t.detail}"></td>
                <td th:text="${t.utilisateur != null ? t.utilisateur.name : 'Utilisateur'}"></td>
            </tr>
            <tr th:if="${#lists.isEmpty(traitements)}">
                <td colspan="6">Aucun traitement trouvé pour ces critères.</td>
            </tr>
        </tbody>
    </table>
</main>
</body>
</html>
