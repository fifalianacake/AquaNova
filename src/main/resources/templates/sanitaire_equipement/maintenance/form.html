<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" th:replace="~{fragments/layout :: layout(~{::title}, ~{::main})}">
<head>
    <title>Saisie Maintenance ou Panne</title>
</head>
<body>
<main>
    <h2 th:text="${maintenance.id == null} ? 'Déclarer une intervention / Panne' : 'Modifier l\'intervention'">Saisie Intervention</h2>

    <div class="error" th:if="${errorMessage}" th:text="${errorMessage}"></div>

    <form class="form-panel" th:action="${maintenance.id} == null ? @{/maintenances} : @{/maintenances/{id}(id=${maintenance.id})}"
          th:object="${maintenance}" method="post">
        <input type="hidden" th:field="*{id}">

        <div class="mb-3">
            <label class="form-label" for="equipement">Équipement *</label>
            <select class="form-select" id="equipement" th:field="*{equipement.id}" required>
                <option value="">-- Choisir un équipement --</option>
                <option th:each="equipement : ${equipements}"
                        th:value="${equipement.id}"
                        th:text="'ID #' + ${equipement.id} + ' - ' + ${equipement.nom}"></option>
            </select>
        </div>

        <div class="mb-3">
            <label class="form-label" for="categorieMaintenance">Catégorie de Maintenance *</label>
            <select class="form-select" id="categorieMaintenance" th:field="*{categorieMaintenance.id}" required>
                <option value="">-- Choisir une catégorie --</option>
                <option th:each="cat : ${categories}"
                        th:value="${cat.id}"
                        th:text="${cat.libelle}"></option>
            </select>
        </div>

        <div class="mb-3">
            <label class="form-label" for="dateMaintenance">Date Maintenance *</label>
            <input class="form-control" type="date" id="dateMaintenance" th:field="*{dateMaintenance}" required>
        </div>

        <div class="mb-3">
            <label class="form-label" for="description">Description *</label>
            <textarea class="form-control" id="description" th:field="*{description}" required rows="4"></textarea>
        </div>

        <div class="mb-3">
            <label class="form-label" for="cout">Coût (€) *</label>
            <input class="form-control" type="number" step="0.01" min="0" id="cout" th:field="*{cout}" required>
        </div>

        <div class="mb-3">
            <label class="form-label" for="statutIntervention">Statut Intervention *</label>
            <select class="form-select" id="statutIntervention" th:field="*{statutIntervention}" required>
                <option value="OUVERTE">OUVERTE</option>
                <option value="EN_COURS">EN_COURS</option>
            </select>
            <small>La clôture (TERMINEE) se fait uniquement via l'action "Clôturer" sur la fiche de l'intervention.</small>
        </div>

        <div class="mb-3">
            <label class="form-label" for="observation">Observation</label>
            <textarea class="form-control" id="observation" th:field="*{observation}" rows="3"></textarea>
        </div>

        <div class="d-flex gap-2 mt-4">
            <button class="btn btn-primary" type="submit">Enregistrer</button>
            <a class="btn btn-secondary" th:href="@{/maintenances}">Retour à la liste</a>
        </div>
    </form>
</main>
</body>
</html>
