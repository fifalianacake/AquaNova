<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Saisie Maintenance ou Panne</title>
</head>
<body>

    <div th:if="${errorMessage}" style="color: red; font-weight: bold;">
        <p th:text="${errorMessage}"></p>
    </div>

    <h1 th:text="${maintenance.id == null} ? 'Déclarer une intervention / Panne' : 'Modifier l\'intervention'">Saisie Intervention</h1>
    
    <form th:action="@{/maintenances/save}" th:object="${maintenance}" method="post">
        <input type="hidden" th:field="*{id}">

        <p>
            <label>Équipement * :</label><br>
            <select th:field="*{equipement.id}" required>
                <option value="">-- Choisir un équipement --</option>
                <option th:each="equipement : ${equipements}" 
                        th:value="${equipement.id}" 
                        th:text="'ID #' + ${equipement.id} + ' - ' + ${equipement.nom}"></option>
            </select>
        </p>

        <p>
            <label>Catégorie de Maintenance * :</label><br>
            <select th:field="*{categorieMaintenance.id}" required>
                <option value="">-- Choisir une catégorie --</option>
                <option th:each="cat : ${categories}" 
                        th:value="${cat.id}" 
                        th:text="${cat.libelle}"></option>
            </select>
        </p>

        <p>
            <label>Date Maintenance * :</label><br>
            <input type="date" th:field="*{dateMaintenance}" required>
        </p>

        <p>
            <label>Description * :</label><br>
            <textarea th:field="*{description}" required rows="4" cols="50"></textarea>
        </p>

        <p>
            <label>Coût (€) * :</label><br>
            <input type="number" step="0.01" min="0" th:field="*{cout}" required>
        </p>

        <p>
            <label>Statut Intervention * :</label><br>
            <select th:field="*{statutIntervention}" required>
                <option th:each="statut : ${T(mg.itu.aquanova.sanitaire_equipement.models.StatutInterventionEnum).values()}"
                        th:value="${statut}" th:text="${statut}"></option>
            </select>
        </p>

        <p>
            <label>Date de Résolution :</label><br>
            <input type="date" th:field="*{dateResolution}">
        </p>

        <p>
            <label>Observation :</label><br>
            <textarea th:field="*{observation}" rows="3" cols="50"></textarea>
        </p>

        <hr>
        
        <div>
            <button type="submit">Enregistrer</button>
            <a th:href="@{/maintenances}">Annuler</a>
        </div>
    </form>

</body>
</html>
