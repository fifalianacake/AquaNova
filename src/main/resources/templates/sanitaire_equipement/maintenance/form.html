<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" th:replace="~{fragments/layout :: layout(~{::title}, ~{::main})}">
<head>
    <title>Saisie Maintenance ou Panne</title>
</head>
<body>
<main>
    <div th:if="${errorMessage}" style="color: red; font-weight: bold;">
        <p th:text="${errorMessage}"></p>
    </div>

    <h1 th:text="${maintenance.id == null} ? 'Déclarer une intervention / Panne' : 'Modifier l\'intervention'">Saisie Intervention</h1>
    
    <form th:action="${maintenance.id} == null ? @{/maintenances} : @{/maintenances/{id}(id=${maintenance.id})}"
          th:object="${maintenance}" method="post">
        <input type="hidden" th:field="*{id}">

        <p>
            <label class="form-label">Équipement * :</label><br>
            <select class="form-select" th:field="*{equipement.id}" required>
                <option value="">-- Choisir un équipement --</option>
                <option th:each="equipement : ${equipements}" 
                        th:value="${equipement.id}" 
                        th:text="'ID #' + ${equipement.id} + ' - ' + ${equipement.nom}"></option>
            </select>
        </p>

        <p>
            <label class="form-label">Catégorie de Maintenance * :</label><br>
            <select class="form-select" th:field="*{categorieMaintenance.id}" required>
                <option value="">-- Choisir une catégorie --</option>
                <option th:each="cat : ${categories}" 
                        th:value="${cat.id}" 
                        th:text="${cat.libelle}"></option>
            </select>
        </p>

        <p>
            <label class="form-label">Date Maintenance * :</label><br>
            <input class="form-control" type="date" th:field="*{dateMaintenance}" required>
        </p>

        <p>
            <label class="form-label">Description * :</label><br>
            <textarea class="form-control" th:field="*{description}" required rows="4" cols="50"></textarea>
        </p>

        <p>
            <label class="form-label">Coût (€) * :</label><br>
            <input class="form-control" type="number" step="0.01" min="0" th:field="*{cout}" required>
        </p>

        <p>
            <label class="form-label">Statut Intervention * :</label><br>
            <select class="form-select" th:field="*{statutIntervention}" required>
                <option value="OUVERTE">OUVERTE</option>
                <option value="EN_COURS">EN_COURS</option>
            </select>
            <br><small>La clôture (TERMINEE) se fait uniquement via l'action "Clôturer" sur la fiche de l'intervention.</small>
        </p>

        <p>
            <label class="form-label">Observation :</label><br>
            <textarea class="form-control" th:field="*{observation}" rows="3" cols="50"></textarea>
        </p>

        <hr>
        
        <div>
            <button class="btn btn-primary" type="submit">Enregistrer</button>
            <a class="btn btn-secondary" th:href="@{/maintenances}">Annuler</a>
        </div>
    </form>
</main>
</body>
</html>
