<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" th:replace="~{fragments/layout :: layout(~{::title}, ~{::main})}">
<head>
    <title>Liste des Maintenances et Pannes</title>
</head>
<body>
<main>
    <h1>Maintenances & Pannes</h1>
    
    <p>
        <a class="btn btn-primary" th:href="@{/maintenances/new}">+ Nouvelle Intervention</a>
    </p>

    <fieldset>
        <legend>Filtres de recherche</legend>
        <form th:action="@{/maintenances}" th:object="${filter}" method="get">
            <div>
                <label class="form-label">ID Intervention :</label>
                <input class="form-control" type="number" th:field="*{id}">
            </div>
            <div>
                <label class="form-label">ID Équipement :</label>
                <input class="form-control" type="number" th:field="*{idEquipement}">
            </div>
            <div>
                <label class="form-label">ID Utilisateur / Technicien :</label>
                <input class="form-control" type="number" th:field="*{idUser}">
            </div>
            <div>
                <label class="form-label">ID Catégorie :</label>
                <input class="form-control" type="number" th:field="*{idCategorieMaintenance}">
            </div>
            <div>
                <label class="form-label">Statut Intervention :</label>
                <select class="form-select" th:field="*{statutIntervention}">
                    <option value="">Tous</option>
                    <option th:each="statut : ${T(mg.itu.aquanova.sanitaire_equipement.models.StatutInterventionEnum).values()}"
                            th:value="${statut}" th:text="${statut}"></option>
                </select>
            </div>
            <div>
                <label class="form-label">Coût exact :</label>
                <input class="form-control" type="number" step="0.01" th:field="*{cout}">
            </div>
            <div>
                <label class="form-label">Date Maintenance (Début) :</label>
                <input class="form-control" type="date" th:field="*{debutDateMaintenance}">
            </div>
            <div>
                <label class="form-label">Date Maintenance (Fin) :</label>
                <input class="form-control" type="date" th:field="*{finDateMaintenance}">
            </div>
            <div>
                <label class="form-label">Date Résolution (Début) :</label>
                <input class="form-control" type="date" th:field="*{debutDateResolution}">
            </div>
            <div>
                <label class="form-label">Date Résolution (Fin) :</label>
                <input class="form-control" type="date" th:field="*{finDateResolution}">
            </div>
            <br>
            <div>
                <button class="btn btn-primary" type="submit">Filtrer</button>
                <a th:href="@{/maintenances}">Réinitialiser</a>
            </div>
        </form>
    </fieldset>

    <br>

    <table class="table table-hover align-middle">
        <thead>
            <tr>
                <th>ID</th>
                <th>Date</th>
                <th>Équipement</th>
                <th>Catégorie</th>
                <th>Statut</th>
                <th>Coût</th>
                <th>Date Résolution</th>
                <th>Actions</th>
            </tr>
        </thead>
        <tbody>
            <tr th:each="m : ${maintenances}">
                <td th:text="${m.id}">1</td>
                <td th:text="${m.dateMaintenance}">2026-03-15</td>
                <td th:text="${m.equipement != null ? 'Équipement #' + m.equipement.id : '-'}">Sonde A</td>
                <td th:text="${m.categorieMaintenance != null ? m.categorieMaintenance.libelle : '-'}">Préventive</td>
                <td th:text="${m.statutIntervention}">OUVERTE</td>
                <td th:text="${m.cout != null ? m.cout + ' €' : '0.00 €'}">150 €</td>
                <td th:text="${m.dateResolution != null ? m.dateResolution : '-'}">-</td>
                <td>
                    <a class="btn btn-sm btn-outline-primary" th:href="@{/maintenances/{id}(id=${m.id})}">Détails</a>
                </td>
            </tr>
            <tr th:if="${#lists.isEmpty(maintenances)}">
                <td colspan="8">Aucune maintenance trouvée.</td>
            </tr>
        </tbody>
    </table>

    <div th:if="${page.totalPages > 0}">
        <p>
            Page <span th:text="${page.number + 1}">1</span> sur <span th:text="${page.totalPages}">5</span>
        </p>
        <div>
            <a class="btn btn-secondary" th:href="@{/maintenances(
                    page=${page.number - 1}, 
                    id=${filter.id}, 
                    idEquipement=${filter.idEquipement}, 
                    idUser=${filter.idUser}, 
                    idCategorieMaintenance=${filter.idCategorieMaintenance}, 
                    statutIntervention=${filter.statutIntervention}, 
                    cout=${filter.cout}, 
                    debutDateMaintenance=${filter.debutDateMaintenance}, 
                    finDateMaintenance=${filter.finDateMaintenance}, 
                    debutDateResolution=${filter.debutDateResolution}, 
                    finDateResolution=${filter.finDateResolution}
            )}" 
            th:if="${page.hasPrevious()}">Précédent</a>

            <a th:href="@{/maintenances(
                    page=${page.number + 1}, 
                    id=${filter.id}, 
                    idEquipement=${filter.idEquipement}, 
                    idUser=${filter.idUser}, 
                    idCategorieMaintenance=${filter.idCategorieMaintenance}, 
                    statutIntervention=${filter.statutIntervention}, 
                    cout=${filter.cout}, 
                    debutDateMaintenance=${filter.debutDateMaintenance}, 
                    finDateMaintenance=${filter.finDateMaintenance}, 
                    debutDateResolution=${filter.debutDateResolution}, 
                    finDateResolution=${filter.finDateResolution}
            )}" 
            th:if="${page.hasNext()}">Suivant</a>
        </div>
    </div>
</main>
</body>
</html>
