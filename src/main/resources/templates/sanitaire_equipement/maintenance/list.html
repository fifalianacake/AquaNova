<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" th:replace="~{fragments/layout :: layout(~{::title}, ~{::main})}">
<head>
    <title>AquaNova - Maintenances et Pannes</title>
</head>
<body>
<main>

<div class="toolbar">
    <a class="btn btn-primary" th:href="@{/maintenances/new}"><i class="bi bi-plus-lg"></i> Nouvelle intervention</a>
</div>

<div class="panel">
    <div class="panel-header">
        <h5>Maintenances &amp; Pannes</h5>
        <span class="result-count"
              th:text="${maintenances.totalElements} + ' intervention' + (${maintenances.totalElements} > 1 ? 's' : '') + ' trouvée' + (${maintenances.totalElements} > 1 ? 's' : '')"></span>
    </div>

    <form method="get" th:action="@{/maintenances}" class="filters-bar">
        <input type="hidden" name="page" value="0" />
        <div class="input-group">
            <span class="input-group-text">Du</span>
            <input class="form-control" type="date" name="dateDebut" th:value="${filter.dateDebut}">
        </div>
        <div class="input-group">
            <span class="input-group-text">Au</span>
            <input class="form-control" type="date" name="dateFin" th:value="${filter.dateFin}">
        </div>
        <input class="form-control fc-sm" type="number" step="0.01" min="0" name="coutMin" placeholder="Coût min" th:value="${filter.coutMin}">
        <input class="form-control fc-sm" type="number" step="0.01" min="0" name="coutMax" placeholder="Coût max" th:value="${filter.coutMax}">
        <button class="btn btn-primary" type="submit"><i class="bi bi-search"></i> Filtrer</button>
        <a class="btn btn-outline-secondary" th:href="@{/maintenances}"><i class="bi bi-x-circle"></i> Réinitialiser</a>
    </form>

    <div class="table-responsive">
        <table class="table table-hover align-middle">
            <thead>
            <tr>
                <th>ID</th>
                <th>Date</th>
                <th>Équipement</th>
                <th>Catégorie</th>
                <th>Statut</th>
                <th class="text-end">Coût</th>
                <th>Date résolution</th>
                <th class="text-end">Actions</th>
            </tr>
            </thead>
            <tbody>
            <tr th:each="m : ${maintenances.content}">
                <td th:text="${m.id}"></td>
                <td th:text="${m.dateMaintenance}"></td>
                <td class="fw-semibold" th:text="${m.equipement != null ? 'Équipement #' + m.equipement.id : '—'}"></td>
                <td th:text="${m.categorieMaintenance != null ? m.categorieMaintenance.libelle : '—'}"></td>
                <td><span class="badge badge-info" th:text="${m.statutIntervention}"></span></td>
                <td class="text-end montant" th:text="${m.cout != null ? m.cout + ' €' : '0.00 €'}"></td>
                <td th:text="${m.dateResolution != null ? m.dateResolution : '—'}"></td>
                <td class="text-end">
                    <a class="btn btn-sm btn-outline-primary" th:href="@{/maintenances/{id}(id=${m.id})}" title="Voir les détails"><i class="bi bi-eye"></i></a>
                </td>
            </tr>
            <tr th:if="${maintenances.empty}">
                <td colspan="8" class="text-center text-secondary py-4">Aucune maintenance ne correspond à ces critères.</td>
            </tr>
            </tbody>
        </table>
    </div>

    <div th:replace="~{fragments/tableau :: tableFooter(${maintenances})}"></div>
</div>
</main>
</body>
</html>
