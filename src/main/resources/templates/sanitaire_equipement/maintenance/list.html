<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" th:replace="~{fragments/layout :: layout(~{::title}, ~{::main})}">
<head>
    <title>Liste des Maintenances et Pannes</title>
</head>
<body>
<main>
    <h1>Maintenances & Pannes</h1>

    <p>
        <a class="btn btn-primary" th:href="@{/maintenances/new}">+ Nouvelle Intervention</a>
    </p>

    <form method="get" th:action="@{/maintenances}" class="filters">
        <input type="hidden" name="page" value="0" />

        <label class="form-label">Date début
            <input class="form-control" type="date" name="dateDebut" th:value="${filter.dateDebut}" />
        </label>

        <label class="form-label">Date fin
            <input class="form-control" type="date" name="dateFin" th:value="${filter.dateFin}" />
        </label>

        <label class="form-label">Coût min
            <input class="form-control" type="number" step="0.01" min="0" name="coutMin" th:value="${filter.coutMin}" />
        </label>

        <label class="form-label">Coût max
            <input class="form-control" type="number" step="0.01" min="0" name="coutMax" th:value="${filter.coutMax}" />
        </label>

        <label class="form-label">Lignes/page
            <select class="form-select" name="size" onchange="this.form.submit()">
                <option th:each="s : ${pageSizes}"
                        th:value="${s}"
                        th:text="${s}"
                        th:selected="${maintenances.size == s}"></option>
            </select>
        </label>

        <button class="btn btn-primary" type="submit">Filtrer</button>
        <a th:href="@{/maintenances}">Réinitialiser</a>
    </form>

    <table class="table table-hover align-middle">
        <thead>
            <tr>
                <th>ID</th>
                <th>Date</th>
                <th>Équipement</th>
                <th>Catégorie</th>
                <th>Statut</th>
                <th>Coût</th>
                <th>Date Résolution</th>
                <th>Actions</th>
            </tr>
        </thead>
        <tbody>
            <tr th:each="m : ${maintenances.content}">
                <td th:text="${m.id}"></td>
                <td th:text="${m.dateMaintenance}"></td>
                <td th:text="${m.equipement != null ? 'Équipement #' + m.equipement.id : '-'}"></td>
                <td th:text="${m.categorieMaintenance != null ? m.categorieMaintenance.libelle : '-'}"></td>
                <td th:text="${m.statutIntervention}"></td>
                <td th:text="${m.cout != null ? m.cout + ' €' : '0.00 €'}"></td>
                <td th:text="${m.dateResolution != null ? m.dateResolution : '-'}"></td>
                <td>
                    <a class="btn btn-sm btn-outline-primary" th:href="@{/maintenances/{id}(id=${m.id})}">Détails</a>
                </td>
            </tr>
            <tr th:if="${maintenances.empty}">
                <td colspan="8">Aucune maintenance trouvée.</td>
            </tr>
        </tbody>
    </table>

    <div class="pagination" th:if="${maintenances.totalPages > 0}">
        <a class="btn btn-secondary" th:if="${maintenances.hasPrevious()}"
           th:href="@{/maintenances(page=${maintenances.number - 1}, size=${maintenances.size}, dateDebut=${filter.dateDebut}, dateFin=${filter.dateFin}, coutMin=${filter.coutMin}, coutMax=${filter.coutMax})}">&laquo; Précédent</a>
        <span th:unless="${maintenances.hasPrevious()}" style="color:#999;">&laquo; Précédent</span>

        <span th:text="'Page ' + ${maintenances.number + 1} + ' sur ' + ${maintenances.totalPages} + ' — ' + ${maintenances.totalElements} + ' résultat(s)'"></span>

        <a th:if="${maintenances.hasNext()}"
           th:href="@{/maintenances(page=${maintenances.number + 1}, size=${maintenances.size}, dateDebut=${filter.dateDebut}, dateFin=${filter.dateFin}, coutMin=${filter.coutMin}, coutMax=${filter.coutMax})}">Suivant &raquo;</a>
        <span th:unless="${maintenances.hasNext()}" style="color:#999;">Suivant &raquo;</span>
    </div>
</main>
</body>
</html>
