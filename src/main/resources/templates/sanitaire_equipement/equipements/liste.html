<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" th:replace="~{fragments/layout :: layout(~{::title}, ~{::main})}">
<head>
    <title>Parc Matériel</title>
</head>
<body>
<main>

<div class="toolbar">
    <a class="btn btn-primary" th:href="@{/equipements/new}"><i class="bi bi-plus-lg"></i> Nouvel équipement</a>
</div>

<div class="panel">
    <div class="panel-header">
        <h5>Parc matériel</h5>
        <span class="result-count" th:text="${#lists.size(equipements)} + ' équipement(s)'"></span>
    </div>

    <form th:action="@{/equipements}" method="get" class="filters-bar">
        <input class="form-control" type="text" name="nom"
               th:value="${param.nom}"
               placeholder="Nom de l'équipement"/>
        <select class="form-select" name="type">
            <option value="">Tous les types</option>
            <option th:each="t : ${types}"
                    th:value="${t.id}"
                    th:text="${t.libelle}"
                    th:selected="${param.type != null and param.type[0] == t.id.toString()}"></option>
        </select>
        <select class="form-select" name="statut">
            <option value="">Tous les statuts</option>
            <option th:each="s : ${statuts}"
                    th:value="${s}"
                    th:text="${s}"
                    th:selected="${param.statut != null and param.statut[0] == s.toString()}"></option>
        </select>
        <button class="btn btn-primary" type="submit"><i class="bi bi-search"></i> Filtrer</button>
        <a class="btn btn-outline-secondary" th:href="@{/equipements}"><i class="bi bi-x-circle"></i> Réinitialiser</a>
    </form>

    <div class="table-responsive">
        <table class="table table-hover align-middle">
            <thead>
            <tr>
                <th>ID</th>
                <th>Nom</th>
                <th>Type</th>
                <th>Statut</th>
                <th>Bassin</th>
                <th>Date installation</th>
                <th>Dernière maintenance</th>
                <th class="text-end">Actions</th>
            </tr>
            </thead>
            <tbody>
            <tr th:each="e : ${equipements}">
                <td th:text="${e.id}"></td>
                <td class="fw-semibold" th:text="${e.nom}"></td>
                <td th:text="${e.typeEquipement.libelle}"></td>
                <td th:text="${e.statut}"></td>
                <td th:text="${e.bassin != null ? e.bassin.nom : 'Général'}"></td>
                <td th:text="${e.dateInstallation}"></td>
                <td th:text="${e.derniereMaintenance != null ? e.derniereMaintenance : '-'}"></td>
                <td class="text-end">
                    <a class="btn btn-sm btn-outline-primary" th:href="@{/equipements/{id}(id=${e.id})}" title="Voir"><i class="bi bi-eye"></i></a>
                    <a class="btn btn-sm btn-outline-primary" th:href="@{/equipements/{id}/edit(id=${e.id})}" title="Modifier"><i class="bi bi-pencil"></i></a>
                    <form class="inline-form" th:action="@{/equipements/{id}/delete(id=${e.id})}" method="post">
                        <button class="btn btn-sm btn-outline-danger" type="submit" title="Supprimer"
                                onclick="return confirm('Voulez-vous supprimer cet équipement ?');"><i class="bi bi-trash3"></i></button>
                    </form>
                </td>
            </tr>
            <tr th:if="${#lists.isEmpty(equipements)}">
                <td colspan="8" class="text-center text-secondary py-4">Aucun équipement trouvé.</td>
            </tr>
            </tbody>
        </table>
    </div>
</div>
</main>
</body>
</html>
