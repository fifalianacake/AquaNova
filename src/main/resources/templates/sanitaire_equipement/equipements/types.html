<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" th:replace="~{fragments/layout :: layout(~{::title}, ~{::main})}">
<head>
    <title>AquaNova</title>
</head>
<body>
<main>
    <h2>Types d'équipements</h2>

    <div class="error" th:if="${error}" th:text="${error}"></div>

    <form class="form-panel" th:action="@{/types-equipements}" th:object="${typeEquipement}" method="post">
        <div class="mb-3">
            <label class="form-label" for="libelle">Libellé</label>
            <input class="form-control" type="text" id="libelle" th:field="*{libelle}" required>
        </div>

        <div class="d-flex gap-2 mt-4">
            <button class="btn btn-primary" type="submit">Enregistrer</button>
        </div>
    </form>

    <div class="panel">
        <div class="panel-header">
            <h5>Types d'équipements</h5>
            <span class="result-count" th:text="${#lists.size(types)} + ' type(s)'"></span>
        </div>

        <div class="table-responsive">
            <table class="table table-hover align-middle">
                <thead>
                <tr>
                    <th>ID</th>
                    <th>Libellé</th>
                </tr>
                </thead>
                <tbody>
                <tr th:each="type : ${types}">
                    <td th:text="${type.id}"></td>
                    <td class="fw-semibold" th:text="${type.libelle}"></td>
                </tr>
                <tr th:if="${#lists.isEmpty(types)}">
                    <td colspan="2" class="text-center text-secondary py-4">Aucun type d'équipement trouvé.</td>
                </tr>
                </tbody>
            </table>
        </div>
    </div>
</main>
</body>
</html>
