<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" th:replace="~{fragments/layout :: layout(~{::title}, ~{::main})}">
<head>
    <title>AquaNova</title>
</head>
<body>
<main>
    <h2>Types d'équipements</h2>

    <div class="error" th:if="${error}" th:text="${error}"></div>

    <form class="form-panel" th:action="@{/types-equipements}" th:object="${typeEquipement}" method="post">
        <div class="mb-3">
            <label class="form-label" for="libelle">Libellé</label>
            <input class="form-control" type="text" id="libelle" th:field="*{libelle}" required>
        </div>

        <div class="d-flex gap-2 mt-4">
            <button class="btn btn-primary" type="submit">Enregistrer</button>
        </div>
    </form>

    <table class="table table-hover align-middle">
        <thead>
            <tr>
                <th>ID</th>
                <th>Libellé</th>
            </tr>
        </thead>
        <tbody>
            <tr th:if="${#lists.isEmpty(types)}">
                <td colspan="2">Aucun type d'équipement trouvé.</td>
            </tr>
            <tr th:each="type : ${types}">
                <td th:text="${type.id}"></td>
                <td th:text="${type.libelle}"></td>
            </tr>
        </tbody>
    </table>
</main>
</body>
</html>
