<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" th:replace="~{fragments/layout :: layout(~{::title}, ~{::main})}">
<head>
    <title>AquaNova</title>
</head>
<body>
<main>
    <h2 th:text="${equipement.id != null} ? 'Modification Équipement' : 'Saisie Équipement'">
        Saisie Équipement
    </h2>

    <div class="error" th:if="${error}" th:text="${error}"></div>

    <form class="form-panel" th:action="${equipement.id == null} ? @{/equipements} : @{/equipements/{id}(id=${equipement.id})}"
          th:object="${equipement}"
          method="post">
        <div class="mb-3">
            <label class="form-label" for="nom">Nom</label>
            <input class="form-control" type="text" id="nom" th:field="*{nom}" required />
        </div>

        <div class="mb-3">
            <label class="form-label" for="typeEquipement">Type</label>
            <select class="form-select" id="typeEquipement" th:field="*{typeEquipement.id}" required>
                <option value="">-- Choisir un type --</option>
                <option th:each="t : ${types}" th:value="${t.id}" th:text="${t.libelle}"></option>
            </select>
        </div>

        <div class="mb-3">
            <label class="form-label" for="statut">Statut</label>
            <select class="form-select" id="statut" th:field="*{statut}" required>
                <option value="">-- Choisir un statut --</option>
                <option th:each="s : ${statuts}" th:value="${s}" th:text="${s}"></option>
            </select>
        </div>

        <div class="mb-3">
            <label class="form-label" for="dateInstallation">Date Installation</label>
            <input class="form-control" type="date" id="dateInstallation" th:field="*{dateInstallation}" required />
        </div>

        <div class="mb-3">
            <label class="form-label" for="observation">Observation</label>
            <textarea class="form-control" id="observation" th:field="*{observation}"></textarea>
        </div>

        <div class="d-flex gap-2 mt-4">
            <button class="btn btn-primary" type="submit" th:text="${equipement.id != null} ? 'Modifier' : 'Enregistrer'">
                Enregistrer
            </button>
            <a class="btn btn-secondary" th:href="@{/equipements}">Retour à la liste</a>
        </div>
    </form>
</main>
</body>
</html>
