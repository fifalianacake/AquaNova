<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" th:replace="~{fragments/layout :: layout(~{::title}, ~{::main})}">
<head>
    <title>Formulaire Lot</title>
</head>
<body>
<main>
<h1 th:text="${lot.id} == null ? 'Créer un lot' : 'Modifier le lot ' + ${lot.id}"></h1>

<p th:if="${error}" th:text="${error}" style="color: red;"></p>

<form th:action="${lot.id} == null ? @{/lots} : @{/lots/{id}(id=${lot.id})}" method="post" th:object="${lot}">
    <div>
        <label class="form-label">Code: <input class="form-control" type="text" th:field="*{code}"/></label>
    </div>
    <div>
        <label class="form-label">Espece:
            <select class="form-select" th:field="*{espece.id}">
                <option value="">--</option>
                <option th:each="e : ${especes}" th:value="${e.id}" th:text="${e.nom}"></option>
            </select>
        </label>
    </div>
    <div>
        <label class="form-label">Bassin:
            <select class="form-select" th:field="*{bassin.id}">
                <option value="">--</option>
                <option th:each="b : ${bassins}" th:value="${b.id}" th:text="${b.reference}"></option>
            </select>
        </label>
    </div>
    <div>
        <label class="form-label">Stade:
            <select class="form-select" th:field="*{stadeCroissance.id}">
                <option value="">--</option>
                <option th:each="s : ${stades}" th:value="${s.id}" th:text="${s.nom}"></option>
            </select>
        </label>
    </div>
    <div>
        <label class="form-label">Statut:
            <select class="form-select" th:field="*{statutLot.id}">
                <option value="">--</option>
                <option th:each="st : ${statuts}" th:value="${st.id}" th:text="${st.libelle}"></option>
            </select>
        </label>
    </div>
    <div>
        <label class="form-label">Date mise en charge: <input class="form-control" type="date" th:field="*{dateMiseEnCharge}"/></label>
    </div>
    <div>
        <label class="form-label">Effectif initial: <input class="form-control" type="number" th:field="*{effectifInitial}"/></label>
        <label class="form-label" th:if="${lot.id != null}">Effectif actuel: <input class="form-control" type="number" th:field="*{effectifActuel}"/></label>
    </div>
    <div>
        <label class="form-label">Poids moyen initial: <input class="form-control" type="number" step="0.01" th:field="*{poidsMoyenInitial}"/></label>
        <label class="form-label" th:if="${lot.id != null}">Poids moyen actuel: <input class="form-control" type="number" step="0.01" th:field="*{poidsMoyenActuel}"/></label>
    </div>
    <div>
        <label class="form-label">Observation: <textarea class="form-control" th:field="*{observation}"></textarea></label>
    </div>
    <div>
        <button class="btn btn-primary" type="submit">Save</button>
        <a th:href="@{/lots}">Cancel</a>
    </div>
</form>
</main>
</body>
</html>
