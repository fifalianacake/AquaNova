<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" th:replace="~{fragments/layout :: layout(~{::title}, ~{::main})}">
<head>
    <title>AquaNova - Liste des lots</title>
</head>
<body>
<main>

<div class="toolbar">
    <a class="btn btn-primary" th:href="@{/lots/new}"><i class="bi bi-plus-lg"></i> Créer un nouveau lot</a>
    <a class="btn btn-outline-primary" th:href="@{/production/previsions-recoltes}">Prévision récoltes</a>
</div>

<div class="panel">
    <div class="panel-header">
        <h5>Liste des lots</h5>
        <span class="result-count"
              th:text="${lotPage.totalElements} + ' lot' + (${lotPage.totalElements} > 1 ? 's' : '') + ' trouvé' + (${lotPage.totalElements} > 1 ? 's' : '')"></span>
    </div>

    <form method="get" th:action="@{/lots}" class="filters-bar">
        <input type="hidden" name="page" value="0" />
        <input class="form-control fc-sm" type="number" name="id" placeholder="ID" th:value="${lotFilter.id}">
        <input class="form-control" type="text" name="code" placeholder="Code du lot" th:value="${lotFilter.code}">
        <select class="form-select" name="especeId">
            <option value="">Toutes espèces</option>
            <option th:each="e : ${especes}" th:value="${e.id}" th:text="${e.nom}" th:selected="${lotFilter.especeId} == ${e.id}"></option>
        </select>
        <select class="form-select" name="bassinId">
            <option value="">Tous bassins</option>
            <option th:each="b : ${bassins}" th:value="${b.id}" th:text="${b.reference}" th:selected="${lotFilter.bassinId} == ${b.id}"></option>
        </select>
        <select class="form-select" name="stadeId">
            <option value="">Tous stades</option>
            <option th:each="s : ${stades}" th:value="${s.id}" th:text="${s.nom}" th:selected="${lotFilter.stadeId} == ${s.id}"></option>
        </select>
        <select class="form-select" name="statutId">
            <option value="">Tous statuts</option>
            <option th:each="st : ${statuts}" th:value="${st.id}" th:text="${st.libelle}" th:selected="${lotFilter.statutId} == ${st.id}"></option>
        </select>
        <div class="input-group">
            <span class="input-group-text">Du</span>
            <input class="form-control" type="date" name="dateFrom" th:value="${lotFilter.dateFrom}">
        </div>
        <div class="input-group">
            <span class="input-group-text">Au</span>
            <input class="form-control" type="date" name="dateTo" th:value="${lotFilter.dateTo}">
        </div>
        <input class="form-control fc-sm" type="number" name="effectifMin" placeholder="Eff. min" th:value="${lotFilter.effectifMin}">
        <input class="form-control fc-sm" type="number" name="effectifMax" placeholder="Eff. max" th:value="${lotFilter.effectifMax}">
        <button class="btn btn-primary" type="submit"><i class="bi bi-search"></i> Filtrer</button>
        <a class="btn btn-outline-secondary" th:href="@{/lots}"><i class="bi bi-x-circle"></i> Réinitialiser</a>
    </form>

    <div class="table-responsive">
        <table class="table table-hover align-middle">
            <thead>
            <tr>
                <th th:replace="~{fragments/tableau :: sortableHeader(${lotPage}, 'id', 'ID', '')}"></th>
                <th th:replace="~{fragments/tableau :: sortableHeader(${lotPage}, 'code', 'Code', '')}"></th>
                <th th:replace="~{fragments/tableau :: sortableHeader(${lotPage}, 'espece.nom', 'Espèce', '')}"></th>
                <th th:replace="~{fragments/tableau :: sortableHeader(${lotPage}, 'bassin.reference', 'Bassin', '')}"></th>
                <th th:replace="~{fragments/tableau :: sortableHeader(${lotPage}, 'stadeCroissance.nom', 'Stade', '')}"></th>
                <th th:replace="~{fragments/tableau :: sortableHeader(${lotPage}, 'statutLot.libelle', 'Statut', '')}"></th>
                <th th:replace="~{fragments/tableau :: sortableHeader(${lotPage}, 'dateMiseEnCharge', 'Date mise en charge', '')}"></th>
                <th th:replace="~{fragments/tableau :: sortableHeader(${lotPage}, 'effectifActuel', 'Effectif actuel', 'text-end')}"></th>
                <th class="text-end">Actions</th>
            </tr>
            </thead>
            <tbody>
            <tr th:each="lot : ${lotPage.content}">
                <td th:text="${lot.id}"></td>
                <td class="fw-semibold" th:text="${lot.code}"></td>
                <td th:text="${lot.espece != null ? lot.espece.nom : '—'}"></td>
                <td th:text="${lot.bassin != null ? lot.bassin.reference : '—'}"></td>
                <td th:text="${lot.stadeCroissance != null ? lot.stadeCroissance.nom : '—'}"></td>
                <td><span class="badge badge-info" th:text="${lot.statutLot != null ? lot.statutLot.libelle : '—'}"></span></td>
                <td th:text="${lot.dateMiseEnCharge}"></td>
                <td class="text-end" th:text="${lot.effectifActuel}"></td>
                <td class="text-end">
                    <a class="btn btn-sm btn-outline-primary" th:href="@{'/lots/' + ${lot.id}}" title="Voir les détails"><i class="bi bi-eye"></i></a>
                    <a class="btn btn-sm btn-outline-primary" th:href="@{'/lots/' + ${lot.id} + '/edit'}" title="Modifier"><i class="bi bi-pencil"></i></a>
                    <a class="btn btn-sm btn-outline-danger" th:href="@{'/lots/' + ${lot.id} + '/delete'}" title="Annuler le lot"
                       onclick="return confirm('Passer ce lot au statut ANNULE ?')"><i class="bi bi-trash3"></i></a>
                </td>
            </tr>
            <tr th:if="${lotPage.empty}">
                <td colspan="9" class="text-center text-secondary py-4">Aucun lot ne correspond à ces critères.</td>
            </tr>
            </tbody>
        </table>
    </div>

    <div th:replace="~{fragments/tableau :: tableFooter(${lotPage})}"></div>
</div>
</main>
</body>
</html>
