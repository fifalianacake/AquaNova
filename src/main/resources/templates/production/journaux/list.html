<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" th:replace="~{fragments/layout :: layout(~{::title}, ~{::main})}">
<head>
    <title>Journaux des lots</title>
</head>
<body>
<main>

<h1>Journaux des lots</h1>

<p>
    <a class="btn btn-secondary" th:href="@{/lots}">Retour à la liste des lots</a>
</p>

<form method="get" th:action="@{/journaux-lots}">
    <div>
        <label class="form-label">Lot:
            <select class="form-select" name="lotId">
                <option value="">-- Tous --</option>
                <option th:each="lot : ${lots}"
                        th:value="${lot.id}"
                        th:text="${lot.code}"
                        th:selected="${filter != null && filter.lotId != null && filter.lotId == lot.id}"></option>
            </select>
        </label>

        <label class="form-label">Type:
            <select class="form-select" name="typeEvenement">
                <option value="">-- Tous --</option>
                <option th:each="type : ${typesEvenement}"
                        th:value="${type}"
                        th:text="${type}"
                        th:selected="${filter != null && filter.typeEvenement == type}"></option>
            </select>
        </label>

        <label class="form-label">Du:
            <input class="form-control" type="date" name="dateDebut" th:value="${filter != null ? filter.dateDebut : null}">
        </label>

        <label class="form-label">Au:
            <input class="form-control" type="date" name="dateFin" th:value="${filter != null ? filter.dateFin : null}">
        </label>

        <button class="btn btn-primary" type="submit">Filtrer</button>
        <a th:href="@{/journaux-lots}">Réinitialiser</a>
    </div>
</form>

<table class="table table-hover align-middle">
    <thead>
    <tr>
        <th>Date</th>
        <th>Lot</th>
        <th>Type</th>
        <th>Description</th>
    </tr>
    </thead>
    <tbody>
    <tr th:each="journal : ${journaux}">
        <td th:text="${#temporals.format(journal.dateEvenement, 'dd/MM/yyyy HH:mm')}"></td>
        <td>
            <a th:if="${journal.lot != null}"
               th:href="@{/lots/{id}(id=${journal.lot.id})}"
               th:text="${journal.lot.code}"></a>
            <span th:if="${journal.lot == null}">-</span>
        </td>
        <td th:text="${journal.typeEvenement != null ? journal.typeEvenement.libelle : '-'}"></td>
        <td th:text="${journal.description}"></td>
    </tr>
    <tr th:if="${#lists.isEmpty(journaux)}">
        <td colspan="4">Aucun événement enregistré.</td>
    </tr>
    </tbody>
</table>
</main>
</body>
</html>
