<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Journal du lot</title>
    <style>
        table { border-collapse: collapse; width: 100%; }
        th, td { border: 1px solid #ddd; padding: 8px; text-align: left; }
    </style>
</head>
<body>
<h1>Journal du lot <span th:text="${lot.code}"></span></h1>

<p>
    <strong>ID:</strong> <span th:text="${lot.id}"></span>
    <span> | </span>
    <strong>Bassin:</strong> <span th:text="${lot.bassin != null ? lot.bassin.reference : '-'}"></span>
    <span> | </span>
    <strong>Statut:</strong> <span th:text="${lot.statutLot != null ? lot.statutLot.libelle : '-'}"></span>
</p>

<p>
    <a th:href="@{/lots/{id}(id=${lot.id})}">Retour au lot</a>
    <a th:href="@{/lots}">Retour à la liste des lots</a>
</p>

<table>
    <thead>
    <tr>
        <th>Date</th>
        <th>Type</th>
        <th>Description</th>
    </tr>
    </thead>
    <tbody>
    <tr th:each="journal : ${journaux}">
        <td th:text="${#temporals.format(journal.dateEvenement, 'dd/MM/yyyy HH:mm')}"></td>
        <td th:text="${journal.typeEvenement != null ? journal.typeEvenement.libelle : '-'}"></td>
        <td th:text="${journal.description}"></td>
    </tr>
    <tr th:if="${#lists.isEmpty(journaux)}">
        <td colspan="3">Aucun événement enregistré pour ce lot.</td>
    </tr>
    </tbody>
</table>
</body>
</html>
