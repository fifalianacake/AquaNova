<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" th:replace="~{fragments/layout :: layout(~{::title}, ~{::main})}">
<head>
    <title>AquaNova - Liste des récoltes</title>
</head>
<body>
<main>

<div class="toolbar">
    <a class="btn btn-primary" th:href="@{/recoltes/new}"><i class="bi bi-plus-lg"></i> Créer une récolte</a>
    <a class="btn btn-outline-primary" th:href="@{/types-recoltes}">Gérer les types de récolte</a>
</div>

<div class="panel">
    <div class="panel-header">
        <h5>Liste des récoltes</h5>
        <span class="result-count"
              th:text="${recoltes.totalElements} + ' récolte' + (${recoltes.totalElements} > 1 ? 's' : '') + ' trouvée' + (${recoltes.totalElements} > 1 ? 's' : '')"></span>
    </div>

    <form method="get" th:action="@{/recoltes}" class="filters-bar">
        <input type="hidden" name="page" value="0" />
        <select class="form-select" name="lotId">
            <option value="">Tous les lots</option>
            <option th:each="lot : ${lots}"
                    th:value="${lot.id}"
                    th:text="${lot.code}"
                    th:selected="${filter.lotId == lot.id}"></option>
        </select>
        <select class="form-select" name="typeRecolteId">
            <option value="">Tous les types</option>
            <option th:each="type : ${typesRecolte}"
                    th:value="${type.id}"
                    th:text="${type.libelle}"
                    th:selected="${filter.typeRecolteId == type.id}"></option>
        </select>
        <div class="input-group">
            <span class="input-group-text">Du</span>
            <input class="form-control" type="date" name="dateDebut" th:value="${filter.dateDebut}">
        </div>
        <div class="input-group">
            <span class="input-group-text">Au</span>
            <input class="form-control" type="date" name="dateFin" th:value="${filter.dateFin}">
        </div>
        <button class="btn btn-primary" type="submit"><i class="bi bi-search"></i> Filtrer</button>
        <a class="btn btn-outline-secondary" th:href="@{/recoltes}"><i class="bi bi-x-circle"></i> Réinitialiser</a>
    </form>

    <div class="table-responsive">
        <table class="table table-hover align-middle">
            <thead>
            <tr>
                <th th:replace="~{fragments/tableau :: sortableHeader(${recoltes}, 'id', 'ID', '')}"></th>
                <th th:replace="~{fragments/tableau :: sortableHeader(${recoltes}, 'lot.code', 'Lot', '')}"></th>
                <th th:replace="~{fragments/tableau :: sortableHeader(${recoltes}, 'typeRecolte.libelle', 'Type', '')}"></th>
                <th th:replace="~{fragments/tableau :: sortableHeader(${recoltes}, 'dateRecolte', 'Date', '')}"></th>
                <th th:replace="~{fragments/tableau :: sortableHeader(${recoltes}, 'effectifRecolte', 'Effectif récolté', 'text-end')}"></th>
                <th th:replace="~{fragments/tableau :: sortableHeader(${recoltes}, 'poidsTotal', 'Poids total (kg)', 'text-end')}"></th>
                <th th:replace="~{fragments/tableau :: sortableHeader(${recoltes}, 'poidsMoyen', 'Poids moyen (kg)', 'text-end')}"></th>
                <th th:replace="~{fragments/tableau :: sortableHeader(${recoltes}, 'statut', 'Statut', '')}"></th>
                <th class="text-end">Actions</th>
            </tr>
            </thead>
            <tbody>
            <tr th:each="recolte : ${recoltes.content}">
                <td th:text="${recolte.id}"></td>
                <td class="fw-semibold" th:text="${recolte.lot != null ? recolte.lot.code : '—'}"></td>
                <td th:text="${recolte.typeRecolte != null ? recolte.typeRecolte.libelle : '—'}"></td>
                <td th:text="${recolte.dateRecolte}"></td>
                <td class="text-end" th:text="${recolte.effectifRecolte}"></td>
                <td class="text-end" th:text="${recolte.poidsTotal}"></td>
                <td class="text-end" th:text="${#numbers.formatDecimal(recolte.poidsMoyen, 1,3)}"></td>
                <td><span class="badge badge-info" th:text="${recolte.statut}"></span></td>
                <td class="text-end">
                    <a class="btn btn-sm btn-outline-primary" th:href="@{/recoltes/{id}(id=${recolte.id})}" title="Voir les détails"><i class="bi bi-eye"></i></a>
                </td>
            </tr>
            <tr th:if="${recoltes.empty}">
                <td colspan="9" class="text-center text-secondary py-4">Aucune récolte ne correspond à ces critères.</td>
            </tr>
            </tbody>
        </table>
    </div>

    <div th:replace="~{fragments/tableau :: tableFooter(${recoltes})}"></div>
</div>
</main>
</body>
</html>
