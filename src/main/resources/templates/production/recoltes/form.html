<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" th:replace="~{fragments/layout :: layout(~{::title}, ~{::main})}">
<head>
    <title>Nouvelle récolte</title>
</head>
<body>
<main>
    <h2>Créer une récolte</h2>

    <div class="error" th:if="${error}" th:text="${error}"></div>

    <form class="form-panel" th:action="@{/recoltes}" method="post" th:object="${recolteForm}">
        <div class="mb-3">
            <label class="form-label" for="lotId">Lot</label>
            <select class="form-select" id="lotId" th:field="*{lotId}">
                <option value="">-- Choisir un lot --</option>
                <option th:each="lot : ${lots}"
                        th:value="${lot.id}"
                        th:text="${lot.code + ' - effectif actuel: ' + lot.effectifActuel + ' - poids moyen actuel: ' + lot.poidsMoyenActuel}"></option>
            </select>
        </div>

        <div class="mb-3">
            <label class="form-label" for="typeRecolteId">Type de récolte</label>
            <select class="form-select" id="typeRecolteId" th:field="*{typeRecolteId}">
                <option value="">-- Choisir un type de récolte --</option>
                <option th:each="type : ${typesRecolte}"
                        th:value="${type.id}"
                        th:text="${type.libelle}"></option>
            </select>
        </div>

        <div class="mb-3">
            <label class="form-label" for="dateRecolte">Date de récolte</label>
            <input class="form-control" type="date" id="dateRecolte" th:field="*{dateRecolte}">
        </div>

        <div class="mb-3">
            <label class="form-label" for="effectifRecolte">Effectif récolté</label>
            <input class="form-control" type="number" id="effectifRecolte" th:field="*{effectifRecolte}" min="1">
        </div>

        <div class="d-flex gap-2 mt-4">
            <button class="btn btn-primary" type="submit">Enregistrer</button>
            <a class="btn btn-secondary" th:href="@{/recoltes}">Retour à la liste</a>
        </div>
    </form>
</main>
</body>
</html>
