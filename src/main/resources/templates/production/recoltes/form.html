<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" th:replace="~{fragments/layout :: layout(~{::title}, ~{::main})}">
<head>
    <title>Nouvelle récolte</title>
</head>
<body>
<main>
<h1>Créer une récolte</h1>

<p th:if="${error}" th:text="${error}" style="color: red;"></p>

<form th:action="@{/recoltes}" method="post" th:object="${recolteForm}">
    <div>
        <label class="form-label">Lot:
            <select class="form-select" th:field="*{lotId}">
                <option value="">--</option>
                <option th:each="lot : ${lots}"
                        th:value="${lot.id}"
                        th:text="${lot.code + ' - effectif actuel: ' + lot.effectifActuel + ' - poids moyen actuel: ' + lot.poidsMoyenActuel}"></option>
            </select>
        </label>
    </div>
    <div>
        <label class="form-label">Type de récolte:
            <select class="form-select" th:field="*{typeRecolteId}">
                <option value="">--</option>
                <option th:each="type : ${typesRecolte}"
                        th:value="${type.id}"
                        th:text="${type.libelle}"></option>
            </select>
        </label>
    </div>
    <div>
        <label class="form-label">Date de récolte: <input class="form-control" type="date" th:field="*{dateRecolte}"></label>
    </div>
    <div>
        <label class="form-label">Effectif récolté: <input class="form-control" type="number" th:field="*{effectifRecolte}" min="1"></label>
    </div>
    <div>
        <button class="btn btn-primary" type="submit">Enregistrer</button>
        <a class="btn btn-secondary" th:href="@{/recoltes}">Annuler</a>
    </div>
</form>
</main>
</body>
</html>
