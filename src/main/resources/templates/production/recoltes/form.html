<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Nouvelle récolte</title>
</head>
<body>
<h1>Créer une récolte</h1>

<p th:if="${error}" th:text="${error}" style="color: red;"></p>

<form th:action="@{/recoltes}" method="post" th:object="${recolteForm}">
    <div>
        <label>Lot:
            <select th:field="*{lotId}">
                <option value="">--</option>
                <option th:each="lot : ${lots}"
                        th:value="${lot.id}"
                        th:text="${lot.code + ' - effectif actuel: ' + lot.effectifActuel + ' - poids moyen actuel: ' + lot.poidsMoyenActuel}"></option>
            </select>
        </label>
    </div>
    <div>
        <label>Type de récolte:
            <select th:field="*{typeRecolteId}">
                <option value="">--</option>
                <option th:each="type : ${typesRecolte}"
                        th:value="${type.id}"
                        th:text="${type.libelle}"></option>
            </select>
        </label>
    </div>
    <div>
        <label>Date de récolte: <input type="date" th:field="*{dateRecolte}"></label>
    </div>
    <div>
        <label>Effectif récolté: <input type="number" th:field="*{effectifRecolte}" min="1"></label>
    </div>
    <div>
        <button type="submit">Enregistrer</button>
        <a th:href="@{/recoltes}">Annuler</a>
    </div>
</form>

</body>
</html>
