<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" th:replace="~{fragments/layout :: layout(~{::title}, ~{::main})}">
<head>
    <title>Production - Saisie Mortalité</title>
</head>
<body>
<main>
    <h2 class="mb-4" th:text="${mortalite.id == null ? 'Nouvelle Mortalité' : 'Modifier la Mortalité'}">Saisie Mortalité</h2>

    <p th:if="${error}" th:text="${error}" style="color: red;"></p>

    <form th:action="@{/mortalites}" th:object="${mortalite}" method="post" class="col-md-6">
        <input type="hidden" th:field="*{id}" />

        <div class="mb-3">
            <label for="lot" class="form-label">Lot :</label>
            <select id="lot" th:field="*{lot.id}" class="form-control" required>
                <option value="">-- Choisir un lot --</option>
                <option th:each="lot : ${lots}" th:value="${lot.id}" th:text="${lot.code}"></option>
            </select>
        </div>

        <div class="mb-3">
            <label for="dateMortalite" class="form-label">Date :</label>
            <input type="date" id="dateMortalite" th:field="*{dateMortalite}" class="form-control" required />
        </div>

        <div class="mb-3">
            <label for="nbMorts" class="form-label">Nombre de Morts :</label>
            <input type="number" id="nbMorts" th:field="*{nbMorts}" class="form-control" required min="1" />
        </div>

        <div class="mb-3">
            <label for="cause" class="form-label">Cause (Optionnelle) :</label>
            <textarea id="cause" th:field="*{cause}" class="form-control" rows="3"></textarea>
        </div>

        <button type="submit" class="btn btn-primary"
            th:text="${mortalite.id == null ? 'Créer' : 'Enregistrer'}">Enregistrer</button>
        <a th:href="@{/mortalites}" class="btn btn-secondary">Annuler</a>
    </form>
</main>
</body>
</html>
