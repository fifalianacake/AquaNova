<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" th:replace="~{fragments/layout :: layout(~{::title}, ~{::main})}">
<head>
    <title>Production - Saisie Mortalité</title>
</head>
<body>
<main>
    <h2 th:text="${mortalite.id == null ? 'Nouvelle Mortalité' : 'Modifier la Mortalité'}">Saisie Mortalité</h2>

    <div class="error" th:if="${error}" th:text="${error}"></div>

    <form class="form-panel" th:action="@{/mortalites}" th:object="${mortalite}" method="post">
        <input type="hidden" th:field="*{id}" />

        <div class="mb-3">
            <label class="form-label" for="lot">Lot</label>
            <select class="form-select" id="lot" th:field="*{lot.id}" required>
                <option value="">-- Choisir un lot --</option>
                <option th:each="lot : ${lots}" th:value="${lot.id}" th:text="${lot.code}"></option>
            </select>
        </div>

        <div class="mb-3">
            <label class="form-label" for="dateMortalite">Date</label>
            <input class="form-control" type="date" id="dateMortalite" th:field="*{dateMortalite}" required />
        </div>

        <div class="mb-3">
            <label class="form-label" for="nbMorts">Nombre de Morts</label>
            <input class="form-control" type="number" id="nbMorts" th:field="*{nbMorts}" required min="1" />
        </div>

        <div class="mb-3">
            <label class="form-label" for="cause">Cause (Optionnelle)</label>
            <textarea class="form-control" id="cause" th:field="*{cause}" rows="3"></textarea>
        </div>

        <div class="d-flex gap-2 mt-4">
            <button class="btn btn-primary" type="submit">Enregistrer</button>
            <a class="btn btn-secondary" th:href="@{/mortalites}">Retour à la liste</a>
        </div>
    </form>
</main>
</body>
</html>
