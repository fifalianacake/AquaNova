<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <title>Production - Liste des Mortalités</title>
    <link rel="stylesheet" th:href="@{/css/bootstrap.min.css}">
</head>

<body class="container mt-5">

    <div class="d-flex justify-content-between align-items-center mb-4">
        <h2>Suivi des Mortalités</h2>
        <div>
            <a th:href="@{/production/mortalites/nouveau}" class="btn btn-primary">Ajouter une Mortalité</a>
        </div>
    </div>

    <table class="table table-bordered table-striped">
        <thead class="table-dark">
            <tr>
                <th>ID</th>
                <th>ID Lot</th>
                <th>Date</th>
                <th>Nombre de Morts</th>
                <th>Cause</th>
                <th>Actions</th>
            </tr>
        </thead>
        <tbody>
            <tr th:each="m : ${mortalites}">
                <td th:text="${m.id}">1</td>
                <td th:text="${m.idLot}">101</td>
                <td th:text="${#temporals.format(m.dateMortalite, 'dd/MM/yyyy')}">01/01/2026</td>
                <td th:text="${m.nbMorts}">5</td>
                <td th:text="${m.cause != null ? m.cause : '-'}">Maladie</td>
                <td>
                    <a th:href="@{/production/mortalites/modifier/{id}(id=${m.id})}"
                        class="btn btn-sm btn-warning">Modifier</a>
                    <a th:href="@{/production/mortalites/supprimer/{id}(id=${m.id})}" class="btn btn-sm btn-danger"
                        onclick="return confirm('Voulez-vous supprimer cette entrée de mortalité ?')">Supprimer</a>
                </td>
            </tr>
            <tr th:if="${#lists.isEmpty(mortalites)}">
                <td colspan="6" class="text-center">Aucune mortalité enregistrée.</td>
            </tr>
        </tbody>
    </table>

</body>

</html>
