<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" th:replace="~{fragments/layout :: layout(~{::title}, ~{::main})}">
<head>
    <title>Formulaire Statut Lot</title>
</head>
<body>
<main>
    <h2 th:text="${statut.id} == null ? 'Créer un statut' : 'Modifier statut ' + ${statut.id}"></h2>

    <form class="form-panel" th:action="${statut.id} == null ? @{/statut-lots} : @{/statut-lots/{id}(id=${statut.id})}" method="post" th:object="${statut}">
        <div class="mb-3">
            <label class="form-label" for="libelle">Libellé</label>
            <select class="form-select" id="libelle" th:field="*{libelle}">
                <option th:each="val : ${libelles}" th:value="${val}" th:text="${val}"></option>
            </select>
        </div>

        <div class="mb-3">
            <label class="form-label" for="description">Description</label>
            <textarea class="form-control" id="description" th:field="*{description}"></textarea>
        </div>

        <div class="d-flex gap-2 mt-4">
            <button class="btn btn-primary" type="submit">Enregistrer</button>
            <a class="btn btn-secondary" th:href="@{/statut-lots}">Retour à la liste</a>
        </div>
    </form>
</main>
</body>
</html>
