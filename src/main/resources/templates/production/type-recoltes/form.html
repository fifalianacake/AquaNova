<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Type de récolte</title>
</head>
<body>
<h1 th:text="${type.id} == null ? 'Créer un type de récolte' : 'Modifier le type #' + ${type.id}"></h1>

<form th:action="${type.id} == null ? @{/types-recoltes} : @{/types-recoltes/{id}(id=${type.id})}"
      th:object="${type}"
      method="post">
    <div>
        <label>Libellé:
            <select th:field="*{libelle}" required>
                <option value="">-- Choisir --</option>
                <option th:each="libelle : ${libelles}"
                        th:value="${libelle}"
                        th:text="${libelle}"></option>
            </select>
        </label>
    </div>
    <div>
        <label>Description:
            <textarea th:field="*{description}" required></textarea>
        </label>
    </div>
    <div>
        <button type="submit">Enregistrer</button>
        <a th:href="@{/types-recoltes}">Annuler</a>
    </div>
</form>
</body>
</html>
