<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" th:replace="~{fragments/layout :: layout(~{::title}, ~{::main})}">
<head>
    <title>AquaNova - Détail du type de récolte</title>
</head>
<body>
<main>

<div class="d-flex justify-content-between align-items-start flex-wrap gap-2 mb-3">
    <div>
        <h2 class="mb-1" th:text="${type.libelle}">Type de récolte</h2>
        <span class="text-secondary small" th:text="'Type de récolte #' + ${type.id}"></span>
    </div>
    <div class="d-flex gap-2 flex-wrap">
        <a class="btn btn-outline-secondary" th:href="@{/types-recoltes}"><i class="bi bi-arrow-left"></i> Retour</a>
        <a class="btn btn-outline-primary" th:href="@{/types-recoltes/{id}/edit(id=${type.id})}"><i class="bi bi-pencil"></i> Modifier</a>
    </div>
</div>

<div class="panel">
    <div class="panel-header"><h5>Informations</h5></div>
    <div class="info-grid">
        <div class="info-row">
            <div class="info-label">Libellé</div>
            <div class="info-value fw-semibold" th:text="${type.libelle}">—</div>
        </div>
        <div class="info-row">
            <div class="info-label">Identifiant</div>
            <div class="info-value" th:text="${type.id}">—</div>
        </div>
        <div class="info-row info-row-full">
            <div class="info-label">Description</div>
            <div class="info-value"
                 th:text="${type.description != null and !type.description.isBlank() ? type.description : 'Aucune description.'}">—</div>
        </div>
    </div>
</div>

</main>
</body>
</html>
