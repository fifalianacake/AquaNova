<!DOCTYPE html>

<head>
    <title>Détail type de récolte</title>
</head>
<body>
<main>
<h1>Détail type de récolte</h1>

<p><strong>ID:</strong> <span th:text="${type.id}"></span></p>

<p><strong>Description:</strong> <span th:text="${type.description}"></span></p>

<div>

    <a class="btn btn-secondary" th:href="@{/types-recoltes}">Retour</a>
</div>
</main>
</body>
</html>
