<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>

<body>
    <h1 th:text="${transfert != null ? 'Modifier le transfert' : 'Créer un nouveau transfert'}"></h1>

    <form th:action="@{${transfert != null} ? '/transferts/edit/' + ${transfert.id} : '/transferts/save'}"
        th:object="${transfert}" method="post">
        <div>
            <label for="dateTransfert">Date de transfert</label>
            <input type="datetime-local" id="dateTransfert" th:field="*{dateTransfert}">
        </div>

        <div>
            <label for="effectif">Effectif</label>
            <input type="number" id="effectif" th:field="*{effectif}">
        </div>

        <div>
            <label for="poidsMoyen">Poids moyen</label>
            <input type="number" step="0.01" id="poidsMoyen" th:field="*{poidsMoyen}">
        </div>

        <div>
            <label for="lotSource">Lot source</label>
            <select id="lotSource" th:field="*{lotSource}">
                <option value="" disabled>-- Choisir un lot source --</option>
                <option th:each="lot : ${lots}" th:value="${lot.id}" th:text="${lot.libelle}"></option>
            </select>
        </div>

        <div>
            <label for="lotDestination">Lot destination</label>
            <select id="lotDestination" th:field="*{lotDestination}">
                <option value="" disabled>-- Choisir un lot destination --</option>
                <option th:each="lot : ${lots}" th:value="${lot.id}" th:text="${lot.libelle}"></option>
            </select>
        </div>

        <div>
            <label for="bassinSource">Bassin source</label>
            <select id="bassinSource" th:field="*{bassinSource}">
                <option value="" disabled>-- Choisir un bassin source --</option>
                <option th:each="bassin : ${bassins}" th:value="${bassin.id}" th:text="${bassin.libelle}"></option>
            </select>
        </div>

        <div>
            <label for="bassinDestination">Bassin destination</label>
            <select id="bassinDestination" th:field="*{bassinDestination}">
                <option value="" disabled>-- Choisir un bassin destination --</option>
                <option th:each="bassin : ${bassins}" th:value="${bassin.id}" th:text="${bassin.libelle}"></option>
            </select>

        </div>

    </form>
    <div>
        <button type="submit">Enregistrer</button>
        <a th:href="@{/transferts}">Retour à la liste</a>
    </div>
</body>

</html>
