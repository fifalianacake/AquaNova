<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" th:replace="~{fragments/layout :: layout(~{::title}, ~{::main})}">
<head>
    <title>AquaNova - Nouveau transfert</title>
</head>
<body>
<main>
    <h2>Créer un nouveau transfert</h2>

    <div class="error" th:if="${error}" th:text="${error}"></div>

    <form class="form-panel" th:action="@{/transferts}" th:object="${transfert}" method="post">
        <div class="mb-3">
            <label class="form-label" for="dateTransfert">Date de transfert</label>
            <input class="form-control" type="date" id="dateTransfert" th:field="*{dateTransfert}" required>
        </div>

        <div class="mb-3">
            <label class="form-label" for="effectif">Effectif</label>
            <input class="form-control" type="number" id="effectif" th:field="*{effectif}" min="1" required>
        </div>

        <div class="mb-3">
            <label class="form-label" for="poidsMoyen">Poids moyen</label>
            <input class="form-control" type="number" step="0.01" id="poidsMoyen" th:field="*{poidsMoyen}" min="0.01" required>
        </div>

        <div class="mb-3">
            <label class="form-label" for="lotSource">Lot source</label>
            <select class="form-select" id="lotSource" th:field="*{lotSource.id}" required>
                <option value="">-- Choisir un lot source --</option>
                <option th:each="lot : ${lots}" th:value="${lot.id}" th:text="${lot.code}"></option>
            </select>
        </div>

        <div class="mb-3">
            <label class="form-label" for="codeLotDestination">Code du nouveau lot destination</label>
            <input class="form-control" type="text" id="codeLotDestination" th:field="*{codeLotDestination}">
        </div>

        <div class="mb-3">
            <label class="form-label" for="bassinSource">Bassin source</label>
            <select class="form-select" id="bassinSource" th:field="*{bassinSource.id}" required>
                <option value="">-- Choisir un bassin source --</option>
                <option th:each="bassin : ${bassins}" th:value="${bassin.id}" th:text="${bassin.reference}"></option>
            </select>
        </div>

        <div class="mb-3">
            <label class="form-label" for="bassinDestination">Bassin destination</label>
            <select class="form-select" id="bassinDestination" th:field="*{bassinDestination.id}" required>
                <option value="">-- Choisir un bassin destination --</option>
                <option th:each="bassin : ${bassins}" th:value="${bassin.id}" th:text="${bassin.reference}"></option>
            </select>
        </div>

        <div class="d-flex gap-2 mt-4">
            <button class="btn btn-primary" type="submit">Enregistrer</button>
            <a class="btn btn-secondary" th:href="@{/transferts}">Retour à la liste</a>
        </div>
    </form>
</main>
</body>
</html>
