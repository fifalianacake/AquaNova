<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" th:replace="~{fragments/layout :: layout(~{::title}, ~{::main})}">
<head>
    <title>Liste des transferts</title>
</head>
<body>
<main>
    <h1>Liste des transferts</h1>

    <p>
        <a class="btn btn-primary" th:href="@{/transferts/new}">Creer un nouveau transfert</a>
    </p>

    <table class="table table-hover align-middle">
        <thead>
            <tr>
                <th>ID</th>
                <th>Date de transfert</th>
                <th>Effectif</th>
                <th>Poids moyen</th>
                <th>Lot source</th>
                <th>Lot destination</th>
                <th>Bassin source</th>
                <th>Bassin destination</th>
                <th>Actions</th>
            </tr>
        </thead>
        <tbody>
            <tr th:each="transfert : ${transferts}">
                <td th:text="${transfert.id}"></td>
                <td th:text="${transfert.dateTransfert}"></td>
                <td th:text="${transfert.effectif}"></td>
                <td th:text="${transfert.poidsMoyen}"></td>
                <td th:text="${transfert.lotSource != null ? transfert.lotSource.code : '-'}"></td>
                <td th:text="${transfert.lotDestination != null ? transfert.lotDestination.code : '-'}"></td>
                <td th:text="${transfert.bassinSource != null ? transfert.bassinSource.reference : '-'}"></td>
                <td th:text="${transfert.bassinDestination != null ? transfert.bassinDestination.reference : '-'}"></td>
                <td>
                    <a class="btn btn-sm btn-outline-primary" th:href="@{'/transferts/' + ${transfert.id}}">Voir</a>
                </td>
            </tr>
        </tbody>
    </table>
</main>
</body>
</html>
