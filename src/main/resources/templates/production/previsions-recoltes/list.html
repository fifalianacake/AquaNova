<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Prévision récoltes</title>
    <style>
        table { border-collapse: collapse; width: 100%; margin-top: 16px; }
        th, td { border: 1px solid #ddd; padding: 8px; text-align: left; }
        .info { background: #eef6ff; border: 1px solid #b7d7f5; padding: 10px; margin: 12px 0; }
        .warning { color: #8a5a00; }
        .badge { background: #dff5e5; border: 1px solid #9dd5aa; padding: 2px 6px; }
    </style>
</head>
<body>
<h1>Prévision récoltes</h1>

<p>
    <a th:href="@{/lots}">Retour aux lots</a>
</p>

<form method="get" th:action="@{/production/previsions-recoltes}">
    <div>
        <label>Lot:
            <select name="lotId">
                <option value="">-- Tous --</option>
                <option th:each="lot : ${lots}"
                        th:value="${lot.id}"
                        th:text="${lot.code}"
                        th:selected="${filter != null && filter.lotId != null && filter.lotId == lot.id}"></option>
            </select>
        </label>

        <label>Espèce:
            <select name="especeId">
                <option value="">-- Toutes --</option>
                <option th:each="espece : ${especes}"
                        th:value="${espece.id}"
                        th:text="${espece.nom}"
                        th:selected="${filter != null && filter.especeId != null && filter.especeId == espece.id}"></option>
            </select>
        </label>

        <label>Bassin:
            <select name="bassinId">
                <option value="">-- Tous --</option>
                <option th:each="bassin : ${bassins}"
                        th:value="${bassin.id}"
                        th:text="${bassin.reference}"
                        th:selected="${filter != null && filter.bassinId != null && filter.bassinId == bassin.id}"></option>
            </select>
        </label>
    </div>

    <div>
        <label>Date estimée du:
            <input type="date" name="dateDebut" th:value="${filter != null ? filter.dateDebut : null}">
        </label>

        <label>au:
            <input type="date" name="dateFin" th:value="${filter != null ? filter.dateFin : null}">
        </label>

        <button type="submit">Filtrer</button>
        <a th:href="@{/production/previsions-recoltes}">Réinitialiser</a>
    </div>
</form>

<div class="info" th:if="${!#lists.isEmpty(lotsProchesRecolte)}">
    <strong>Lots proches de la récolte:</strong>
    <span th:each="prevision, iter : ${lotsProchesRecolte}">
        <a th:href="@{/lots/{id}(id=${prevision.lot.id})}" th:text="${prevision.lot.code}"></a><span th:if="${!iter.last}">, </span>
    </span>
</div>

<table>
    <thead>
    <tr>
        <th>Lot</th>
        <th>Espèce</th>
        <th>Bassin</th>
        <th>Poids moyen actuel</th>
        <th>Poids cible</th>
        <th>Croissance moyenne estimée</th>
        <th>Date estimée de récolte</th>
        <th>Statut</th>
    </tr>
    </thead>
    <tbody>
    <tr th:each="prevision : ${previsions}">
        <td>
            <a th:href="@{/lots/{id}(id=${prevision.lot.id})}" th:text="${prevision.lot.code}"></a>
        </td>
        <td th:text="${prevision.lot.espece != null ? prevision.lot.espece.nom : '-'}"></td>
        <td th:text="${prevision.lot.bassin != null ? prevision.lot.bassin.reference : '-'}"></td>
        <td th:text="${prevision.poidsMoyenActuel != null ? prevision.poidsMoyenActuel : '-'}"></td>
        <td th:text="${prevision.poidsCible != null ? prevision.poidsCible : '-'}"></td>
        <td th:text="${prevision.croissanceMoyenneJournaliere != null ? prevision.croissanceMoyenneJournaliere + ' / jour' : '-'}"></td>
        <td th:text="${prevision.dateRecolteEstimee != null ? prevision.dateRecolteEstimee : '-'}"></td>
        <td>
            <span class="badge" th:if="${prevision.procheRecolte}">Proche récolte</span>
            <span class="warning" th:if="${prevision.alerte != null}" th:text="${prevision.alerte}"></span>
            <span th:if="${!prevision.procheRecolte && prevision.alerte == null}">En croissance</span>
        </td>
    </tr>
    <tr th:if="${#lists.isEmpty(previsions)}">
        <td colspan="8">Aucune prévision trouvée.</td>
    </tr>
    </tbody>
</table>
</body>
</html>
