<!DOCTYPE html>
<html lang="fr" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Historique des pesées</title>
</head>

<body>
    <h1>Historique des pesées - Lot N° <span th:text="${idLot}"></span></h1>

    <p>
        <a th:href="@{'/lots/' + ${idLot} + '/pesees/new'}">Enregistrer une nouvelle pesée</a>
    </p>

    <table border="1">
        <thead>
            <tr>
                <th>Date</th>
                <th>Nb Échantillons</th>
                <th>Poids Total (kg)</th>
                <th>Poids Moyen (g)</th>
                <th>Observation</th>
                <th>Actions</th>
            </tr>
        </thead>
        <tbody>
            <tr th:each="p : ${pesees}">
                <td th:text="${p.datePesee}"></td>
                <td th:text="${p.nbEchantillon}"></td>
                <td th:text="${p.poidsTotalEchantillon}"></td>
                <td th:text="${p.poidsMoyen}"></td>
                <td th:text="${p.observation}"></td>
                <td>
                    <a th:href="@{'/pesees/' + ${p.id} + '/edit'}">Modifier</a>
                    |
                    <a th:href="@{'/pesees/' + ${p.id} + '/delete'}"
                        onclick="return confirm('Supprimer cette pesée ?');">Supprimer</a>
                </td>
            </tr>
        </tbody>
    </table>
</body>

</html>
