<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" th:replace="~{fragments/layout :: layout(~{::title}, ~{::main})}">
<head>
    <title>AquaNova - Historique des pesées</title>
</head>
<body>
<main>

<div class="toolbar">
    <a class="btn btn-primary" th:href="@{'/lots/' + ${idLot} + '/pesees/new'}"><i class="bi bi-plus-lg"></i> Enregistrer une nouvelle pesée</a>
    <a class="btn btn-outline-primary" th:href="@{'/lots/' + ${idLot}}"><i class="bi bi-arrow-left"></i> Retour au lot</a>
</div>

<div class="panel">
    <div class="panel-header">
        <h5 th:text="'Historique des pesées - Lot N° ' + ${idLot}"></h5>
        <span class="result-count"
              th:text="${pesees.totalElements} + ' pesée' + (${pesees.totalElements} > 1 ? 's' : '') + ' trouvée' + (${pesees.totalElements} > 1 ? 's' : '')"></span>
    </div>

    <form method="get" th:action="@{/lots/{idLot}/pesees(idLot=${idLot})}" class="filters-bar">
        <input type="hidden" name="page" value="0" />
        <div class="input-group">
            <span class="input-group-text">Du</span>
            <input class="form-control" type="date" name="dateDebut" th:value="${filter.dateDebut}">
        </div>
        <div class="input-group">
            <span class="input-group-text">Au</span>
            <input class="form-control" type="date" name="dateFin" th:value="${filter.dateFin}">
        </div>
        <button class="btn btn-primary" type="submit"><i class="bi bi-search"></i> Filtrer</button>
        <a class="btn btn-outline-secondary" th:href="@{/lots/{idLot}/pesees(idLot=${idLot})}"><i class="bi bi-x-circle"></i> Réinitialiser</a>
    </form>

    <div class="table-responsive">
        <table class="table table-hover align-middle">
            <thead>
            <tr>
                <th>Date</th>
                <th class="text-end">Nb échantillons</th>
                <th class="text-end">Poids total (kg)</th>
                <th class="text-end">Poids moyen (g)</th>
                <th>Observation</th>
                <th class="text-end">Actions</th>
            </tr>
            </thead>
            <tbody>
            <tr th:each="p : ${pesees.content}">
                <td th:text="${p.datePesee}"></td>
                <td class="text-end" th:text="${p.nbEchantillon}"></td>
                <td class="text-end" th:text="${p.poidsTotalEchantillon}"></td>
                <td class="text-end" th:text="${p.poidsMoyen}"></td>
                <td th:text="${p.observation}"></td>
                <td class="text-end">
                    <a class="btn btn-sm btn-outline-primary" th:href="@{'/pesees/' + ${p.id} + '/edit'}" title="Modifier"><i class="bi bi-pencil"></i></a>
                    <a class="btn btn-sm btn-outline-danger" th:href="@{'/pesees/' + ${p.id} + '/delete'}" title="Supprimer"
                       onclick="return confirm('Supprimer cette pesée ?');"><i class="bi bi-trash3"></i></a>
                </td>
            </tr>
            <tr th:if="${pesees.empty}">
                <td colspan="6" class="text-center text-secondary py-4">Aucune pesée ne correspond à ces critères.</td>
            </tr>
            </tbody>
        </table>
    </div>

    <div th:replace="~{fragments/tableau :: tableFooter(${pesees})}"></div>
</div>
</main>
</body>
</html>
