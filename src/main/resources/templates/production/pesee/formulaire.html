<!DOCTYPE html>
<html lang="fr" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Enregistrer une pesée</title>
</head>

<body>
    <h1>Enregistrer une pesée pour le lot <span th:text="${idLot}"></span></h1>

    <p th:if="${error}" th:text="${error}" style="color: red;"></p>

    <form th:action="@{/production/pesee/enregistrer}" method="post">
        <input type="hidden" name="idLot" th:value="${idLot}">

        <div>
            <label>Date de pesée :</label>
            <input type="date" name="datePesee" th:value="${datePesee}" required>
        </div>
        <div>
            <label>Nombre d'échantillons :</label>
            <input type="number" name="nbEchantillon" th:value="${nbEchantillon}" required>
        </div>
        <div>
            <label>Poids Total (kg) :</label>
            <input type="number" step="0.01" name="poidsTotal" th:value="${poidsTotal}" required>
        </div>
        <div>
            <label>Observation :</label>
            <textarea name="observation" th:text="${observation}"></textarea>
        </div>
        
        <p>
            <button type="submit">Enregistrer</button>
            <a th:href="@{'/production/pesee/liste/' + ${idLot}}">Annuler</a>
        </p>
    </form>
</body>

</html>
