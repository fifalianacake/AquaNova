<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" th:replace="~{fragments/layout :: layout(~{::title}, ~{::main})}">
<head>
    <title>Edit Weighing</title>
</head>
<body>
<main>
    <h1>Edit Weighing</h1>
    <p th:if="${error}" th:text="${error}" style="color: red;"></p>

    <form th:action="@{'/pesees/' + ${pese.id}}" method="post">

        <label class="form-label">Date:</label>
        <input class="form-control" type="date" name="datePesee" th:value="${pese.datePesee}" required><br>

        <label class="form-label">Sample Size:</label>
        <input class="form-control" type="number" name="nbEchantillon" th:value="${pese.nbEchantillon}" required><br>

        <label class="form-label">Total Weight (kg):</label>
        <input class="form-control" type="number" step="0.01" name="poidsTotal" th:value="${pese.poidsTotalEchantillon}" required><br>

        <label class="form-label">Observation:</label>
        <textarea class="form-control" name="observation" th:text="${pese.observation}"></textarea><br>

        <button class="btn btn-primary" type="submit">Update</button>
        <a th:href="@{'/lots/' + ${pese.lot.id} + '/pesees'}">Cancel</a>
    </form>
</main>
</body>
</html>
