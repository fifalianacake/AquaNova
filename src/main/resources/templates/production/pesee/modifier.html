<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" th:replace="~{fragments/layout :: layout(~{::title}, ~{::main})}">
<head>
    <title>Modifier une pesée</title>
</head>
<body>
<main>
    <h2>Modifier une pesée</h2>

    <div class="error" th:if="${error}" th:text="${error}"></div>

    <form class="form-panel" th:action="@{'/pesees/' + ${pese.id}}" method="post">
        <div class="mb-3">
            <label class="form-label" for="datePesee">Date</label>
            <input class="form-control" type="date" id="datePesee" name="datePesee" th:value="${pese.datePesee}" required>
        </div>

        <div class="mb-3">
            <label class="form-label" for="nbEchantillon">Nombre d'échantillons</label>
            <input class="form-control" type="number" min="1" id="nbEchantillon" name="nbEchantillon" th:value="${pese.nbEchantillon}" required>
        </div>

        <div class="mb-3">
            <label class="form-label" for="poidsTotal">Poids total de l'échantillon (g)</label>
            <input class="form-control" type="number" step="0.01" min="0.01" id="poidsTotal" name="poidsTotal" th:value="${pese.poidsTotalEchantillon}" required>
            <div class="form-text">Le poids moyen (g) est recalculé automatiquement : poids total ÷ nombre d'échantillons.</div>
        </div>

        <div class="mb-3">
            <label class="form-label" for="observation">Observation</label>
            <textarea class="form-control" id="observation" name="observation" th:text="${pese.observation}"></textarea>
        </div>

        <div class="d-flex gap-2 mt-4">
            <button class="btn btn-primary" type="submit">Enregistrer</button>
            <a class="btn btn-secondary" th:href="@{'/lots/' + ${pese.lot.id} + '/pesees'}">Retour à la liste</a>
        </div>
    </form>
</main>
</body>
</html>
