<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Edit Weighing</title>
</head>
<body>
    <h1>Edit Weighing</h1>
    <p th:if="${error}" th:text="${error}" style="color: red;"></p>

    <form th:action="@{'/pesees/' + ${pese.id}}" method="post">

        <label>Date:</label>
        <input type="date" name="datePesee" th:value="${pese.datePesee}" required><br>

        <label>Sample Size:</label>
        <input type="number" name="nbEchantillon" th:value="${pese.nbEchantillon}" required><br>

        <label>Total Weight (kg):</label>
        <input type="number" step="0.01" name="poidsTotal" th:value="${pese.poidsTotalEchantillon}" required><br>

        <label>Observation:</label>
        <textarea name="observation" th:text="${pese.observation}"></textarea><br>

        <button type="submit">Update</button>
        <a th:href="@{'/lots/' + ${pese.lot.id} + '/pesees'}">Cancel</a>
    </form>
</body>
</html>
