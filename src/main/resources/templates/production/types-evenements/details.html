<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" th:replace="~{fragments/layout :: layout(~{::title}, ~{::main})}">
<head>
    <title>AquaNova - Détail du type d'événement</title>
</head>
<body>
<main>

<div class="d-flex justify-content-between align-items-start flex-wrap gap-2 mb-3">
    <div>
        <h2 class="mb-1" th:text="${type.libelle}">Type d'événement</h2>
        <div class="d-flex gap-2 align-items-center flex-wrap">
            <span class="badge badge-info" th:if="${type.code != null}" th:text="${type.code}"></span>
            <span class="text-secondary small" th:text="'Référence #' + ${type.id}"></span>
        </div>
    </div>
    <div class="d-flex gap-2 flex-wrap">
        <a class="btn btn-outline-secondary" th:href="@{/types-evenements-lot}"><i class="bi bi-arrow-left"></i> Retour</a>
        <a class="btn btn-outline-primary" th:href="@{/types-evenements-lot/{id}/edit(id=${type.id})}"><i class="bi bi-pencil"></i> Modifier</a>
    </div>
</div>

<div class="panel">
    <div class="panel-header"><h5>Informations</h5></div>
    <div class="info-grid">
        <div class="info-row">
            <div class="info-label">Code</div>
            <div class="info-value fw-semibold" th:text="${type.code}">—</div>
        </div>
        <div class="info-row">
            <div class="info-label">Libellé</div>
            <div class="info-value" th:text="${type.libelle}">—</div>
        </div>
        <div class="info-row">
            <div class="info-label">Identifiant</div>
            <div class="info-value" th:text="${type.id}">—</div>
        </div>
    </div>
</div>

</main>
</body>
</html>
