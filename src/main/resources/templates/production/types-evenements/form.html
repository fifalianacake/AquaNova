<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Type d'événement de lot</title>
</head>
<body>
<h1 th:text="${type.id} == null ? 'Créer un type d’événement' : 'Modifier le type #' + ${type.id}"></h1>

<form th:action="${type.id} == null ? @{/production/types-evenements} : @{/production/types-evenements/{id}(id=${type.id})}"
      th:object="${type}"
      method="post">
    <div>
        <label>Code:
            <input type="text" th:field="*{code}" required>
        </label>
    </div>
    <div>
        <label>Libellé:
            <select th:field="*{libelle}" required>
                <option value="">-- Choisir --</option>
                <option th:each="libelle : ${libelles}"
                        th:value="${libelle}"
                        th:text="${libelle}"></option>
            </select>
        </label>
    </div>
    <div>
        <button type="submit">Enregistrer</button>
        <a th:href="@{/production/types-evenements}">Annuler</a>
    </div>
</form>
</body>
</html>
