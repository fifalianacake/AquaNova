<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" th:replace="~{fragments/layout :: layout(~{::title}, ~{::main})}">
<head>
    <title>Type d'événement de lot</title>
</head>
<body>
<main>
<h1 th:text="${type.id} == null ? 'Créer un type d’événement' : 'Modifier le type #' + ${type.id}"></h1>

<form th:action="${type.id} == null ? @{/types-evenements-lot} : @{/types-evenements-lot/{id}(id=${type.id})}"
      th:object="${type}"
      method="post">
    <div>
        <label class="form-label">Code:
            <input class="form-control" type="text" th:field="*{code}" required>
        </label>
    </div>
    <div>
        <label class="form-label">Libellé:
            <select class="form-select" th:field="*{libelle}" required>
                <option value="">-- Choisir --</option>
                <option th:each="libelle : ${libelles}"
                        th:value="${libelle}"
                        th:text="${libelle}"></option>
            </select>
        </label>
    </div>
    <div>
        <button class="btn btn-primary" type="submit">Enregistrer</button>
        <a class="btn btn-secondary" th:href="@{/types-evenements-lot}">Annuler</a>
    </div>
</form>
</main>
</body>
</html>
