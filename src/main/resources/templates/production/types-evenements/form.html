<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" th:replace="~{fragments/layout :: layout(~{::title}, ~{::main})}">
<head>
    <title>Type d'événement de lot</title>
</head>
<body>
<main>
    <h2 th:text="${type.id} == null ? 'Créer un type d’événement' : 'Modifier le type #' + ${type.id}"></h2>

    <form class="form-panel" th:action="${type.id} == null ? @{/types-evenements-lot} : @{/types-evenements-lot/{id}(id=${type.id})}"
          th:object="${type}"
          method="post">
        <div class="mb-3">
            <label class="form-label" for="code">Code</label>
            <input class="form-control" type="text" id="code" th:field="*{code}" required>
        </div>

        <div class="mb-3">
            <label class="form-label" for="libelle">Libellé</label>
            <select class="form-select" id="libelle" th:field="*{libelle}" required>
                <option value="">-- Choisir --</option>
                <option th:each="libelle : ${libelles}"
                        th:value="${libelle}"
                        th:text="${libelle}"></option>
            </select>
        </div>

        <div class="d-flex gap-2 mt-4">
            <button class="btn btn-primary" type="submit">Enregistrer</button>
            <a class="btn btn-secondary" th:href="@{/types-evenements-lot}">Retour à la liste</a>
        </div>
    </form>
</main>
</body>
</html>
