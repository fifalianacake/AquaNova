<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Types d'événements de lot</title>
</head>
<body>
<h1>Types d'événements de lot</h1>

<div>
    <a th:href="@{/production/types-evenements/new}">Créer un type d'événement</a>
    <a th:href="@{/journaux}">Retour aux journaux</a>
</div>

<table>
    <thead>
    <tr>
        <th>ID</th>
        <th>Code</th>
        <th>Libellé</th>
        <th>Actions</th>
    </tr>
    </thead>
    <tbody>
    <tr th:each="type : ${types}">
        <td th:text="${type.id}"></td>
        <td th:text="${type.code}"></td>
        <td th:text="${type.libelle}"></td>
        <td>
            <a th:href="@{/production/types-evenements/{id}(id=${type.id})}">Voir</a>
            <a th:href="@{/production/types-evenements/{id}/edit(id=${type.id})}">Modifier</a>
            <a th:href="@{/production/types-evenements/{id}/delete(id=${type.id})}"
               onclick="return confirm('Supprimer ce type d’événement ?')">Supprimer</a>
        </td>
    </tr>
    <tr th:if="${#lists.isEmpty(types)}">
        <td colspan="4">Aucun type d'événement enregistré.</td>
    </tr>
    </tbody>
</table>
</body>
</html>
