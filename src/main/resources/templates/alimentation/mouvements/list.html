<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" th:replace="~{fragments/layout :: layout(~{::title}, ~{::main})}">
<head>
    <title>AquaNova</title>
</head>
<body>
<main>
    <div th:if="${error}" style="color:red;">
        <p th:text="${error}"></p>
    </div>

    <h2>Mouvements de stock</h2>

    <!-- FILTERS -->
    <form method="get" action="/stocks/mouvements">

        <fieldset>
            <legend>Filtres</legend>

            <div>
                <label class="form-label">ID du mouvement</label><br>
                <input class="form-control" type="number" name="id" placeholder="Ex : 12" th:value="${param.id}">
            </div>

            <br>

            <div>
                <label class="form-label">Aliment</label><br>
                <input class="form-control" type="text" name="aliment" placeholder="Nom de l'aliment" th:value="${param.aliment}">
            </div>

            <br>

            <div>
                <label class="form-label">Type</label><br>
                <select class="form-select" name="type">
                    <option value="">Tous</option>
                    <option value="ENTREE" th:selected="${param.type == 'ENTREE'}">
                        Entrée
                    </option>
                    <option value="SORTIE" th:selected="${param.type == 'SORTIE'}">
                        Sortie
                    </option>
                    <option value="PERTE" th:selected="${param.type == 'PERTE'}">
                        Perte
                    </option>
                </select>
            </div>

            <br>

            <div>
                <label class="form-label">Date de début</label><br>
                <input class="form-control" type="date" name="start" th:value="${param.start}">
            </div>

            <br>

            <div>
                <label class="form-label">Date de fin</label><br>
                <input class="form-control" type="date" name="end" th:value="${param.end}">
            </div>

            <br>

            <button class="btn btn-primary" type="submit">Filtrer</button>
            <a th:href="@{/stocks/mouvements}">Réinitialiser</a>

        </fieldset>

    </form>

    <!-- TABLE -->
    <table class="table table-hover align-middle">
        <tr>
            <th>ID</th>
            <th>Date</th>
            <th>Aliment</th>
            <th>Type</th>
            <th>Quantité</th>
            <th>Action</th>
        </tr>

        <tr th:each="m : ${mouvements}">
            <td th:text="${m.id}"></td>
            <td th:text="${m.dateMouvement}"></td>
            <td th:text="${m.aliment.nom}"></td>
            <td th:text="${m.typeMouvement}"></td>
            <td th:text="${m.quantite}"></td>
            <td>
                <a class="btn btn-sm btn-outline-primary" th:href="@{'/stocks/mouvements/' + ${m.id}}">Voir</a>
            </td>
        </tr>
    </table>

    <!-- PAGINATION (basic placeholder) -->
    <div>
        Page navigation handled in controller if needed
    </div>

    <a class="btn btn-primary" href="/stocks/mouvements/new">Nouveau mouvement</a>
</main>
</body>
</html>
