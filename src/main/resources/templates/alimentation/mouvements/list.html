<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" th:replace="~{fragments/layout :: layout(~{::title}, ~{::main})}">
<head>
    <title>AquaNova - Mouvements de stock</title>
</head>
<body>
<main>

    <div class="error" th:if="${error}">
        <p th:text="${error}"></p>
    </div>

    <div class="toolbar">
        <a class="btn btn-primary" th:href="@{/stocks/mouvements/new}"><i class="bi bi-plus-lg"></i> Nouveau mouvement</a>
    </div>

    <div class="panel">
        <div class="panel-header">
            <h5>Mouvements de stock</h5>
            <span class="result-count"
                  th:text="${mouvements.totalElements} + ' mouvement' + (${mouvements.totalElements} > 1 ? 's' : '') + ' trouvé' + (${mouvements.totalElements} > 1 ? 's' : '')"></span>
        </div>

        <form method="get" th:action="@{/stocks/mouvements}" class="filters-bar">
            <input type="hidden" name="page" value="0" />
            <input class="form-control fc-sm" type="number" name="id" placeholder="ID" th:value="${filter.id}">
            <select class="form-select" name="type">
                <option value="">Tous les types</option>
                <option th:each="t : ${typesMouvement}"
                        th:value="${t}"
                        th:text="${t}"
                        th:selected="${filter.type == t}"></option>
            </select>
            <select class="form-select" name="alimentId">
                <option value="">Tous les aliments</option>
                <option th:each="a : ${aliments}"
                        th:value="${a.id}"
                        th:text="${a.nom}"
                        th:selected="${filter.alimentId == a.id}"></option>
            </select>
            <div class="input-group">
                <span class="input-group-text">Du</span>
                <input class="form-control" type="date" name="dateDebut" th:value="${filter.dateDebut}">
            </div>
            <div class="input-group">
                <span class="input-group-text">Au</span>
                <input class="form-control" type="date" name="dateFin" th:value="${filter.dateFin}">
            </div>
            <button class="btn btn-primary" type="submit"><i class="bi bi-search"></i> Filtrer</button>
            <a class="btn btn-outline-secondary" th:href="@{/stocks/mouvements}"><i class="bi bi-x-circle"></i> Réinitialiser</a>
        </form>

        <div class="table-responsive">
            <table class="table table-hover align-middle">
                <thead>
                <tr>
                    <th>ID</th>
                    <th>Date</th>
                    <th>Aliment</th>
                    <th>Type</th>
                    <th class="text-end">Quantité(kg)</th>
                    <th class="text-end">Actions</th>
                </tr>
                </thead>
                <tbody>
                <tr th:each="m : ${mouvements.content}">
                    <td th:text="${m.id}"></td>
                    <td th:text="${m.dateMouvement}"></td>
                    <td class="fw-semibold" th:text="${m.aliment != null ? m.aliment.nom : '—'}"></td>
                    <td><span class="badge badge-info" th:text="${m.typeMouvement}"></span></td>
                    <td class="text-end" th:text="${m.quantite}"></td>
                    <td class="text-end">
                        <a class="btn btn-sm btn-outline-primary" th:href="@{/stocks/mouvements/{id}(id=${m.id})}" title="Voir les détails"><i class="bi bi-eye"></i></a>
                    </td>
                </tr>
                <tr th:if="${mouvements.empty}">
                    <td colspan="6" class="text-center text-secondary py-4">Aucun mouvement ne correspond à ces critères.</td>
                </tr>
                </tbody>
            </table>
        </div>

        <div th:replace="~{fragments/tableau :: tableFooter(${mouvements})}"></div>
    </div>
</main>
</body>
</html>
