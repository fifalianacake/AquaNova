<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<body>
    <div th:if="${error}" style="color:red;">
        <p th:text="${error}"></p>
    </div>

    <h2>Mouvements de stock</h2>

    <!-- FILTERS -->
    <form method="get" action="/stocks/mouvements">

        <fieldset>
            <legend>Filtres</legend>

            <div>
                <label>ID du mouvement</label><br>
                <input type="number" name="id" placeholder="Ex : 12" th:value="${param.id}">
            </div>

            <br>

            <div>
                <label>Aliment</label><br>
                <input type="text" name="aliment" placeholder="Nom de l'aliment" th:value="${param.aliment}">
            </div>

            <br>

            <div>
                <label>Type</label><br>
                <select name="type">
                    <option value="">Tous</option>
                    <option value="ENTREE" th:selected="${param.type == 'ENTREE'}">
                        Entrée
                    </option>
                    <option value="SORTIE" th:selected="${param.type == 'SORTIE'}">
                        Sortie
                    </option>
                    <option value="PERTE" th:selected="${param.type == 'PERTE'}">
                        Perte
                    </option>
                </select>
            </div>

            <br>

            <div>
                <label>Date de début</label><br>
                <input type="date" name="start" th:value="${param.start}">
            </div>

            <br>

            <div>
                <label>Date de fin</label><br>
                <input type="date" name="end" th:value="${param.end}">
            </div>

            <br>

            <button type="submit">Filtrer</button>
            <a th:href="@{/stocks/mouvements}">Réinitialiser</a>

        </fieldset>

    </form>

    <!-- TABLE -->
    <table border="1">
        <tr>
            <th>ID</th>
            <th>Date</th>
            <th>Aliment</th>
            <th>Type</th>
            <th>Quantité</th>
            <th>Action</th>
        </tr>

        <tr th:each="m : ${mouvements}">
            <td th:text="${m.id}"></td>
            <td th:text="${m.dateMouvement}"></td>
            <td th:text="${m.aliment.nom}"></td>
            <td th:text="${m.typeMouvement}"></td>
            <td th:text="${m.quantite}"></td>
            <td>
                <a th:href="@{'/stocks/mouvements/' + ${m.id}}">Voir</a>
            </td>
        </tr>
    </table>

    <!-- PAGINATION (basic placeholder) -->
    <div>
        Page navigation handled in controller if needed
    </div>

    <a href="/stocks/mouvements/new">Nouveau mouvement</a>

</body>

</html>
