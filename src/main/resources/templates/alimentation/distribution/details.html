<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Détails de la Distribution</title>
</head>

<body>

    <h1>Fiche de Distribution de nourriture</h1>

    <div>
        <p><strong>ID :</strong> <span th:text="${distribution.id}"></span></p>
        <p><strong>Date de distribution :</strong> <span th:text="${distribution.dateDistribution}"></span></p>
        <p><strong>Lot concerné :</strong> <span
                th:text="${distribution.lot != null ? 'Lot #' + distribution.lot.id : 'Non défini'}"></span></p>
        <p><strong>Aliment distribué :</strong> <span
                th:text="${distribution.aliment != null ? distribution.aliment.nom : 'Non défini'}"></span></p>
        <p><strong>Quantité réelle distribuée :</strong> <span
                th:text="${distribution.quantite != null ? distribution.quantite + ' kg' : 'Non encore distribué'}"></span>
        </p>
        <p><strong>Ration théorique prévue :</strong> <span
                th:text="${distribution.rationTheorique != null ? distribution.rationTheorique + ' kg' : 'Aucune'}"></span>
        </p>
    </div>

    <hr />

    <div>
        <a th:href="@{/distributions/{id}/edit(id=${distribution.id})}">Modifier cette fiche</a>
        |
        <a th:href="@{/distributions}">Retour à la liste</a>
    </div>

</body>

</html>
