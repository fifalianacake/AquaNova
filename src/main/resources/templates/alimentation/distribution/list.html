<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" th:replace="~{fragments/layout :: layout(~{::title}, ~{::main})}">
<head>
    <title>AquaNova - Liste des distributions</title>
</head>
<body>
<main>

<div class="toolbar">
    <a class="btn btn-primary" th:href="@{/distributions/new}"><i class="bi bi-plus-lg"></i> Nouvelle distribution</a>
</div>

<div class="panel">
    <div class="panel-header">
        <h5>Distributions d'alimentation</h5>
        <span class="result-count"
              th:text="${distributions.totalElements} + ' distribution' + (${distributions.totalElements} > 1 ? 's' : '') + ' trouvée' + (${distributions.totalElements} > 1 ? 's' : '')"></span>
    </div>

    <form method="get" th:action="@{/distributions}" class="filters-bar">
        <input type="hidden" name="page" value="0" />
        <input class="form-control fc-sm" type="number" name="id" placeholder="ID" th:value="${filter.id}">
        <select class="form-select" name="lotId">
            <option value="">Tous les lots</option>
            <option th:each="l : ${lots}"
                    th:value="${l.id}"
                    th:text="${l.code}"
                    th:selected="${filter.lotId == l.id}"></option>
        </select>
        <select class="form-select" name="alimentId">
            <option value="">Tous les aliments</option>
            <option th:each="a : ${aliments}"
                    th:value="${a.id}"
                    th:text="${a.nom}"
                    th:selected="${filter.alimentId == a.id}"></option>
        </select>
        <div class="input-group">
            <span class="input-group-text">Du</span>
            <input class="form-control" type="date" name="dateDebut" th:value="${filter.dateDebut}">
        </div>
        <div class="input-group">
            <span class="input-group-text">Au</span>
            <input class="form-control" type="date" name="dateFin" th:value="${filter.dateFin}">
        </div>
        <button class="btn btn-primary" type="submit"><i class="bi bi-search"></i> Filtrer</button>
        <a class="btn btn-outline-secondary" th:href="@{/distributions}"><i class="bi bi-x-circle"></i> Réinitialiser</a>
    </form>

    <div class="table-responsive">
        <table class="table table-hover align-middle">
            <thead>
            <tr>
                <th th:replace="~{fragments/tableau :: sortableHeader(${distributions}, 'id', 'ID', '')}"></th>
                <th th:replace="~{fragments/tableau :: sortableHeader(${distributions}, 'dateDistribution', 'Date', '')}"></th>
                <th th:replace="~{fragments/tableau :: sortableHeader(${distributions}, 'lot.code', 'Lot', '')}"></th>
                <th th:replace="~{fragments/tableau :: sortableHeader(${distributions}, 'aliment.nom', 'Aliment', '')}"></th>
                <th th:replace="~{fragments/tableau :: sortableHeader(${distributions}, 'rationTheorique', 'Ration théorique (kg)', 'text-end')}"></th>
                <th th:replace="~{fragments/tableau :: sortableHeader(${distributions}, 'quantite', 'Quantité distribuée (kg)', 'text-end')}"></th>
                <th class="text-end">Actions</th>
            </tr>
            </thead>
            <tbody>
            <tr th:each="dist : ${distributions.content}">
                <td th:text="${dist.id}"></td>
                <td th:text="${dist.dateDistribution}"></td>
                <td class="fw-semibold" th:text="${dist.lot != null ? dist.lot.id : '—'}"></td>
                <td th:text="${dist.aliment != null ? dist.aliment.nom : '—'}"></td>
                <td class="text-end" th:text="${dist.rationTheorique != null ? #numbers.formatDecimal(dist.rationTheorique, 1, 'WHITESPACE', 2, 'COMMA') : '—'}"></td>
                <td class="text-end" th:text="${#numbers.formatDecimal(dist.quantite, 1, 'WHITESPACE', 2, 'COMMA')}"></td>
                <td class="text-end">
                    <a class="btn btn-sm btn-outline-primary" th:href="@{/distributions/{id}(id=${dist.id})}" title="Voir les détails"><i class="bi bi-eye"></i></a>
                    <a class="btn btn-sm btn-outline-primary" th:href="@{/distributions/{id}/edit(id=${dist.id})}" title="Modifier"><i class="bi bi-pencil"></i></a>
                    <a class="btn btn-sm btn-outline-danger" th:href="@{/distributions/{id}/delete(id=${dist.id})}" title="Supprimer"
                       onclick="return confirm('Supprimer cette distribution ?')"><i class="bi bi-trash3"></i></a>
                </td>
            </tr>
            <tr th:if="${distributions.empty}">
                <td colspan="7" class="text-center text-secondary py-4">Aucune distribution ne correspond à ces critères.</td>
            </tr>
            </tbody>
        </table>
    </div>

    <div th:replace="~{fragments/tableau :: tableFooter(${distributions})}"></div>
</div>
</main>
</body>
</html>
