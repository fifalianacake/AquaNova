<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" th:replace="~{fragments/layout :: layout(~{::title}, ~{::main})}">
<head>
    <title>AquaNova - Distribution</title>
</head>
<body>
<main>
    <h2 th:text="${distribution.id != null} ? 'Modifier la distribution' : 'Créer une nouvelle distribution'"></h2>

    <div class="error" th:if="${error}" th:text="${error}"></div>

    <form class="form-panel" th:action="${distribution.id} == null ? @{/distributions} : @{'/distributions/' + ${distribution.id}}"
          th:object="${distribution}" method="post">

        <div class="mb-3">
            <label class="form-label" for="dateDistribution">Date de distribution</label>
            <input class="form-control" type="date" id="dateDistribution" th:field="*{dateDistribution}" required />
        </div>

        <div class="mb-3">
            <label class="form-label" for="lot">Lot concerné</label>
            <div th:if="${lotPreselectionne != null}">
                <input class="form-control" type="text" th:value="'Lot #' + ${lotPreselectionne.id}" disabled>
                <input type="hidden" th:field="*{idLot}">
            </div>
            <select th:unless="${lotPreselectionne != null}" class="form-select" id="lot" th:field="*{idLot}" required>
                <option value="">-- Sélectionner un lot --</option>
                <option th:each="l : ${lots}" th:value="${l.id}" th:text="'Lot #' + ${l.id}"
                        th:attr="data-ration=${rationsParLot[l.id]}"></option>
            </select>
        </div>

        <div class="mb-3">
            <label class="form-label" for="aliment">Aliment en Stock</label>
            <select class="form-select" id="aliment" th:field="*{idAliment}" required>
                <option value="">-- Choisir un aliment --</option>
                <option th:each="al : ${aliments}" th:value="${al.id}" th:text="${al.nom}"></option>
            </select>
        </div>

        <div class="mb-3">
            <label class="form-label" for="quantite">Quantité distribuée (kg)</label>
            <input class="form-control" type="number" step="0.01" min="0.01" id="quantite" th:field="*{quantite}" />
        </div>

        <div class="mb-3">
            <label class="form-label" for="rationTheorique">Ration théorique (kg)</label>
            <input class="form-control readonly-field" type="text" id="rationTheorique" readonly
                   th:value="${distribution.rationTheorique}" placeholder="—" />
            <div class="form-text">Calculée à partir du lot choisi (effectif, poids cible, date de récolte estimée, ICA) : elle n'est pas saisie.</div>
        </div>

        <div class="d-flex gap-2 mt-4">
            <button class="btn btn-primary" type="submit">Enregistrer</button>
            <a class="btn btn-secondary" th:href="@{/distributions}">Retour à la liste</a>
        </div>
    </form>

    <script>
        (function () {
            const lot = document.getElementById('lot');
            const ration = document.getElementById('rationTheorique');

            function majRation() {
                const option = lot.selectedOptions[0];
                const valeur = option ? option.dataset.ration : null;
                ration.value = valeur ? Number(valeur).toFixed(2) : '';
            }

            if (lot) {
                lot.addEventListener('change', majRation);
            }
        })();
    </script>
</main>
</body>
</html>
