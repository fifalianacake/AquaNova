<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${distribution.id != null} ? 'Modifier la distribution' : 'Nouvelle distribution'"></title>
</head>
<body>

    <h1 th:text="${distribution.id != null} ? 'Modifier la distribution' : 'Créer une nouvelle distribution'"></h1>

    <form th:action="@{/alimentation/distribution/save}" th:object="${distribution}" method="post">
        
        <input type="hidden" th:field="*{id}" />

        <div>
            <label for="dateDistribution">Date de distribution :</label>
            <input type="date" id="dateDistribution" th:field="*{dateDistribution}" required />
        </div>

        <br/>

        <div>
            <label for="lot">Lot concerné :</label>
            <select id="lot" th:field="*{lot}" required>
                <option value="">-- Sélectionner un lot --</option>
                <option th:each="l : ${lots}" 
                        th:value="${l.id}" 
                        th:text="'Lot #' + ${l.id}"></option>
            </select>
        </div>

        <br/>

        <div>
            <label for="aliment">Type d'aliment :</label>
            <select id="aliment" th:field="*{aliment}" required>
                <option value="">-- Sélectionner un aliment --</option>
                <option th:each="a : ${aliments}" 
                        th:value="${a.id}" 
                        th:text="${a.libelle}"></option>
            </select>
        </div>

        <br/>

        <div>
            <label for="quantite">Quantité distribuée (kg) :</label>
            <input type="number" step="0.01" id="quantite" th:field="*{quantite}" required />
        </div>

        <br/>

        <div>
            <label for="rationTheorique">Ration théorique :</label>
            <input type="number" step="0.01" id="rationTheorique" th:field="*{rationTheorique}" />
        </div>

        <br/>

        <button type="submit">Enregistrer</button>
        <a th:href="@{/alimentation/distribution}">Annuler</a>
    </form>

</body>
</html>
