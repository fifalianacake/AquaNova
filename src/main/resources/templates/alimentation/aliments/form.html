<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="fr">
<head>
    <meta charset="UTF-8">
    <title th:text="${aliment.id == null} ? 'Nouveau Aliment' : 'Modifier l\'Aliment'">Formulaire</title>
</head>
<body>

    <h2 th:text="${aliment.id == null} ? 'Créer un aliment' : 'Modifier l\'aliment'">Formulaire</h2>

    <form th:action="@{/aliments}" th:object="${aliment}" method="post">
        
        <input type="hidden" th:field="*{id}" />

        <p>
            <label for="nom">Nom de l'aliment :</label><br/>
            <input type="text" id="nom" th:field="*{nom}" required />
        </p>

        <p>
            <button type="submit" th:text="${aliment.id == null} ? 'Créer' : 'Enregistrer les modifications'">Enregistrer</button>
            <a th:href="@{/aliments}">Annuler</a>
        </p>
        
    </form>

</body>
</html>
