<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <title>Catalogue aliments</title>
</head>

<body>

    <h1>Catalogue aliments</h1>

    <p th:if="${erreur}" th:text="${erreur}"></p>
    <p th:if="${succes}" th:text="${succes}"></p>

    <a th:href="@{/aliments/new}">Nouvel aliment</a>

    <table border="1">
        <tr>
            <th>Id</th>
            <th>Nom</th>
            <th>Type</th>
            <th>Age min</th>
            <th>Age max</th>
            <th>Prix</th>
        </tr>
        <tr th:each="a : ${aliments}">
            <td><a th:href="@{/aliments/{id}(id=${a.id})}" th:text="${a.id}"></a></td>
            <td><a th:href="@{/aliments/{id}(id=${a.id})}" th:text="${a.nom}"></a></td>
            <td th:text="${a.type}"></td>
            <td th:text="${a.ageMin}"></td>
            <td th:text="${a.ageMax}"></td>
            <td th:text="${a.prixUnitaire}"></td>
        </tr>
    </table>

    <a th:href="@{/stocks}">Retour</a>

</body>

</html>
