<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <title>Saisie aliment</title>
</head>

<body>

    <h1>Saisie aliment</h1>

    <p th:if="${erreur}" th:text="${erreur}"></p>

    <form method="post" th:action="${aliment.id != null} ? @{/aliments/{id}/edit(id=${aliment.id})} : @{/aliments}">

        <label>Nom: <input type="text" name="nom" th:value="${aliment.nom}" required></label>
        <br>

        <label>Type:
            <select name="type" required>
                <option value="Alevin" th:selected="${aliment.type == 'Alevin'}">Alevin</option>
                <option value="Croissance" th:selected="${aliment.type == 'Croissance'}">Croissance</option>
                <option value="Finition" th:selected="${aliment.type == 'Finition'}">Finition</option>
            </select>
        </label>
        <br>

        <label>Age min: <input type="number" name="ageMin" th:value="${aliment.ageMin}" required></label>
        <br>

        <label>Age max: <input type="number" name="ageMax" th:value="${aliment.ageMax}" required></label>
        <br>

        <label>Taille granulé: <input type="number" step="0.01" name="tailleGranule"
                th:value="${aliment.tailleGranule}"></label>
        <br>

        <label>Prix unitaire: <input type="number" step="0.01" name="prixUnitaire" th:value="${aliment.prixUnitaire}"
                required></label>
        <br>

        <label>Seuil alerte (kg): <input type="number" step="0.01" name="seuilAlerteKg"
                th:value="${aliment.seuilAlerteKg}" required></label>
        <br>

        <button type="submit">Enregistrer</button>
    </form>

    <a th:href="@{/aliments}">Retour</a>

</body>

</html>
