<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>AquaNova - Liste des Clients</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
</head>
<body class="container mt-4">

    <div class="d-flex justify-content-between align-items-center mb-4">
        <h2>Gestion des Clients</h2>
        <a th:href="@{/clients/new}" class="btn btn-success">➕ Nouveau Client</a>
    </div>

    <!-- Formulaire de Filtres -->
    <div class="card mb-4 bg-light">
        <div class="card-body">
            <h5 class="card-title">Filtrer la recherche</h5>
            <form th:action="@{/clients}" method="get" class="row g-3">
                <div class="col-md-2">
                    <input type="number" name="id" class="form-control" placeholder="ID (ex: 1)">
                </div>
                <div class="col-md-3">
                    <input type="text" name="nom" class="form-control" placeholder="Nom du client">
                </div>
                <div class="col-md-3">
                    <select name="typeId" class="form-select">
                        <option value="">Tous les types</option>
                        <option th:each="t : ${types}" th:value="${t.id}" th:text="${t.libelle}"></option>
                    </select>
                </div>
                <div class="col-md-2">
                    <input type="text" name="contact" class="form-control" placeholder="Contact">
                </div>
                <div class="col-md-2">
                    <select name="actif" class="form-select">
                        <option value="">Tous les statuts</option>
                        <option value="true">Actifs uniquement</option>
                        <option value="false">Désactivés uniquement</option>
                    </select>
                </div>
                <div class="col-12 text-end">
                    <button type="submit" class="btn btn-primary">🔍 Rechercher</button>
                    <a th:href="@{/clients}" class="btn btn-secondary">Réinitialiser</a>
                </div>
            </form>
        </div>
    </div>

    <!-- Tableau des résultats -->
    <table class="table table-striped table-hover align-middle">
        <thead class="table-dark">
            <tr>
                <th>ID</th>
                <th>Nom</th>
                <th>Type</th>
                <th>Contact</th>
                <th>Email</th>
                <th>Adresse</th>
                <th>Statut</th>
                <th>Actions</th>
            </tr>
        </thead>
        <tbody>
            <tr th:each="c : ${clients}">
                <td th:text="${c.id}"></td>
                <td th:text="${c.nom}"></td>
                <td th:text="${c.typeClient.libelle}"></td>
                <td th:text="${c.contact != null && !c.contact.empty ? c.contact : '-'}"></td>
                <td th:text="${c.email != null && !c.email.empty ? c.email : '-'}"></td>
                <td th:text="${c.adresse != null && !c.adresse.empty ? c.adresse : '-'}"></td>
                <td>
                    <span th:if="${c.actif}" class="badge bg-success">Actif</span>
                    <span th:unless="${c.actif}" class="badge bg-danger">Inactif</span>
                </td>
                <td>
                    <a th:href="@{/clients/{id}(id=${c.id})}" class="btn btn-sm btn-info">👁️ Consulter</a>
                    <a th:href="@{/clients/{id}/edit(id=${c.id})}" class="btn btn-sm btn-warning">✏️ Modifier</a>
                </td>
            </tr>
            <tr th:if="${clients.empty}">
                <td colspan="8" class="text-center text-muted">Aucun client trouvé.</td>
            </tr>
        </tbody>
    </table>
</body>
</html>
