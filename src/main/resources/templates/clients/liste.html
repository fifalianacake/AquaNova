<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" th:replace="~{fragments/layout :: layout(~{::title}, ~{::main})}">
<head>
    <title>AquaNova - Liste des Clients</title>
</head>
<body>
<main>
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h2>Gestion des Clients</h2>
        <a th:href="@{/clients/new}" class="btn btn-primary">Nouveau Client</a>
    </div>

    <form method="get" th:action="@{/clients}" th:object="${filter}" class="filters">
        <input type="hidden" name="page" value="0" />

        <label class="form-label">ID
            <input class="form-control" type="number" th:field="*{id}" />
        </label>

        <label class="form-label">Nom
            <input class="form-control" type="text" th:field="*{nom}" placeholder="Nom du client" />
        </label>

        <label class="form-label">Type
            <select class="form-select" th:field="*{typeId}">
                <option value="">Tous les types</option>
                <option th:each="t : ${types}" th:value="${t.id}" th:text="${t.libelle}"></option>
            </select>
        </label>

        <label class="form-label">Contact
            <input class="form-control" type="text" th:field="*{contact}" />
        </label>

        <label class="form-label">Statut
            <select class="form-select" th:field="*{actif}">
                <option value="">Tous les statuts</option>
                <option value="true">Actifs uniquement</option>
                <option value="false">Désactivés uniquement</option>
            </select>
        </label>

        <label class="form-label">Lignes/page
            <select class="form-select" name="size" onchange="this.form.submit()">
                <option th:each="s : ${pageSizes}" th:value="${s}" th:text="${s}" th:selected="${clients.size == s}"></option>
            </select>
        </label>

        <button type="submit" class="btn btn-primary">Rechercher</button>
        <a th:href="@{/clients}" class="btn btn-secondary">Réinitialiser</a>
    </form>

    <table class="table table-striped table-hover align-middle">
        <thead>
            <tr>
                <th>ID</th>
                <th>Nom</th>
                <th>Type</th>
                <th>Contact</th>
                <th>Email</th>
                <th>Adresse</th>
                <th>Statut</th>
                <th>Actions</th>
            </tr>
        </thead>
        <tbody>
            <tr th:each="c : ${clients.content}">
                <td th:text="${c.id}"></td>
                <td th:text="${c.nom}"></td>
                <td th:text="${c.typeClient.libelle}"></td>
                <td th:text="${c.contact != null && !c.contact.empty ? c.contact : '-'}"></td>
                <td th:text="${c.email != null && !c.email.empty ? c.email : '-'}"></td>
                <td th:text="${c.adresse != null && !c.adresse.empty ? c.adresse : '-'}"></td>
                <td>
                    <span th:if="${c.actif}" class="badge bg-success">Actif</span>
                    <span th:unless="${c.actif}" class="badge bg-danger">Inactif</span>
                </td>
                <td>
                    <a th:href="@{/clients/{id}(id=${c.id})}" class="btn btn-sm btn-outline-primary">Consulter</a>
                    <a th:href="@{/clients/{id}/edit(id=${c.id})}" class="btn btn-sm btn-outline-primary">Modifier</a>
                </td>
            </tr>
            <tr th:if="${clients.empty}">
                <td colspan="8" class="text-center text-muted">Aucun client trouvé.</td>
            </tr>
        </tbody>
    </table>

    <div class="pagination" th:if="${clients.totalPages > 0}">
        <a class="btn btn-secondary" th:if="${clients.hasPrevious()}"
           th:href="@{/clients(page=${clients.number - 1}, size=${clients.size}, id=${filter.id}, nom=${filter.nom}, typeId=${filter.typeId}, contact=${filter.contact}, actif=${filter.actif})}">&laquo; Précédent</a>
        <span th:unless="${clients.hasPrevious()}" style="color:#999;">&laquo; Précédent</span>

        <span th:text="'Page ' + ${clients.number + 1} + ' sur ' + ${clients.totalPages} + ' — ' + ${clients.totalElements} + ' client(s)'"></span>

        <a th:if="${clients.hasNext()}"
           th:href="@{/clients(page=${clients.number + 1}, size=${clients.size}, id=${filter.id}, nom=${filter.nom}, typeId=${filter.typeId}, contact=${filter.contact}, actif=${filter.actif})}">Suivant &raquo;</a>
        <span th:unless="${clients.hasNext()}" style="color:#999;">Suivant &raquo;</span>
    </div>
</main>
</body>
</html>
