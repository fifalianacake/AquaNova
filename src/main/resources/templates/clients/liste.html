<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" th:replace="~{fragments/layout :: layout(~{::title}, ~{::main})}">
<head>
    <title>AquaNova - Liste des Clients</title>
</head>
<body>
<main>

    <div class="toolbar">
        <a th:href="@{/clients/new}" class="btn btn-primary"><i class="bi bi-plus-lg"></i> Nouveau client</a>
    </div>

    <div class="panel">
        <div class="panel-header">
            <h5>Gestion des clients</h5>
            <span class="result-count"
                  th:text="${clients.totalElements} + ' client' + (${clients.totalElements} > 1 ? 's' : '') + ' trouvé' + (${clients.totalElements} > 1 ? 's' : '')"></span>
        </div>

        <form method="get" th:action="@{/clients}" th:object="${filter}" class="filters-bar">
            <input type="hidden" name="page" value="0" />
            <input class="form-control fc-sm" type="number" th:field="*{id}" placeholder="ID">
            <input class="form-control" type="text" th:field="*{nom}" placeholder="Nom du client">
            <select class="form-select" th:field="*{typeId}">
                <option value="">Tous les types</option>
                <option th:each="t : ${types}" th:value="${t.id}" th:text="${t.libelle}"></option>
            </select>
            <input class="form-control" type="text" th:field="*{contact}" placeholder="Contact">
            <select class="form-select" th:field="*{actif}">
                <option value="">Tous les statuts</option>
                <option value="true">Actifs uniquement</option>
                <option value="false">Désactivés uniquement</option>
            </select>
            <button type="submit" class="btn btn-primary"><i class="bi bi-search"></i> Filtrer</button>
            <a th:href="@{/clients}" class="btn btn-outline-secondary"><i class="bi bi-x-circle"></i> Réinitialiser</a>
        </form>

        <div class="table-responsive">
            <table class="table table-hover align-middle">
                <thead>
                <tr>
                    <th th:replace="~{fragments/tableau :: sortableHeader(${clients}, 'id', 'ID', '')}"></th>
                    <th th:replace="~{fragments/tableau :: sortableHeader(${clients}, 'nom', 'Nom', '')}"></th>
                    <th th:replace="~{fragments/tableau :: sortableHeader(${clients}, 'typeClient.libelle', 'Type', '')}"></th>
                    <th>Contact</th>
                    <th>Email</th>
                    <th>Adresse</th>
                    <th th:replace="~{fragments/tableau :: sortableHeader(${clients}, 'actif', 'Statut', '')}"></th>
                    <th class="text-end">Actions</th>
                </tr>
                </thead>
                <tbody>
                <tr th:each="c : ${clients.content}">
                    <td th:text="${c.id}"></td>
                    <td class="fw-semibold" th:text="${c.nom}"></td>
                    <td th:text="${c.typeClient.libelle}"></td>
                    <td th:text="${c.contact != null && !c.contact.empty ? c.contact : '—'}"></td>
                    <td th:text="${c.email != null && !c.email.empty ? c.email : '—'}"></td>
                    <td th:text="${c.adresse != null && !c.adresse.empty ? c.adresse : '—'}"></td>
                    <td>
                        <span th:if="${c.actif}" class="badge badge-success">Actif</span>
                        <span th:unless="${c.actif}" class="badge badge-danger">Inactif</span>
                    </td>
                    <td class="text-end">
                        <a th:href="@{/clients/{id}(id=${c.id})}" class="btn btn-sm btn-outline-primary" title="Consulter"><i class="bi bi-eye"></i></a>
                        <a th:href="@{/clients/{id}/edit(id=${c.id})}" class="btn btn-sm btn-outline-primary" title="Modifier"><i class="bi bi-pencil"></i></a>
                    </td>
                </tr>
                <tr th:if="${clients.empty}">
                    <td colspan="8" class="text-center text-secondary py-4">Aucun client ne correspond à ces critères.</td>
                </tr>
                </tbody>
            </table>
        </div>

        <div th:replace="~{fragments/tableau :: tableFooter(${clients})}"></div>
    </div>
</main>
</body>
</html>
