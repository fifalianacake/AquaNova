<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>AquaNova - Modifier Client</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
</head>
<body class="container mt-4" style="max-width: 600px;">

    <h2>Modifier le client n°<span th:text="${client.id}"></span></h2>
    <hr>

    <div th:if="${erreur}" class="alert alert-danger" th:text="${erreur}"></div>

    <form th:action="@{/clients/{id}/edit(id=${client.id})}" th:object="${client}" method="post" class="row g-3">
        <div class="col-12">
            <label class="form-label">Nom / Raison Sociale *</label>
            <input type="text" th:field="*{nom}" class="form-control" required>
        </div>

        <div class="col-12">
            <label class="form-label">Type de client *</label>
            <select th:field="*{typeClient.id}" class="form-select" required>
                <option th:each="t : ${types}" th:value="${t.id}" th:text="${t.libelle}"></option>
            </select>
        </div>

        <div class="col-12">
            <label class="form-label">Contact téléphonique</label>
            <input type="text" th:field="*{contact}" class="form-control">
        </div>

        <div class="col-12">
            <label class="form-label">Adresse Email</label>
            <input type="email" th:field="*{email}" class="form-control">
        </div>

        <div class="col-12">
            <label class="form-label">Adresse physique</label>
            <input type="text" th:field="*{adresse}" class="form-control">
        </div>

        <div class="col-12">
            <label class="form-label">Statut du compte</label>
            <select th:field="*{actif}" class="form-select">
                <option value="true">Actif</option>
                <option value="false">Désactivé / Bloqué</option>
            </select>
        </div>

        <div class="col-12 mt-4">
            <button type="submit" class="btn btn-warning">💾 Mettre à jour</button>
            <a th:href="@{/clients}" class="btn btn-secondary">Annuler</a>
        </div>
    </form>
</body>
</html>
