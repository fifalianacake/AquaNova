<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" th:replace="~{fragments/layout :: layout(~{::title}, ~{::main})}">
<head>
    <title>AquaNova - Fiche Client</title>
</head>
<body>
<main>
    <div class="d-flex justify-content-between align-items-center mb-3">
        <h2>Fiche Client : <span class="text-primary" th:text="${client.nom}"></span></h2>
        <div>
            <a th:href="@{/clients}" class="btn btn-outline-secondary">⬅️ Retour</a>
            <a th:href="@{/clients/{id}/edit(id=${client.id})}" class="btn btn-outline-primary">✏️ Modifier</a>
        </div>
    </div>

    <div class="row">
        <!-- Carte des infos -->
        <div class="col-md-5">
            <div class="card mb-4">
                <div class="card-header bg-dark text-white">Informations Générales</div>
                <div class="card-body">
                    <p><strong>ID :</strong> <span th:text="${client.id}"></span></p>
                    <p><strong>Type :</strong> <span th:text="${client.typeClient.libelle}"></span></p>
                    <p><strong>Contact :</strong> <span th:text="${client.contact != null && !client.contact.empty ? client.contact : 'Non renseigné'}"></span></p>
                    <p><strong>Email :</strong> <span th:text="${client.email != null && !client.email.empty ? client.email : 'Non renseigné'}"></span></p>
                    <p><strong>Adresse :</strong> <span th:text="${client.adresse != null && !client.adresse.empty ? client.adresse : 'Non renseigné'}"></span></p>
                    <p><strong>Statut :</strong> 
                        <span th:if="${client.actif}" class="badge bg-success">Actif</span>
                        <span th:unless="${client.actif}" class="badge bg-danger">Inactif</span>
                    </p>
                </div>
            </div>

            <!-- Bloc Chiffre d'Affaires -->
            <div class="card border-primary text-center p-3 mb-4">
                <h6 class="text-muted">Chiffre d'Affaires Généré</h6>
                <h3 class="text-primary font-weight-bold" th:text="${caTotal + ' Ar'}">0 Ar</h3>
            </div>

            <!-- Bouton de suppression / désactivation logique -->
            <form th:action="@{/clients/{id}/supprimer(id=${client.id})}" method="post" onsubmit="return confirm('Voulez-vous vraiment supprimer ou désactiver ce client ?');">
                <button type="submit" class="btn btn-danger w-100">🗑️ Supprimer / Désactiver</button>
            </form>
        </div>

        <!-- Tableau historique des ventes -->
        <div class="col-md-7">
            <div class="card">
                <div class="card-header bg-secondary text-white">Historique des Ventes</div>
                <div class="card-body p-0">
                    <table class="table table-striped m-0">
                        <thead>
                            <tr>
                                <th>Réf Vente</th>
                                <th>Date</th>
                                <th>Montant Total</th>
                            </tr>
                        </thead>
                        <tbody>
                            <tr th:each="v : ${ventes}">
                                <td th:text="${v.id}"></td>
                                <td th:text="${v.dateVente}"></td>
                                <td th:text="${v.montantTotal + ' Ar'}" class="fw-bold"></td>
                            </tr>
                            <tr th:if="${ventes.empty}">
                                <td colspan="3" class="text-center text-muted p-4">Aucune vente passée pour ce client.</td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>
</main>
</body>
</html>
