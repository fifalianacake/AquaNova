<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" th:replace="~{fragments/layout :: layout(~{::title}, ~{::main})}">
<head>
    <title>AquaNova - Fiche client</title>
</head>
<body>
<main>

<div class="d-flex justify-content-between align-items-start flex-wrap gap-2 mb-3">
    <div>
        <h2 class="mb-1" th:text="${client.nom}">Client</h2>
        <div class="d-flex gap-2 align-items-center flex-wrap">
            <span class="badge" th:classappend="${client.actif} ? 'badge-success' : 'badge-danger'"
                  th:text="${client.actif} ? 'Actif' : 'Inactif'"></span>
            <span class="badge badge-info" th:if="${client.typeClient != null}" th:text="${client.typeClient.libelle}"></span>
            <span class="text-secondary small" th:text="'Client #' + ${client.id}"></span>
        </div>
    </div>
    <div class="d-flex gap-2 flex-wrap">
        <a class="btn btn-outline-secondary" th:href="@{/clients}"><i class="bi bi-arrow-left"></i> Retour</a>
        <a class="btn btn-outline-primary" th:href="@{/clients/{id}/edit(id=${client.id})}"><i class="bi bi-pencil"></i> Modifier</a>
        <a class="btn btn-outline-secondary" th:href="@{/clients/{id}/export-pdf(id=${client.id})}">
            <i class="bi bi-file-earmark-pdf"></i> Exporter en PDF
        </a>
        <form class="inline-form" th:action="@{/clients/{id}/supprimer(id=${client.id})}" method="post"
              onsubmit="return confirm('Supprimer ou désactiver ce client ?');">
            <button type="submit" class="btn btn-outline-danger"><i class="bi bi-trash3"></i> Supprimer / Désactiver</button>
        </form>
    </div>
</div>

<div class="row g-3 mb-4">
    <div class="col-sm-6 col-xl-4">
        <div class="kpi-card">
            <div class="d-flex justify-content-between align-items-start">
                <div>
                    <div class="text-secondary small">Chiffre d'affaires généré</div>
                    <div class="kpi-value" th:text="${caTotal} + ' Ar'">0 Ar</div>
                    <span class="small text-secondary"
                          th:text="${ventes.size()} + ' vente' + (${ventes.size()} > 1 ? 's' : '')"></span>
                </div>
                <div class="kpi-icon"><i class="bi bi-cash-coin"></i></div>
            </div>
        </div>
    </div>
</div>

<div class="panel mb-4">
    <div class="panel-header"><h5>Informations générales</h5></div>
    <div class="info-grid">
        <div class="info-row">
            <div class="info-label">Nom</div>
            <div class="info-value fw-semibold" th:text="${client.nom}">—</div>
        </div>
        <div class="info-row">
            <div class="info-label">Type de client</div>
            <div class="info-value" th:text="${client.typeClient != null ? client.typeClient.libelle : '—'}">—</div>
        </div>
        <div class="info-row">
            <div class="info-label">Contact</div>
            <div class="info-value"
                 th:text="${client.contact != null and !client.contact.empty ? client.contact : '—'}">—</div>
        </div>
        <div class="info-row">
            <div class="info-label">Email</div>
            <div class="info-value"
                 th:text="${client.email != null and !client.email.empty ? client.email : '—'}">—</div>
        </div>
        <div class="info-row">
            <div class="info-label">Statut</div>
            <div class="info-value" th:text="${client.actif} ? 'Actif' : 'Inactif'">—</div>
        </div>
        <div class="info-row info-row-full">
            <div class="info-label">Adresse</div>
            <div class="info-value"
                 th:text="${client.adresse != null and !client.adresse.empty ? client.adresse : 'Non renseignée.'}">—</div>
        </div>
    </div>
</div>

<div class="panel">
    <div class="panel-header">
        <h5>Historique des ventes</h5>
        <span class="result-count"
              th:text="${ventes.size()} + ' vente' + (${ventes.size()} > 1 ? 's' : '')"></span>
    </div>
    <div class="table-responsive">
        <table class="table table-hover align-middle mb-0">
            <thead>
            <tr>
                <th>Référence</th>
                <th>Date</th>
                <th class="text-end">Montant total (Ar)</th>
                <th class="text-end">Actions</th>
            </tr>
            </thead>
            <tbody>
            <tr th:each="v : ${ventes}">
                <td class="fw-semibold" th:text="'Vente #' + ${v.id}"></td>
                <td th:text="${v.dateVente != null ? #temporals.format(v.dateVente, 'dd/MM/yyyy') : '—'}"></td>
                <td class="text-end montant" th:text="${#numbers.formatDecimal(v.montantTotal, 1, 'WHITESPACE', 0, 'COMMA')}"></td>
                <td class="text-end">
                    <a class="btn btn-sm btn-outline-primary" th:href="@{/ventes/{id}(id=${v.id})}" title="Voir la vente">
                        <i class="bi bi-eye"></i>
                    </a>
                </td>
            </tr>
            <tr th:if="${ventes.empty}">
                <td colspan="4" class="text-center text-secondary py-4">Aucune vente passée pour ce client.</td>
            </tr>
            </tbody>
        </table>
    </div>
</div>

</main>
</body>
</html>
