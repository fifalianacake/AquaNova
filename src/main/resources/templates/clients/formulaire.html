<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>AquaNova - Nouveau Client</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
</head>
<body class="container mt-4" style="max-width: 600px;">

    <h2>Ajouter un nouveau client</h2>
    <p class="text-muted">Remplissez les informations ci-dessous.</p>
    <hr>

    <div th:if="${erreur}" class="alert alert-danger" th:text="${erreur}"></div>

    <form th:action="@{/clients}" th:object="${client}" method="post" class="row g-3">
        <div class="col-12">
            <label class="form-label">Nom / Raison Sociale <span class="text-danger">*</span></label>
            <input type="text" th:field="*{nom}" class="form-control" required placeholder="Obligatoire">
        </div>

        <div class="col-12">
            <label class="form-label">Type de client <span class="text-danger">*</span></label>
            <select th:field="*{typeClient.id}" class="form-select" required>
                <option value="">-- Choisir un type --</option>
                <option th:each="t : ${types}" th:value="${t.id}" th:text="${t.libelle}"></option>
            </select>
        </div>

        <div class="col-12">
            <label class="form-label">Contact téléphonique</label>
            <input type="text" th:field="*{contact}" class="form-control" placeholder="Recommandé">
        </div>

        <div class="col-12">
            <label class="form-label">Adresse Email</label>
            <input type="email" th:field="*{email}" class="form-control" placeholder="exemple@aquanova.mg">
        </div>

        <div class="col-12">
            <label class="form-label">Adresse physique</label>
            <input type="text" th:field="*{adresse}" class="form-control" placeholder="Ex: Lot Lot IV...">
        </div>

        <div class="col-12 mt-4">
            <button type="submit" class="btn btn-success">💾 Enregistrer le client</button>
            <a th:href="@{/clients}" class="btn btn-secondary">Annuler</a>
        </div>
    </form>
</body>
</html>
