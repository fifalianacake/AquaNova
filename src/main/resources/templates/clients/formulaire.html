<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" th:replace="~{fragments/layout :: layout(~{::title}, ~{::main})}">
<head>
    <title>AquaNova - Nouveau Client</title>
</head>
<body>
<main>
    <h2>Ajouter un nouveau client</h2>
    <p class="text-muted">Remplissez les informations ci-dessous.</p>

    <div class="error" th:if="${erreur}" th:text="${erreur}"></div>

    <form class="form-panel" th:action="@{/clients}" th:object="${client}" method="post">
        <div class="mb-3">
            <label class="form-label" for="nom">Nom / Raison Sociale <span class="text-danger">*</span></label>
            <input type="text" id="nom" th:field="*{nom}" class="form-control" required placeholder="Obligatoire">
        </div>

        <div class="mb-3">
            <label class="form-label" for="typeClient">Type de client <span class="text-danger">*</span></label>
            <select id="typeClient" th:field="*{typeClient.id}" class="form-select" required>
                <option value="">-- Choisir un type --</option>
                <option th:each="t : ${types}" th:value="${t.id}" th:text="${t.libelle}"></option>
            </select>
        </div>

        <div class="mb-3">
            <label class="form-label" for="contact">Contact téléphonique</label>
            <input type="text" id="contact" th:field="*{contact}" class="form-control" placeholder="Recommandé">
        </div>

        <div class="mb-3">
            <label class="form-label" for="email">Adresse Email</label>
            <input type="email" id="email" th:field="*{email}" class="form-control" placeholder="exemple@aquanova.mg">
        </div>

        <div class="mb-3">
            <label class="form-label" for="adresse">Adresse physique</label>
            <input type="text" id="adresse" th:field="*{adresse}" class="form-control" placeholder="Ex: Lot Lot IV...">
        </div>

        <div class="d-flex gap-2 mt-4">
            <button type="submit" class="btn btn-primary">Enregistrer le client</button>
            <a th:href="@{/clients}" class="btn btn-secondary">Retour à la liste</a>
        </div>
    </form>
</main>
</body>
</html>
