<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" th:replace="~{fragments/layout :: layout(~{::title}, ~{::main})}">
<head>
    <title>AquaNova - Catégories Clients</title>
</head>
<body>
<main>
    
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h2>Types de Clients</h2>
        <a th:href="@{/clients}" class="btn btn-secondary">Retour aux clients</a>
    </div>

    <table class="table table-bordered table-striped">
        <thead class="table-dark">
            <tr>
                <th>ID</th>
                <th>Code Interne</th>
                <th>Libellé de la catégorie</th>
            </tr>
        </thead>
        <tbody>
            <tr th:each="t : ${types}">
                <td th:text="${t.id}"></td>
                <td th:text="${t.code}"></td>
                <td th:text="${t.libelle}"></td>
            </tr>
        </tbody>
    </table>
</main>
</body>
</html>
