<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" th:replace="~{fragments/layout :: layout(~{::title}, ~{::main})}">
<head>
    <title>AquaNova - Prévisions Financières</title>
</head>
<body>
<main>
    <h2>Calcul des Prévisions Financières par Période</h2>

    <form th:action="@{/finance/previsions}" method="get">
        <div>
            <label class="form-label" for="dateDebut">Date de début :</label>
            <input class="form-control" type="date" id="dateDebut" name="dateDebut" th:value="${dateDebut}" required />

            <label class="form-label" for="dateFin">Date de fin :</label>
            <input class="form-control" type="date" id="dateFin" name="dateFin" th:value="${dateFin}" required />

            <button class="btn btn-primary" type="submit">Générer les prévisions</button>
        </div>
    </form>

    <br />

    <p th:if="${erreur}" th:text="${erreur}" style="color: red; font-weight: bold;"></p>

    <table class="table table-hover align-middle">
        <thead>
            <tr>
                <th>Code Lot</th>
                <th>Espèce</th>
                <th>Biomasse Prévue</th>
                <th>Prix Moyen Vente</th>
                <th>CA Prévisionnel</th>
                <th>Coût Prévisionnel</th>
                <th>Profit Prévisionnel</th>
                <th>Marge Prévisionnelle</th>
            </tr>
        </thead>
        <tbody>
            <tr th:if="${#lists.isEmpty(previsions)}">
                <td colspan="8" style="text-align: center;">Aucune prévision financière disponible pour cette période
                </td>
            </tr>

            <tr th:each="p : ${previsions}">
                <td th:text="${p.codeLot}"></td>
                <td th:text="${p.espece}"></td>
                <td th:text="${#numbers.formatDecimal(p.biomassePrevue, 1, 2)}"></td>
                <td th:text="${#numbers.formatDecimal(p.prixMoyenVenteKg, 1, 2)}"></td>
                <td th:text="${#numbers.formatDecimal(p.caPrevisionnel, 1, 2)}"></td>
                <td th:text="${#numbers.formatDecimal(p.coutPrevisionnel, 1, 2)}"></td>
                <td th:text="${#numbers.formatDecimal(p.profitPrevisionnel, 1, 2)}"></td>
                <td th:text="${#numbers.formatDecimal(p.margePrevisionnelle, 1, 2)}"></td>
            </tr>
        </tbody>
    </table>
</main>
</body>
</html>
