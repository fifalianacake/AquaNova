<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" th:replace="~{fragments/layout :: layout(~{::title}, ~{::main})}">
<head>
    <title>Historique achats et dépenses</title>
</head>
<body>
<main>

<h1>Historique des achats et dépenses</h1>

<form th:action="@{/achats-depenses/historique}" th:object="${filter}" method="get" class="filters">
    <label class="form-label">Type opération
        <select class="form-select" th:field="*{typeOperation}">
            <option value="">Tous</option>
            <option th:each="op : ${operations}" th:value="${op}" th:text="${op.libelle}"></option>
        </select>
    </label>

    <label class="form-label">Fournisseur
        <select class="form-select" th:field="*{fournisseurId}">
            <option value="">Tous</option>
            <option th:each="f : ${fournisseurs}" th:value="${f.id}" th:text="${f.nom}"></option>
        </select>
    </label>

    <label class="form-label">Catégorie
        <select class="form-select" th:field="*{categorieDepenseId}">
            <option value="">Toutes</option>
            <option th:each="c : ${categoriesDepense}" th:value="${c.id}"
                    th:text="${c.code + ' - ' + c.libelle}"></option>
        </select>
    </label>

    <label class="form-label">Date début
        <input class="form-control" type="date" th:field="*{dateDebut}" />
    </label>

    <label class="form-label">Date fin
        <input class="form-control" type="date" th:field="*{dateFin}" />
    </label>

    <label class="form-label">Montant min
        <input class="form-control" type="number" min="0" step="0.01" th:field="*{montantMin}" />
    </label>

    <label class="form-label">Montant max
        <input class="form-control" type="number" min="0" step="0.01" th:field="*{montantMax}" />
    </label>

    <div style="display:flex; gap:8px; align-items:center;">
        <button class="btn btn-primary" type="submit">Filtrer</button>
        <a th:href="@{/achats-depenses/historique}">Réinitialiser</a>
    </div>
</form>

<table class="table table-hover align-middle">
    <thead>
    <tr>
        <th>ID</th>
        <th>Type</th>
        <th>Date</th>
        <th>Fournisseur</th>
        <th>Catégorie</th>
        <th>Détails</th>
        <th>Montant</th>
    </tr>
    </thead>
    <tbody>
    <tr th:if="${#lists.isEmpty(historiques)}">
        <td class="empty" colspan="7">Aucun résultat pour ces critères.</td>
    </tr>
    <tr th:each="item : ${historiques}">
        <td th:text="${item.id}"></td>
        <td th:text="${item.typeOperation.libelle}"></td>
        <td th:text="${item.date}"></td>
        <td th:text="${item.fournisseur ?: '-'}"></td>
        <td th:text="${item.categorie}"></td>
        <td th:text="${item.details ?: '-'}"></td>
        <td th:text="${item.montant}"></td>
    </tr>
    </tbody>
</table>
</main>
</body>
</html>
