<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" th:replace="~{fragments/layout :: layout(~{::title}, ~{::main})}">
<head>
    <title>Fiche intrant</title>
</head>
<body>
<main>

<h1 th:text="${intrant.nom}">Intrant</h1>

<dl>
    <dt>ID</dt><dd th:text="${intrant.id}"></dd>
    <dt>Catégorie</dt><dd th:text="${intrant.categorieIntrant}"></dd>
    <dt>Unité</dt><dd th:text="${intrant.unite}"></dd>
    <dt>Prix de référence</dt><dd th:text="${intrant.prixReference}"></dd>
    <dt>Stock actuel</dt><dd th:text="${stockActuel + ' ' + intrant.unite}"></dd>
    <dt>Actif</dt><dd th:text="${intrant.actif ? 'Oui' : 'Non'}"></dd>
    <dt>Description</dt><dd th:text="${intrant.description}"></dd>
</dl>

<div class="actions">
    <a class="btn btn-secondary" th:href="@{/intrants}">Retour liste</a>
    <a class="btn btn-sm btn-outline-primary" th:href="@{/intrants/{id}/edit(id=${intrant.id})}">Modifier</a>
    <a class="btn btn-sm btn-outline-primary" th:href="@{/intrants/{id}/stock(id=${intrant.id})}">Fiche stock</a>
    <form method="post" th:action="@{/intrants/{id}/delete(id=${intrant.id})}" onsubmit="return confirm('Supprimer ou désactiver cet intrant ?')">
        <button class="btn btn-danger" type="submit">Supprimer / Désactiver</button>
    </form>
</div>
</main>
</body>
</html>
