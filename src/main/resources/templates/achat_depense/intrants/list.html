<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" th:replace="~{fragments/layout :: layout(~{::title}, ~{::main})}">
<head>
    <title>Catalogue des intrants</title>
</head>
<body>
<main>

<h1>Catalogue des intrants</h1>

<div class="toolbar">
    <a th:href="@{/intrants/new}">Nouvel intrant</a>
    <a th:href="@{/achats/intrants/new}">Nouvel achat d'intrants</a>
    <a class="btn btn-sm btn-outline-primary" th:href="@{/achats}">Historique achats intrants</a>
</div>

<form method="get" th:action="@{/intrants}" class="filters">
    <input type="hidden" name="page" value="0" />

    <label class="form-label">ID
        <input class="form-control" type="number" name="id" th:value="${filter.id}" />
    </label>

    <label class="form-label">Nom
        <input class="form-control" type="text" name="nom" th:value="${filter.nom}" placeholder="Sel, chaux, désinfectant..." />
    </label>

    <label class="form-label">Catégorie
        <select class="form-select" name="categorieIntrant">
            <option value="">Toutes</option>
            <option th:each="cat : ${categoriesIntrant}"
                    th:value="${cat}"
                    th:text="${cat}"
                    th:selected="${filter.categorieIntrant == cat}"></option>
        </select>
    </label>

    <label class="form-label">Unité
        <input class="form-control" type="text" name="unite" th:value="${filter.unite}" placeholder="kg, L, unité" />
    </label>

    <label class="form-label">Actif
        <select class="form-select" name="actif">
            <option value="">Tous</option>
            <option value="true" th:selected="${filter.actif == true}">Actifs</option>
            <option value="false" th:selected="${filter.actif == false}">Inactifs</option>
        </select>
    </label>

    <label class="form-label">Lignes/page
        <select class="form-select" name="size" onchange="this.form.submit()">
            <option th:each="s : ${pageSizes}"
                    th:value="${s}"
                    th:text="${s}"
                    th:selected="${intrants.size == s}"></option>
        </select>
    </label>

    <button class="btn btn-primary" type="submit">Filtrer</button>
    <a th:href="@{/intrants}">Réinitialiser</a>
</form>

<table class="table table-hover align-middle">
    <thead>
    <tr>
        <th>ID</th>
        <th>Nom</th>
        <th>Catégorie</th>
        <th>Unité</th>
        <th>Prix référence</th>
        <th>Actif</th>
        <th>Actions</th>
    </tr>
    </thead>
    <tbody>
    <tr th:each="intrant : ${intrants.content}">
        <td th:text="${intrant.id}"></td>
        <td th:text="${intrant.nom}"></td>
        <td th:text="${intrant.categorieIntrant}"></td>
        <td th:text="${intrant.unite}"></td>
        <td th:text="${intrant.prixReference}"></td>
        <td><span class="badge" th:text="${intrant.actif ? 'Oui' : 'Non'}"></span></td>
        <td>
            <a class="btn btn-sm btn-outline-primary" th:href="@{/intrants/{id}(id=${intrant.id})}">Fiche</a>
            <a th:href="@{/intrants/{id}/stock(id=${intrant.id})}">Stock</a>
            <a class="btn btn-sm btn-outline-primary" th:href="@{/intrants/{id}/edit(id=${intrant.id})}">Modifier</a>
        </td>
    </tr>
    <tr th:if="${intrants.empty}">
        <td colspan="7">Aucun intrant trouvé.</td>
    </tr>
    </tbody>
</table>

<div class="pagination" th:if="${intrants.totalPages > 0}">
    <a class="btn btn-secondary" th:if="${intrants.hasPrevious()}"
       th:href="@{/intrants(page=${intrants.number - 1}, size=${intrants.size}, id=${filter.id}, nom=${filter.nom}, categorieIntrant=${filter.categorieIntrant}, unite=${filter.unite}, actif=${filter.actif})}">&laquo; Précédent</a>
    <span th:unless="${intrants.hasPrevious()}" style="color:#999;">&laquo; Précédent</span>

    <span th:text="'Page ' + ${intrants.number + 1} + ' sur ' + ${intrants.totalPages} + ' — ' + ${intrants.totalElements} + ' résultat(s)'"></span>

    <a th:if="${intrants.hasNext()}"
       th:href="@{/intrants(page=${intrants.number + 1}, size=${intrants.size}, id=${filter.id}, nom=${filter.nom}, categorieIntrant=${filter.categorieIntrant}, unite=${filter.unite}, actif=${filter.actif})}">Suivant &raquo;</a>
    <span th:unless="${intrants.hasNext()}" style="color:#999;">Suivant &raquo;</span>
</div>
</main>
</body>
</html>
