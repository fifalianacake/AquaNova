<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" th:replace="~{fragments/layout :: layout(~{::title}, ~{::main})}">
<head>
    <title>AquaNova - Catalogue des intrants</title>
</head>
<body>
<main>

<div class="toolbar">
    <a class="btn btn-primary" th:href="@{/intrants/new}"><i class="bi bi-plus-lg"></i> Nouvel intrant</a>
    <a class="btn btn-outline-primary" th:href="@{/achats/intrants/new}">Nouvel achat d'intrants</a>
    <a class="btn btn-outline-primary" th:href="@{/achats/intrants}">Historique achats intrants</a>
</div>

<div class="panel">
    <div class="panel-header">
        <h5>Catalogue des intrants</h5>
        <span class="result-count"
              th:text="${intrants.totalElements} + ' intrant' + (${intrants.totalElements} > 1 ? 's' : '') + ' trouvé' + (${intrants.totalElements} > 1 ? 's' : '')"></span>
    </div>

    <form method="get" th:action="@{/intrants}" class="filters-bar">
        <input type="hidden" name="page" value="0" />
        <input class="form-control fc-sm" type="number" name="id" placeholder="ID" th:value="${filter.id}">
        <input class="form-control" type="text" name="nom" placeholder="Nom (sel, chaux...)" th:value="${filter.nom}">
        <select class="form-select" name="categorieIntrant">
            <option value="">Toutes les catégories</option>
            <option th:each="cat : ${categoriesIntrant}"
                    th:value="${cat}"
                    th:text="${cat}"
                    th:selected="${filter.categorieIntrant == cat}"></option>
        </select>
        <input class="form-control fc-sm" type="text" name="unite" placeholder="Unité" th:value="${filter.unite}">
        <select class="form-select" name="actif">
            <option value="">Tous les statuts</option>
            <option value="true" th:selected="${filter.actif == true}">Actifs</option>
            <option value="false" th:selected="${filter.actif == false}">Inactifs</option>
        </select>
        <button class="btn btn-primary" type="submit"><i class="bi bi-search"></i> Filtrer</button>
        <a class="btn btn-outline-secondary" th:href="@{/intrants}"><i class="bi bi-x-circle"></i> Réinitialiser</a>
    </form>

    <div class="table-responsive">
        <table class="table table-hover align-middle">
            <thead>
            <tr>
                <th>ID</th>
                <th>Nom</th>
                <th>Catégorie</th>
                <th>Unité</th>
                <th class="text-end">Prix référence</th>
                <th>Actif</th>
                <th class="text-end">Actions</th>
            </tr>
            </thead>
            <tbody>
            <tr th:each="intrant : ${intrants.content}">
                <td th:text="${intrant.id}"></td>
                <td class="fw-semibold" th:text="${intrant.nom}"></td>
                <td th:text="${intrant.categorieIntrant}"></td>
                <td th:text="${intrant.unite}"></td>
                <td class="text-end montant" th:text="${intrant.prixReference}"></td>
                <td>
                    <span th:class="'badge ' + (${intrant.actif} ? 'badge-success' : 'badge-danger')"
                          th:text="${intrant.actif ? 'Oui' : 'Non'}"></span>
                </td>
                <td class="text-end">
                    <a class="btn btn-sm btn-outline-primary" th:href="@{/intrants/{id}(id=${intrant.id})}" title="Voir la fiche"><i class="bi bi-eye"></i></a>
                    <a class="btn btn-sm btn-outline-secondary" th:href="@{/intrants/{id}/stock(id=${intrant.id})}" title="Stock"><i class="bi bi-box-seam"></i></a>
                    <a class="btn btn-sm btn-outline-primary" th:href="@{/intrants/{id}/edit(id=${intrant.id})}" title="Modifier"><i class="bi bi-pencil"></i></a>
                </td>
            </tr>
            <tr th:if="${intrants.empty}">
                <td colspan="7" class="text-center text-secondary py-4">Aucun intrant ne correspond à ces critères.</td>
            </tr>
            </tbody>
        </table>
    </div>

    <div th:replace="~{fragments/tableau :: tableFooter(${intrants})}"></div>
</div>
</main>
</body>
</html>
