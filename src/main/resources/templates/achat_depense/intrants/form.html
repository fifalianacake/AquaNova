<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title th:text="${intrant.id == null ? 'Nouvel intrant' : 'Modifier intrant'}">Intrant</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 24px; }
        form { max-width: 720px; }
        label { display: block; margin: 12px 0; }
        input, select, textarea { width: 100%; padding: 8px; box-sizing: border-box; }
        .error { color: #b00020; margin: 12px 0; }
    </style>
</head>
<body>
<h1 th:text="${intrant.id == null ? 'Nouvel intrant' : 'Modifier intrant'}">Intrant</h1>

<div class="error" th:if="${error}" th:text="${error}"></div>

<form method="post" th:object="${intrant}"
      th:action="${intrant.id == null} ? @{/intrants} : @{/intrants/{id}(id=${intrant.id})}">

    <label>Nom *
        <input type="text" th:field="*{nom}" required />
    </label>

    <label>Catégorie *
        <select th:field="*{categorieIntrant}" required>
            <option value="">-- Choisir --</option>
            <option th:each="cat : ${categoriesIntrant}" th:value="${cat}" th:text="${cat}"></option>
        </select>
    </label>

    <label>Unité *
        <input type="text" th:field="*{unite}" placeholder="kg, L, unité..." required />
    </label>

    <label>Prix de référence
        <input type="number" step="0.01" min="0" th:field="*{prixReference}" />
    </label>

    <label>Description
        <textarea th:field="*{description}" rows="4"></textarea>
    </label>

    <label>
        <input type="checkbox" th:field="*{actif}" style="width:auto;" /> Actif
    </label>

    <button type="submit">Enregistrer</button>
    <a th:href="@{/intrants}">Annuler</a>
</form>

</body>
</html>
