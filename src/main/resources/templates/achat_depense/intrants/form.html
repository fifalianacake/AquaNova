<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" th:replace="~{fragments/layout :: layout(~{::title}, ~{::main})}">
<head>
    <title>Intrant</title>
</head>
<body>
<main>

<h2 th:text="${intrant.id == null ? 'Nouvel intrant' : 'Modifier intrant'}">Intrant</h2>

<div class="error" th:if="${error}" th:text="${error}"></div>

<form class="form-panel" method="post" th:object="${intrant}"
      th:action="${intrant.id == null} ? @{/intrants} : @{/intrants/{id}(id=${intrant.id})}">

    <div class="mb-3">
        <label class="form-label" for="nom">Nom *</label>
        <input class="form-control" type="text" id="nom" th:field="*{nom}" required />
    </div>

    <div class="mb-3">
        <label class="form-label" for="categorieIntrant">Catégorie *</label>
        <select class="form-select" id="categorieIntrant" th:field="*{categorieIntrant}" required>
            <option value="">-- Choisir --</option>
            <option th:each="cat : ${categoriesIntrant}" th:value="${cat}" th:text="${cat}"></option>
        </select>
    </div>

    <div class="mb-3">
        <label class="form-label" for="unite">Unité *</label>
        <input class="form-control" type="text" id="unite" th:field="*{unite}" placeholder="kg, L, unité..." required />
    </div>

    <div class="mb-3">
        <label class="form-label" for="prixReference">Prix de référence</label>
        <input class="form-control" type="number" step="0.01" min="0" id="prixReference" th:field="*{prixReference}" />
    </div>

    <div class="mb-3">
        <label class="form-label" for="description">Description</label>
        <textarea class="form-control" id="description" th:field="*{description}" rows="4"></textarea>
    </div>

    <div class="form-check mb-3">
        <input class="form-check-input" type="checkbox" id="actif" th:field="*{actif}" />
        <label class="form-check-label" for="actif">Actif</label>
    </div>

    <div class="d-flex gap-2 mt-4">
        <button class="btn btn-primary" type="submit">Enregistrer</button>
        <a class="btn btn-secondary" th:href="@{/intrants}">Retour à la liste</a>
    </div>
</form>
</main>
</body>
</html>
