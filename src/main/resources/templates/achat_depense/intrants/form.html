<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" th:replace="~{fragments/layout :: layout(~{::title}, ~{::main})}">
<head>
    <title>Intrant</title>
</head>
<body>
<main>

<h1 th:text="${intrant.id == null ? 'Nouvel intrant' : 'Modifier intrant'}">Intrant</h1>

<div class="error" th:if="${error}" th:text="${error}"></div>

<form method="post" th:object="${intrant}"
      th:action="${intrant.id == null} ? @{/intrants} : @{/intrants/{id}(id=${intrant.id})}">

    <label class="form-label">Nom *
        <input class="form-control" type="text" th:field="*{nom}" required />
    </label>

    <label class="form-label">Catégorie *
        <select class="form-select" th:field="*{categorieIntrant}" required>
            <option value="">-- Choisir --</option>
            <option th:each="cat : ${categoriesIntrant}" th:value="${cat}" th:text="${cat}"></option>
        </select>
    </label>

    <label class="form-label">Unité *
        <input class="form-control" type="text" th:field="*{unite}" placeholder="kg, L, unité..." required />
    </label>

    <label class="form-label">Prix de référence
        <input class="form-control" type="number" step="0.01" min="0" th:field="*{prixReference}" />
    </label>

    <label class="form-label">Description
        <textarea class="form-control" th:field="*{description}" rows="4"></textarea>
    </label>

    <label class="form-label">
        <input class="form-check-input" type="checkbox" th:field="*{actif}" style="width:auto;" /> Actif
    </label>

    <button class="btn btn-primary" type="submit">Enregistrer</button>
    <a class="btn btn-secondary" th:href="@{/intrants}">Annuler</a>
</form>
</main>
</body>
</html>
