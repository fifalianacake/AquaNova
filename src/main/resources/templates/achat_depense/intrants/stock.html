<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" th:replace="~{fragments/layout :: layout(~{::title}, ~{::main})}">
<head>
    <title>Stock intrant</title>
</head>
<body>
<main>

<h1>Fiche stock intrant</h1>

<div class="toolbar">
    <a th:href="@{/intrants}">Catalogue intrants</a>
    <a class="btn btn-sm btn-outline-primary" th:href="@{/intrants/{id}(id=${intrant.id})}">Fiche intrant</a>
    <a th:href="@{/achats/intrants/new}">Nouvel achat d'intrants</a>
</div>

<p><strong>Intrant :</strong> <span th:text="${intrant.nom}"></span></p>
<p class="stock"><strong>Stock actuel :</strong> <span th:text="${stockActuel + ' ' + intrant.unite}"></span></p>

<form method="get" th:action="@{/intrants/{intrantId}/stock(intrantId=${intrant.id})}" class="filters">
    <input type="hidden" name="page" value="0" />

    <label class="form-label">ID mouvement
        <input class="form-control" type="number" name="id" th:value="${filter.id}" />
    </label>

    <label class="form-label">Type
        <select class="form-select" name="typeMouvement">
            <option value="">Tous</option>
            <option th:each="type : ${typesMouvement}"
                    th:value="${type}"
                    th:text="${type}"
                    th:selected="${filter.typeMouvement == type}"></option>
        </select>
    </label>

    <label class="form-label">Date début
        <input class="form-control" type="date" name="dateDebut" th:value="${filter.dateDebut}" />
    </label>

    <label class="form-label">Date fin
        <input class="form-control" type="date" name="dateFin" th:value="${filter.dateFin}" />
    </label>

    <label class="form-label">Lignes/page
        <select class="form-select" name="size" onchange="this.form.submit()">
            <option th:each="s : ${pageSizes}"
                    th:value="${s}"
                    th:text="${s}"
                    th:selected="${mouvements.size == s}"></option>
        </select>
    </label>

    <button class="btn btn-primary" type="submit">Filtrer</button>
    <a th:href="@{/intrants/{intrantId}/stock(intrantId=${intrant.id})}">Réinitialiser</a>
</form>

<table class="table table-hover align-middle">
    <thead>
    <tr>
        <th>ID</th>
        <th>Date</th>
        <th>Type</th>
        <th>Quantité</th>
        <th>Ligne achat</th>
        <th>Commentaire</th>
    </tr>
    </thead>
    <tbody>
    <tr th:each="m : ${mouvements.content}">
        <td th:text="${m.id}"></td>
        <td th:text="${m.dateMouvement}"></td>
        <td th:text="${m.typeMouvement}"></td>
        <td th:text="${m.quantite + ' ' + intrant.unite}"></td>
        <td>
            <a th:if="${m.ligneAchat != null && m.ligneAchat.achat != null}"
               th:href="@{/achats/{id}(id=${m.ligneAchat.achat.id})}"
               th:text="${'Achat #' + m.ligneAchat.achat.id}"></a>
            <span th:unless="${m.ligneAchat != null && m.ligneAchat.achat != null}">-</span>
        </td>
        <td th:text="${m.commentaire}"></td>
    </tr>
    <tr th:if="${mouvements.empty}">
        <td colspan="6">Aucun mouvement trouvé.</td>
    </tr>
    </tbody>
</table>

<div class="pagination" th:if="${mouvements.totalPages > 0}">
    <a class="btn btn-secondary" th:if="${mouvements.hasPrevious()}"
       th:href="@{/intrants/{intrantId}/stock(intrantId=${intrant.id}, page=${mouvements.number - 1}, size=${mouvements.size}, id=${filter.id}, typeMouvement=${filter.typeMouvement}, dateDebut=${filter.dateDebut}, dateFin=${filter.dateFin})}">&laquo; Précédent</a>
    <span th:unless="${mouvements.hasPrevious()}" style="color:#999;">&laquo; Précédent</span>

    <span th:text="'Page ' + ${mouvements.number + 1} + ' sur ' + ${mouvements.totalPages} + ' — ' + ${mouvements.totalElements} + ' mouvement(s)'"></span>

    <a th:if="${mouvements.hasNext()}"
       th:href="@{/intrants/{intrantId}/stock(intrantId=${intrant.id}, page=${mouvements.number + 1}, size=${mouvements.size}, id=${filter.id}, typeMouvement=${filter.typeMouvement}, dateDebut=${filter.dateDebut}, dateFin=${filter.dateFin})}">Suivant &raquo;</a>
    <span th:unless="${mouvements.hasNext()}" style="color:#999;">Suivant &raquo;</span>
</div>
</main>
</body>
</html>
