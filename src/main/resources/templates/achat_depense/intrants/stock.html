<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" th:replace="~{fragments/layout :: layout(~{::title}, ~{::main})}">
<head>
    <title>AquaNova - Stock intrant</title>
</head>
<body>
<main>

<div class="toolbar">
    <a class="btn btn-outline-primary" th:href="@{/intrants}"><i class="bi bi-arrow-left"></i> Catalogue intrants</a>
    <a class="btn btn-outline-primary" th:href="@{/intrants/{id}(id=${intrant.id})}">Fiche intrant</a>
    <a class="btn btn-primary" th:href="@{/achats/intrants/new}"><i class="bi bi-plus-lg"></i> Nouvel achat d'intrants</a>
</div>

<div class="row g-3 mb-3">
    <div class="col-sm-6 col-xl-3">
        <div class="kpi-card">
            <div class="d-flex justify-content-between">
                <div>
                    <div class="text-secondary small" th:text="'Stock actuel — ' + ${intrant.nom}">Stock actuel</div>
                    <div class="kpi-value" th:text="${stockActuel + ' ' + intrant.unite}">0</div>
                </div>
                <div class="kpi-icon"><i class="bi bi-box-seam"></i></div>
            </div>
        </div>
    </div>
</div>

<div class="panel">
    <div class="panel-header">
        <h5>Mouvements de stock</h5>
        <span class="result-count"
              th:text="${mouvements.totalElements} + ' mouvement' + (${mouvements.totalElements} > 1 ? 's' : '')"></span>
    </div>

    <form method="get" th:action="@{/intrants/{intrantId}/stock(intrantId=${intrant.id})}" class="filters-bar">
        <input type="hidden" name="page" value="0" />
        <input class="form-control fc-sm" type="number" name="id" placeholder="ID" th:value="${filter.id}" />
        <select class="form-select" name="typeMouvement">
            <option value="">Tous les types</option>
            <option th:each="type : ${typesMouvement}"
                    th:value="${type}"
                    th:text="${type}"
                    th:selected="${filter.typeMouvement == type}"></option>
        </select>
        <div class="input-group">
            <span class="input-group-text">Du</span>
            <input class="form-control" type="date" name="dateDebut" th:value="${filter.dateDebut}" />
        </div>
        <div class="input-group">
            <span class="input-group-text">Au</span>
            <input class="form-control" type="date" name="dateFin" th:value="${filter.dateFin}" />
        </div>
        <button class="btn btn-primary" type="submit"><i class="bi bi-search"></i> Filtrer</button>
        <a class="btn btn-outline-secondary" th:href="@{/intrants/{intrantId}/stock(intrantId=${intrant.id})}"><i class="bi bi-x-circle"></i> Réinitialiser</a>
    </form>

    <div class="table-responsive">
        <table class="table table-hover align-middle">
            <thead>
            <tr>
                <th>ID</th>
                <th>Date</th>
                <th>Type</th>
                <th class="text-end">Quantité</th>
                <th>Ligne achat</th>
                <th>Commentaire</th>
            </tr>
            </thead>
            <tbody>
            <tr th:each="m : ${mouvements.content}">
                <td th:text="${m.id}"></td>
                <td th:text="${m.dateMouvement}"></td>
                <td>
                    <span class="badge"
                          th:classappend="${#strings.toString(m.typeMouvement) == 'ENTREE'} ? 'badge-success' : 'badge-warning'"
                          th:text="${m.typeMouvement}"></span>
                </td>
                <td class="text-end" th:text="${m.quantite + ' ' + intrant.unite}"></td>
                <td>
                    <a th:if="${m.ligneAchat != null && m.ligneAchat.achat != null}"
                       th:href="@{/achats/{id}(id=${m.ligneAchat.achat.id})}"
                       th:text="${'Achat #' + m.ligneAchat.achat.id}"></a>
                    <span th:unless="${m.ligneAchat != null && m.ligneAchat.achat != null}">—</span>
                </td>
                <td th:text="${m.commentaire}"></td>
            </tr>
            <tr th:if="${mouvements.empty}">
                <td colspan="6" class="text-center text-secondary py-4">Aucun mouvement trouvé.</td>
            </tr>
            </tbody>
        </table>
    </div>

    <div th:replace="~{fragments/tableau :: tableFooter(${mouvements})}"></div>
</div>
</main>
</body>
</html>
