<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" th:replace="~{fragments/layout :: layout(~{::title}, ~{::main})}">
<head>
    <title>AquaNova - Liste des fournisseurs</title>
</head>
<body>
<main>

<div class="success" th:if="${successMessage}" th:text="${successMessage}"></div>
<div class="error" th:if="${errorMessage}" th:text="${errorMessage}"></div>

<div class="toolbar">
    <a class="btn btn-primary" th:href="@{/fournisseurs/new}"><i class="bi bi-plus-lg"></i> Ajouter un nouveau fournisseur</a>
</div>

<div class="panel">
    <div class="panel-header">
        <h5>Liste des fournisseurs</h5>
        <span class="result-count"
              th:text="${#lists.size(fournisseurs)} + ' fournisseur' + (${#lists.size(fournisseurs)} > 1 ? 's' : '') + ' trouvé' + (${#lists.size(fournisseurs)} > 1 ? 's' : '')"></span>
    </div>

    <form method="get" th:action="@{/fournisseurs}" class="filters-bar">
        <input class="form-control fc-sm" type="number" name="id" placeholder="ID" th:value="${param.id}">
        <input class="form-control" type="text" name="nom" placeholder="Nom" th:value="${param.nom}">
        <input class="form-control" type="text" name="typeFournisseur" placeholder="Type fournisseur" th:value="${param.typeFournisseur}">
        <input class="form-control" type="text" name="contact" placeholder="Contact" th:value="${param.contact}">
        <select class="form-select" name="actif">
            <option value="">Tous les statuts</option>
            <option value="true" th:selected="${param.actif != null && param.actif[0] == 'true'}">Actif</option>
            <option value="false" th:selected="${param.actif != null && param.actif[0] == 'false'}">Inactif</option>
        </select>
        <button class="btn btn-primary" type="submit"><i class="bi bi-search"></i> Filtrer</button>
        <a class="btn btn-outline-secondary" th:href="@{/fournisseurs}"><i class="bi bi-x-circle"></i> Réinitialiser</a>
    </form>

    <div class="table-responsive">
        <table class="table table-hover align-middle">
            <thead>
            <tr>
                <th>ID</th>
                <th>Nom</th>
                <th>Type</th>
                <th>Contact</th>
                <th>Email</th>
                <th>Adresse</th>
                <th>Actif</th>
                <th class="text-end">Actions</th>
            </tr>
            </thead>
            <tbody>
            <tr th:each="f : ${fournisseurs}">
                <td th:text="${f.id}"></td>
                <td class="fw-semibold" th:text="${f.nom}"></td>
                <td th:text="${f.typeFournisseur}"></td>
                <td th:text="${f.contact}"></td>
                <td th:text="${f.email}"></td>
                <td th:text="${f.adresse}"></td>
                <td>
                    <span th:class="'badge ' + (${f.actif} ? 'badge-success' : 'badge-danger')"
                          th:text="${f.actif ? 'Oui' : 'Non'}"></span>
                </td>
                <td class="text-end">
                    <a class="btn btn-sm btn-outline-primary" th:href="@{/fournisseurs/{id}(id=${f.id})}" title="Consulter"><i class="bi bi-eye"></i></a>
                    <a class="btn btn-sm btn-outline-primary" th:href="@{/fournisseurs/{id}/edit(id=${f.id})}" title="Modifier"><i class="bi bi-pencil"></i></a>
                    <form class="inline-form" th:action="@{/fournisseurs/{id}/desactiver(id=${f.id})}" method="post" th:if="${f.actif}"
                          onsubmit="return confirm('Désactiver ce fournisseur ?');">
                        <button class="btn btn-sm btn-outline-danger" type="submit" title="Désactiver"><i class="bi bi-trash3"></i></button>
                    </form>
                </td>
            </tr>
            <tr th:if="${#lists.isEmpty(fournisseurs)}">
                <td colspan="8" class="text-center text-secondary py-4">Aucun fournisseur ne correspond à ces critères.</td>
            </tr>
            </tbody>
        </table>
    </div>
</div>
</main>
</body>
</html>
