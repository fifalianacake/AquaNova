<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title th:text="${depense.id == null ? 'Nouvelle dépense' : 'Modifier dépense'}">Dépense</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 24px; }
        form { max-width: 720px; }
        label { display: block; margin: 12px 0; }
        input, select, textarea { width: 100%; padding: 8px; box-sizing: border-box; }
        .error { color: #b00020; margin: 12px 0; }
    </style>
</head>
<body>
<h1 th:text="${depense.id == null ? 'Nouvelle dépense' : 'Modifier dépense'}">Dépense</h1>

<div class="error" th:if="${error}" th:text="${error}"></div>

<form method="post" th:object="${depense}"
      th:action="${depense.id == null} ? @{/depenses} : @{/depenses/{id}(id=${depense.id})}">

    <label>Date *
        <input type="date" th:field="*{dateDepense}" required />
    </label>

    <label>Catégorie *
        <select th:field="*{categorieDepense.id}" required>
            <option value="">-- Choisir --</option>
            <option th:each="c : ${categoriesDepense}"
                    th:value="${c.id}"
                    th:text="${c.code + ' - ' + c.libelle}"></option>
        </select>
    </label>

    <label>Libellé *
        <input type="text" th:field="*{libelle}" required />
    </label>

    <label>Montant *
        <input type="number" step="0.01" min="0" th:field="*{montant}" required />
    </label>

    <label>Mode paiement
        <input type="text" th:field="*{modePaiement}" placeholder="Espèces, mobile money, virement..." />
    </label>

    <label>Référence
        <input type="text" th:field="*{reference}" />
    </label>

    <label>Observation
        <textarea th:field="*{observation}" rows="4"></textarea>
    </label>

    <button type="submit">Enregistrer</button>
    <a th:href="@{/depenses}">Annuler</a>
</form>

</body>
</html>
