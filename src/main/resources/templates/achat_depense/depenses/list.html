<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" th:replace="~{fragments/layout :: layout(~{::title}, ~{::main})}">
<head>
    <title>Dépenses diverses</title>
</head>
<body>
<main>

<h1>Dépenses diverses</h1>

<div class="success" th:if="${success}" th:text="${success}"></div>
<div class="error" th:if="${error}" th:text="${error}"></div>

<div class="toolbar">
    <a class="btn btn-primary" th:href="@{/depenses/new}">Nouvelle dépense</a>
    <a class="btn btn-sm btn-outline-secondary" th:href="@{/depenses/export-pdf(id=${filter.id}, categorieDepenseId=${filter.categorieDepenseId}, dateDebut=${filter.dateDebut}, dateFin=${filter.dateFin}, montantMin=${filter.montantMin}, montantMax=${filter.montantMax}, modePaiement=${filter.modePaiement})}">Exporter PDF</a>
</div>

<form method="get" th:action="@{/depenses}" class="filters">
    <input type="hidden" name="page" value="0" />

    <label class="form-label">ID
        <input class="form-control" type="number" name="id" th:value="${filter.id}" />
    </label>

    <label class="form-label">Catégorie
        <select class="form-select" name="categorieDepenseId">
            <option value="">Toutes</option>
            <option th:each="c : ${categoriesDepense}"
                    th:value="${c.id}"
                    th:text="${c.code + ' - ' + c.libelle}"
                    th:selected="${filter.categorieDepenseId == c.id}"></option>
        </select>
    </label>

    <label class="form-label">Date début
        <input class="form-control" type="date" name="dateDebut" th:value="${filter.dateDebut}" />
    </label>

    <label class="form-label">Date fin
        <input class="form-control" type="date" name="dateFin" th:value="${filter.dateFin}" />
    </label>

    <label class="form-label">Montant min
        <input class="form-control" type="number" step="0.01" min="0" name="montantMin" th:value="${filter.montantMin}" />
    </label>

    <label class="form-label">Montant max
        <input class="form-control" type="number" step="0.01" min="0" name="montantMax" th:value="${filter.montantMax}" />
    </label>

    <label class="form-label">Mode paiement
        <input class="form-control" type="text" name="modePaiement" th:value="${filter.modePaiement}" />
    </label>

    <label class="form-label">Lignes/page
        <select class="form-select" name="size" onchange="this.form.submit()">
            <option th:each="s : ${pageSizes}"
                    th:value="${s}"
                    th:text="${s}"
                    th:selected="${depenses.size == s}"></option>
        </select>
    </label>

    <button class="btn btn-primary" type="submit">Filtrer</button>
    <a th:href="@{/depenses}">Réinitialiser</a>
</form>

<div class="summary" th:text="'Total filtré : ' + ${totalFiltre}">Total filtré : 0</div>

<table class="table table-hover align-middle">
    <thead>
    <tr>
        <th>ID</th>
        <th>Date</th>
        <th>Catégorie</th>
        <th>Libellé</th>
        <th>Montant</th>
        <th>Mode paiement</th>
        <th>Référence</th>
        <th>Actions</th>
    </tr>
    </thead>
    <tbody>
    <tr th:each="depense : ${depenses.content}">
        <td th:text="${depense.id}"></td>
        <td th:text="${depense.dateDepense}"></td>
        <td th:text="${depense.categorieDepense != null ? depense.categorieDepense.code + ' - ' + depense.categorieDepense.libelle : '-'}"></td>
        <td th:text="${depense.libelle}"></td>
        <td th:text="${depense.montant}"></td>
        <td th:text="${depense.modePaiement ?: '-'}"></td>
        <td th:text="${depense.reference ?: '-'}"></td>
        <td>
            <a class="btn btn-sm btn-outline-primary" th:href="@{/depenses/{id}(id=${depense.id})}">Fiche</a>
            <a class="btn btn-sm btn-outline-primary" th:href="@{/depenses/{id}/edit(id=${depense.id})}">Modifier</a>
        </td>
    </tr>
    <tr th:if="${depenses.empty}">
        <td colspan="8">Aucune dépense trouvée.</td>
    </tr>
    </tbody>
</table>

<div class="pagination" th:if="${depenses.totalPages > 0}">
    <a class="btn btn-secondary" th:if="${depenses.hasPrevious()}"
       th:href="@{/depenses(page=${depenses.number - 1}, size=${depenses.size}, id=${filter.id}, categorieDepenseId=${filter.categorieDepenseId}, dateDebut=${filter.dateDebut}, dateFin=${filter.dateFin}, montantMin=${filter.montantMin}, montantMax=${filter.montantMax}, modePaiement=${filter.modePaiement})}">&laquo; Précédent</a>
    <span th:unless="${depenses.hasPrevious()}" style="color:#999;">&laquo; Précédent</span>

    <span th:text="'Page ' + ${depenses.number + 1} + ' sur ' + ${depenses.totalPages} + ' — ' + ${depenses.totalElements} + ' dépense(s)'"></span>

    <a th:if="${depenses.hasNext()}"
       th:href="@{/depenses(page=${depenses.number + 1}, size=${depenses.size}, id=${filter.id}, categorieDepenseId=${filter.categorieDepenseId}, dateDebut=${filter.dateDebut}, dateFin=${filter.dateFin}, montantMin=${filter.montantMin}, montantMax=${filter.montantMax}, modePaiement=${filter.modePaiement})}">Suivant &raquo;</a>
    <span th:unless="${depenses.hasNext()}" style="color:#999;">Suivant &raquo;</span>
</div>
</main>
</body>
</html>
