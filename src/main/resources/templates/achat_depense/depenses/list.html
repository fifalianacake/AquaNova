<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Dépenses diverses</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 24px; }
        table { border-collapse: collapse; width: 100%; margin-top: 16px; }
        th, td { border: 1px solid #ddd; padding: 8px; }
        th { background: #f5f5f5; }
        .toolbar, .filters, .pagination { display: flex; gap: 10px; align-items: center; flex-wrap: wrap; margin: 12px 0; }
        .error { color: #b00020; }
        .success { color: #006b1b; }
        .summary { margin: 12px 0; font-weight: bold; }
    </style>
</head>
<body>
<h1>Dépenses diverses</h1>

<div class="success" th:if="${success}" th:text="${success}"></div>
<div class="error" th:if="${error}" th:text="${error}"></div>

<div class="toolbar">
    <a th:href="@{/depenses/new}">Nouvelle dépense</a>
    <a th:href="@{/depenses/export-pdf(id=${filter.id}, categorieDepenseId=${filter.categorieDepenseId}, dateDebut=${filter.dateDebut}, dateFin=${filter.dateFin}, montantMin=${filter.montantMin}, montantMax=${filter.montantMax}, modePaiement=${filter.modePaiement})}">Exporter PDF</a>
</div>

<form method="get" th:action="@{/depenses}" class="filters">
    <input type="hidden" name="page" value="0" />

    <label>ID
        <input type="number" name="id" th:value="${filter.id}" />
    </label>

    <label>Catégorie
        <select name="categorieDepenseId">
            <option value="">Toutes</option>
            <option th:each="c : ${categoriesDepense}"
                    th:value="${c.id}"
                    th:text="${c.code + ' - ' + c.libelle}"
                    th:selected="${filter.categorieDepenseId == c.id}"></option>
        </select>
    </label>

    <label>Date début
        <input type="date" name="dateDebut" th:value="${filter.dateDebut}" />
    </label>

    <label>Date fin
        <input type="date" name="dateFin" th:value="${filter.dateFin}" />
    </label>

    <label>Montant min
        <input type="number" step="0.01" min="0" name="montantMin" th:value="${filter.montantMin}" />
    </label>

    <label>Montant max
        <input type="number" step="0.01" min="0" name="montantMax" th:value="${filter.montantMax}" />
    </label>

    <label>Mode paiement
        <input type="text" name="modePaiement" th:value="${filter.modePaiement}" />
    </label>

    <label>Lignes/page
        <select name="size" onchange="this.form.submit()">
            <option th:each="s : ${pageSizes}"
                    th:value="${s}"
                    th:text="${s}"
                    th:selected="${depenses.size == s}"></option>
        </select>
    </label>

    <button type="submit">Filtrer</button>
    <a th:href="@{/depenses}">Réinitialiser</a>
</form>

<div class="summary" th:text="'Total filtré : ' + ${totalFiltre}">Total filtré : 0</div>

<table>
    <thead>
    <tr>
        <th>ID</th>
        <th>Date</th>
        <th>Catégorie</th>
        <th>Libellé</th>
        <th>Montant</th>
        <th>Mode paiement</th>
        <th>Référence</th>
        <th>Actions</th>
    </tr>
    </thead>
    <tbody>
    <tr th:each="depense : ${depenses.content}">
        <td th:text="${depense.id}"></td>
        <td th:text="${depense.dateDepense}"></td>
        <td th:text="${depense.categorieDepense != null ? depense.categorieDepense.code + ' - ' + depense.categorieDepense.libelle : '-'}"></td>
        <td th:text="${depense.libelle}"></td>
        <td th:text="${depense.montant}"></td>
        <td th:text="${depense.modePaiement ?: '-'}"></td>
        <td th:text="${depense.reference ?: '-'}"></td>
        <td>
            <a th:href="@{/depenses/{id}(id=${depense.id})}">Fiche</a>
            <a th:href="@{/depenses/{id}/edit(id=${depense.id})}">Modifier</a>
        </td>
    </tr>
    <tr th:if="${depenses.empty}">
        <td colspan="8">Aucune dépense trouvée.</td>
    </tr>
    </tbody>
</table>

<div class="pagination" th:if="${depenses.totalPages > 0}">
    <a th:if="${depenses.hasPrevious()}"
       th:href="@{/depenses(page=${depenses.number - 1}, size=${depenses.size}, id=${filter.id}, categorieDepenseId=${filter.categorieDepenseId}, dateDebut=${filter.dateDebut}, dateFin=${filter.dateFin}, montantMin=${filter.montantMin}, montantMax=${filter.montantMax}, modePaiement=${filter.modePaiement})}">&laquo; Précédent</a>
    <span th:unless="${depenses.hasPrevious()}" style="color:#999;">&laquo; Précédent</span>

    <span th:text="'Page ' + ${depenses.number + 1} + ' sur ' + ${depenses.totalPages} + ' — ' + ${depenses.totalElements} + ' dépense(s)'"></span>

    <a th:if="${depenses.hasNext()}"
       th:href="@{/depenses(page=${depenses.number + 1}, size=${depenses.size}, id=${filter.id}, categorieDepenseId=${filter.categorieDepenseId}, dateDebut=${filter.dateDebut}, dateFin=${filter.dateFin}, montantMin=${filter.montantMin}, montantMax=${filter.montantMax}, modePaiement=${filter.modePaiement})}">Suivant &raquo;</a>
    <span th:unless="${depenses.hasNext()}" style="color:#999;">Suivant &raquo;</span>
</div>

</body>
</html>
