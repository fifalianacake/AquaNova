<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" th:replace="~{fragments/layout :: layout(~{::title}, ~{::main})}">
<head>
    <title>AquaNova - Dépenses diverses</title>
</head>
<body>
<main>

<div class="success" th:if="${success}" th:text="${success}"></div>
<div class="error" th:if="${error}" th:text="${error}"></div>

<div class="toolbar">
    <a class="btn btn-primary" th:href="@{/depenses/new}"><i class="bi bi-plus-lg"></i> Nouvelle dépense</a>
    <a class="btn btn-outline-secondary" th:href="@{/depenses/export-pdf(id=${filter.id}, categorieDepenseId=${filter.categorieDepenseId}, dateDebut=${filter.dateDebut}, dateFin=${filter.dateFin}, montantMin=${filter.montantMin}, montantMax=${filter.montantMax}, modePaiement=${filter.modePaiement})}"><i class="bi bi-file-earmark-pdf"></i> Exporter en PDF</a>
    <a class="btn btn-outline-secondary" th:href="@{/depenses/export-excel(id=${filter.id}, categorieDepenseId=${filter.categorieDepenseId}, dateDebut=${filter.dateDebut}, dateFin=${filter.dateFin}, montantMin=${filter.montantMin}, montantMax=${filter.montantMax}, modePaiement=${filter.modePaiement})}"><i class="bi bi-file-earmark-spreadsheet"></i> Exporter en Excel</a>
</div>

<div class="panel">
    <div class="panel-header">
        <h5>Dépenses diverses</h5>
        <span class="result-count"
              th:text="${depenses.totalElements} + ' dépense' + (${depenses.totalElements} > 1 ? 's' : '') + ' trouvée' + (${depenses.totalElements} > 1 ? 's' : '')"></span>
        <span class="result-count" th:text="'Total filtré : ' + ${totalFiltre}"></span>
    </div>

    <form method="get" th:action="@{/depenses}" class="filters-bar">
        <input type="hidden" name="page" value="0" />
        <input class="form-control fc-sm" type="number" name="id" placeholder="ID" th:value="${filter.id}">
        <select class="form-select" name="categorieDepenseId">
            <option value="">Toutes les catégories</option>
            <option th:each="c : ${categoriesDepense}"
                    th:value="${c.id}"
                    th:text="${c.code + ' - ' + c.libelle}"
                    th:selected="${filter.categorieDepenseId == c.id}"></option>
        </select>
        <div class="input-group">
            <span class="input-group-text">Du</span>
            <input class="form-control" type="date" name="dateDebut" th:value="${filter.dateDebut}">
        </div>
        <div class="input-group">
            <span class="input-group-text">Au</span>
            <input class="form-control" type="date" name="dateFin" th:value="${filter.dateFin}">
        </div>
        <input class="form-control fc-sm" type="number" step="0.01" min="0" name="montantMin" placeholder="Mt. min" th:value="${filter.montantMin}">
        <input class="form-control fc-sm" type="number" step="0.01" min="0" name="montantMax" placeholder="Mt. max" th:value="${filter.montantMax}">
        <input class="form-control" type="text" name="modePaiement" placeholder="Mode de paiement" th:value="${filter.modePaiement}">
        <button class="btn btn-primary" type="submit"><i class="bi bi-search"></i> Filtrer</button>
        <a class="btn btn-outline-secondary" th:href="@{/depenses}"><i class="bi bi-x-circle"></i> Réinitialiser</a>
    </form>

    <div class="table-responsive">
        <table class="table table-hover align-middle">
            <thead>
            <tr>
                <th>ID</th>
                <th>Date</th>
                <th>Catégorie</th>
                <th>Libellé</th>
                <th class="text-end">Montant (Ar)</th>
                <th>Mode paiement</th>
                <th>Référence</th>
                <th class="text-end">Actions</th>
            </tr>
            </thead>
            <tbody>
            <tr th:each="depense : ${depenses.content}">
                <td th:text="${depense.id}"></td>
                <td th:text="${depense.dateDepense != null ? #temporals.format(depense.dateDepense, 'dd/MM/yyyy') : '—'}"></td>
                <td th:text="${depense.categorieDepense != null ? depense.categorieDepense.code + ' - ' + depense.categorieDepense.libelle : '—'}"></td>
                <td class="fw-semibold" th:text="${depense.libelle}"></td>
                <td class="text-end montant" th:text="${#numbers.formatDecimal(depense.montant, 1, 'WHITESPACE', 2, 'COMMA')}"></td>
                <td th:text="${depense.modePaiement ?: '—'}"></td>
                <td th:text="${depense.reference ?: '—'}"></td>
                <td class="text-end">
                    <a class="btn btn-sm btn-outline-primary" th:href="@{/depenses/{id}(id=${depense.id})}" title="Voir la fiche"><i class="bi bi-eye"></i></a>
                    <a class="btn btn-sm btn-outline-primary" th:href="@{/depenses/{id}/edit(id=${depense.id})}" title="Modifier"><i class="bi bi-pencil"></i></a>
                </td>
            </tr>
            <tr th:if="${depenses.empty}">
                <td colspan="8" class="text-center text-secondary py-4">Aucune dépense ne correspond à ces critères.</td>
            </tr>
            </tbody>
        </table>
    </div>

    <div th:replace="~{fragments/tableau :: tableFooter(${depenses})}"></div>
</div>
</main>
</body>
</html>
