<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" th:replace="~{fragments/layout :: layout(~{::title}, ~{::main})}">
<head>
    <title>AquaNova - Achats d'alevins</title>
</head>
<body>
<main>

<div class="toolbar">
    <a class="btn btn-primary" th:href="@{/achats/alevins/new}"><i class="bi bi-plus-lg"></i> Nouvel achat alevins</a>
    <a class="btn btn-outline-primary" th:href="@{/especes}">Catalogue espèces</a>
    <a class="btn btn-outline-primary" th:href="@{/achats/provende}">Achats de provende</a>
    <a class="btn btn-outline-secondary" th:href="@{/achats/export-excel}"><i class="bi bi-file-earmark-spreadsheet"></i> Exporter en Excel</a>
</div>

<div class="panel">
    <div class="panel-header">
        <h5>Historique des achats d'alevins</h5>
        <span class="result-count"
              th:text="${achats.totalElements} + ' achat' + (${achats.totalElements} > 1 ? 's' : '') + ' trouvé' + (${achats.totalElements} > 1 ? 's' : '')"></span>
    </div>

    <form method="get" th:action="@{/achats/alevins}" class="filters-bar">
        <input type="hidden" name="page" value="0" />
        <input class="form-control fc-sm" type="number" name="id" placeholder="ID" th:value="${filter.id}">
        <select class="form-select" name="fournisseurId">
            <option value="">Tous les fournisseurs</option>
            <option th:each="f : ${fournisseurs}"
                    th:value="${f.id}"
                    th:text="${f.nom}"
                    th:selected="${filter.fournisseurId == f.id}"></option>
        </select>
        <select class="form-select" name="categorieDepenseId">
            <option value="">Toutes les catégories</option>
            <option th:each="c : ${categoriesDepense}"
                    th:value="${c.id}"
                    th:text="${c.code + ' - ' + c.libelle}"
                    th:selected="${filter.categorieDepenseId == c.id}"></option>
        </select>
        <select class="form-select" name="especeId">
            <option value="">Toutes les espèces</option>
            <option th:each="e : ${especes}"
                    th:value="${e.id}"
                    th:text="${e.nom}"
                    th:selected="${filter.especeId == e.id}"></option>
        </select>
        <select class="form-select" name="statutAchat">
            <option value="">Tous les statuts</option>
            <option th:each="s : ${statutsAchat}"
                    th:value="${s}"
                    th:text="${s}"
                    th:selected="${filter.statutAchat == s}"></option>
        </select>
        <div class="input-group">
            <span class="input-group-text">Du</span>
            <input class="form-control" type="date" name="dateDebut" th:value="${filter.dateDebut}">
        </div>
        <div class="input-group">
            <span class="input-group-text">Au</span>
            <input class="form-control" type="date" name="dateFin" th:value="${filter.dateFin}">
        </div>
        <input class="form-control fc-sm" type="number" step="0.01" min="0" name="montantMin" placeholder="Mt. min" th:value="${filter.montantMin}">
        <input class="form-control fc-sm" type="number" step="0.01" min="0" name="montantMax" placeholder="Mt. max" th:value="${filter.montantMax}">
        <input class="form-control" type="text" name="referenceFacture" placeholder="Référence facture" th:value="${filter.referenceFacture}">
        <button class="btn btn-primary" type="submit"><i class="bi bi-search"></i> Filtrer</button>
        <a class="btn btn-outline-secondary" th:href="@{/achats/alevins}"><i class="bi bi-x-circle"></i> Réinitialiser</a>
    </form>

    <div class="table-responsive">
        <table class="table table-hover align-middle">
            <thead>
            <tr>
                <th th:replace="~{fragments/tableau :: sortableHeader(${achats}, 'id', 'ID', '')}"></th>
                <th th:replace="~{fragments/tableau :: sortableHeader(${achats}, 'dateAchat', 'Date', '')}"></th>
                <th th:replace="~{fragments/tableau :: sortableHeader(${achats}, 'fournisseur.nom', 'Fournisseur', '')}"></th>
                <th th:replace="~{fragments/tableau :: sortableHeader(${achats}, 'categorieDepense.code', 'Catégorie', '')}"></th>
                <th>Espèce</th>
                <th class="text-end">Quantité</th>
                <th th:replace="~{fragments/tableau :: sortableHeader(${achats}, 'montantTotal', 'Montant total (Ar)', 'text-end')}"></th>
                <th th:replace="~{fragments/tableau :: sortableHeader(${achats}, 'statutAchat', 'Statut', '')}"></th>
                <th class="text-end">Actions</th>
            </tr>
            </thead>
            <tbody>
            <tr th:each="achatAlevin : ${achats.content}">
                <td th:text="${achatAlevin.id}"></td>
                <td th:text="${achatAlevin.dateAchat != null ? #temporals.format(achatAlevin.dateAchat, 'dd/MM/yyyy') : '—'}"></td>
                <td class="fw-semibold" th:text="${achatAlevin.fournisseur != null ? achatAlevin.fournisseur.nom : '—'}"></td>
                <td th:text="${achatAlevin.categorieDepense != null ? achatAlevin.categorieDepense.code : '—'}"></td>
                <td th:text="${!#lists.isEmpty(achatAlevin.lignes) && achatAlevin.lignes[0].espece != null ? achatAlevin.lignes[0].espece.nom : '—'}"></td>
                <td class="text-end" th:text="${!#lists.isEmpty(achatAlevin.lignes) ? achatAlevin.lignes[0].quantite + ' ' + achatAlevin.lignes[0].unite : '—'}"></td>
                <td class="text-end montant" th:text="${#numbers.formatDecimal(achatAlevin.montantTotal, 1, 'WHITESPACE', 2, 'COMMA')}"></td>
                <td><span class="badge badge-info" th:text="${achatAlevin.statutAchat}"></span></td>
                <td class="text-end">
                    <a class="btn btn-sm btn-outline-primary" th:href="@{/achats/{id}(id=${achatAlevin.id})}" title="Voir la fiche"><i class="bi bi-eye"></i></a>
                </td>
            </tr>
            <tr th:if="${achats.empty}">
                <td colspan="9" class="text-center text-secondary py-4">Aucun achat d'alevins ne correspond à ces critères.</td>
            </tr>
            </tbody>
        </table>
    </div>

    <div th:replace="~{fragments/tableau :: tableFooter(${achats})}"></div>
</div>
</main>
</body>
</html>
