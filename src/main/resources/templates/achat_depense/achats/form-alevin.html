<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" th:replace="~{fragments/layout :: layout(~{::title}, ~{::main})}">
<head>
    <title>Achat d'Alevins</title>
</head>
<body>
<main>

<h1>Saisie achat d'alevins</h1>

<p class="hint">
    Remplissez les informations ci-dessous pour enregistrer le nouvel achat d'alevins.
</p>

<div class="error" th:if="${error}" th:text="${error}"></div>

<form method="post" th:action="@{/achats/alevins}" th:object="${achatAlevinForm}">
    
    <label class="form-label">Date d'achat *
        <input class="form-control" type="date" th:field="*{dateAchat}" required />
    </label>

    <label class="form-label">Fournisseur *
        <select class="form-select" th:field="*{fournisseurId}" required>
            <option value="">-- Choisir --</option>
            <option th:each="f : ${fournisseurs}" th:value="${f.id}" th:text="${f.nom}"></option>
        </select>
    </label>

    <!-- SECTION MODIFIÉE : Catégorie fixée en lecture seule -->
    <label class="form-label">Catégorie de dépense *
        <!-- Champ caché pour renvoyer la valeur au serveur -->
        <input type="hidden" th:field="*{categorieDepenseId}" />
        
        <!-- Select visible mais bloqué (sans th:field pour ne pas écraser le hidden, on utilise th:value ou la boucle standard) -->
        <select class="readonly-field" disabled>
            <option th:each="c : ${categoriesDepense}"
                    th:value="${c.id}"
                    th:text="${c.code + ' - ' + c.libelle}"
                    th:selected="${achatAlevinForm.categorieDepenseId == c.id}"></option>
        </select>
    </label>

    <label class="form-label">Espèce d'alevin *
        <select class="form-select" th:field="*{especeId}" required>
            <option value="">-- Choisir --</option>
            <option th:each="e : ${especes}" th:value="${e.id}" th:text="${e.nom}"></option>
        </select>
    </label>

    <label class="form-label">Effectif (Nombre d'alevins) *
        <input class="form-control" type="number" step="1" min="1" th:field="*{effectif}" id="effectif" required />
    </label>

    <label class="form-label">Poids moyen (g) *
        <input class="form-control" type="number" step="0.01" min="0.01" th:field="*{poidsMoyen}" required />
    </label>

    <label class="form-label">Prix unitaire *
        <input class="form-control" type="number" step="0.01" min="0" th:field="*{prixUnitaire}" id="prixUnitaire" required />
    </label>

    <label class="form-label">Montant total
        <input type="number" step="0.01" min="0" th:field="*{montantTotal}" id="montantTotal" class="readonly-field" readonly />
    </label>

    <label class="form-label">Référence facture
        <input class="form-control" type="text" th:field="*{referenceFacture}" />
    </label>

    <button class="btn btn-primary" type="submit">Enregistrer</button>
    <a class="btn btn-secondary" th:href="@{/achats}">Annuler</a>
</form>

<script>
    const effectifInput = document.getElementById('effectif');
    const prixUnitaireInput = document.getElementById('prixUnitaire');
    const montantTotalInput = document.getElementById('montantTotal');

    function calculerMontantTotal() {
        const effectif = parseFloat(effectifInput.value) || 0;
        const prixUnitaire = parseFloat(prixUnitaireInput.value) || 0;
        const total = effectif * prixUnitaire;
        montantTotalInput.value = total.toFixed(2);
    }

    effectifInput.addEventListener('input', calculerMontantTotal);
    prixUnitaireInput.addEventListener('input', calculerMontantTotal);
</script>
</main>
</body>
</html>
