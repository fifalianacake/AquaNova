<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" th:replace="~{fragments/layout :: layout(~{::title}, ~{::main})}">
<head>
    <title>Achat d'Alevins</title>
</head>
<body>
<main>

<h2>Saisie achat d'alevins</h2>

<p class="hint">
    L'achat est enregistré en brouillon par défaut. Le lot n'est créé et le bassin occupé qu'à la validation de l'achat.
</p>

<div class="error" th:if="${error}" th:text="${error}"></div>

<form class="form-panel" method="post" th:action="@{/achats/alevins}" th:object="${achatAlevinForm}">

    <div class="mb-3">
        <label class="form-label" for="dateAchat">Date d'achat *</label>
        <input class="form-control" type="date" id="dateAchat" th:field="*{dateAchat}" required />
    </div>

    <div class="mb-3">
        <label class="form-label" for="fournisseurId">Fournisseur *</label>
        <select class="form-select" id="fournisseurId" th:field="*{fournisseurId}" required>
            <option value="">-- Choisir --</option>
            <option th:each="f : ${fournisseurs}" th:value="${f.id}" th:text="${f.nom}"></option>
        </select>
    </div>

    <div class="mb-3">
        <label class="form-label">Catégorie</label>
        <div class="readonly-value" th:text="${categoriesDepense.code + ' - ' + categoriesDepense.libelle}"></div>
        <input type="hidden" th:field="*{categorieDepenseId}" />
    </div>

    <div class="mb-3">
        <label class="form-label" for="especeId">Espèce d'alevin *</label>
        <select class="form-select" id="especeId" th:field="*{especeId}" required>
            <option value="">-- Choisir --</option>
            <option th:each="e : ${especes}" th:value="${e.id}" th:text="${e.nom}"></option>
        </select>
    </div>

    <div class="mb-3">
        <label class="form-label" for="bassinId">Bassin *</label>
        <select class="form-select" id="bassinId" th:field="*{bassinId}" required>
            <option value="">-- Choisir --</option>
            <option th:each="b : ${bassins}" th:value="${b.id}" th:text="${b.reference + ' (' + b.capaciteM3 + ' m³)'}"></option>
        </select>
        <p class="hint" th:if="${#lists.isEmpty(bassins)}">Aucun bassin libre disponible actuellement.</p>
    </div>

    <div class="mb-3">
        <label class="form-label" for="effectif">Effectif (Nombre d'alevins) *</label>
        <input class="form-control" type="number" step="1" min="1" th:field="*{effectif}" id="effectif" required />
    </div>

    <div class="mb-3">
        <label class="form-label" for="poidsMoyen">Poids moyen (g) *</label>
        <input class="form-control" type="number" step="0.01" min="0.01" id="poidsMoyen" th:field="*{poidsMoyen}" required />
    </div>

    <div class="mb-3">
        <label class="form-label" for="prixUnitaire">Prix unitaire *</label>
        <input class="form-control" type="number" step="0.01" min="0" th:field="*{prixUnitaire}" id="prixUnitaire" required />
    </div>

    <div class="mb-3">
        <label class="form-label" for="montantTotal">Montant total</label>
        <input type="number" step="0.01" min="0" th:field="*{montantTotal}" id="montantTotal" class="form-control readonly-field" readonly />
    </div>

    <div class="mb-3">
        <label class="form-label" for="referenceFacture">Référence facture</label>
        <input class="form-control" type="text" id="referenceFacture" th:field="*{referenceFacture}" />
    </div>

    <div class="form-check mb-3">
        <input class="form-check-input" type="checkbox" id="validerDirectement" th:field="*{validerDirectement}" />
        <label class="form-check-label" for="validerDirectement">
            Valider directement, créer le lot et occuper le bassin
        </label>
    </div>

    <div class="d-flex gap-2 mt-4">
        <button class="btn btn-primary" type="submit">Enregistrer</button>
        <a class="btn btn-secondary" th:href="@{/achats/alevins}">Retour à la liste</a>
    </div>
</form>

<script>
    const effectifInput = document.getElementById('effectif');
    const prixUnitaireInput = document.getElementById('prixUnitaire');
    const montantTotalInput = document.getElementById('montantTotal');

    function calculerMontantTotal() {
        const effectif = parseFloat(effectifInput.value) || 0;
        const prixUnitaire = parseFloat(prixUnitaireInput.value) || 0;
        const total = effectif * prixUnitaire;
        montantTotalInput.value = total.toFixed(2);
    }

    effectifInput.addEventListener('input', calculerMontantTotal);
    prixUnitaireInput.addEventListener('input', calculerMontantTotal);
</script>
</main>
</body>
</html>
