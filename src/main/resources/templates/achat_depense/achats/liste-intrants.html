<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" th:replace="~{fragments/layout :: layout(~{::title}, ~{::main})}">
<head>
    <title>Achats d'intrants</title>
</head>
<body>
<main>

<h1>Historique des achats d'intrants</h1>

<div class="toolbar">
    <a class="btn btn-primary" th:href="@{/achats/intrants/new}">Nouvel achat médicament / traitement</a>
    <a class="btn btn-sm btn-outline-secondary" th:href="@{/intrants}">Catalogue intrants</a>
    <a class="btn btn-sm btn-outline-secondary" th:href="@{/achats/alevins}">Achats d'alevins</a>
</div>

<form method="get" th:action="@{/achats/intrants}" class="filters">
    <input type="hidden" name="page" value="0" />

    <label class="form-label">ID
        <input class="form-control" type="number" name="id" th:value="${filter.id}" />
    </label>

    <label class="form-label">Fournisseur
        <select class="form-select" name="fournisseurId">
            <option value="">Tous</option>
            <option th:each="f : ${fournisseurs}"
                    th:value="${f.id}"
                    th:text="${f.nom}"
                    th:selected="${filter.fournisseurId == f.id}"></option>
        </select>
    </label>

    <label class="form-label">Catégorie
        <select class="form-select" name="categorieDepenseId">
            <option value="">Toutes</option>
            <option th:each="c : ${categoriesDepense}"
                    th:value="${c.id}"
                    th:text="${c.code + ' - ' + c.libelle}"
                    th:selected="${filter.categorieDepenseId == c.id}"></option>
        </select>
    </label>

    <label class="form-label">Intrant
        <select class="form-select" name="intrantId">
            <option value="">Tous</option>
            <option th:each="i : ${intrants}"
                    th:value="${i.id}"
                    th:text="${i.nom}"
                    th:selected="${filter.intrantId == i.id}"></option>
        </select>
    </label>

    <label class="form-label">Statut
        <select class="form-select" name="statutAchat">
            <option value="">Tous</option>
            <option th:each="s : ${statutsAchat}"
                    th:value="${s}"
                    th:text="${s}"
                    th:selected="${filter.statutAchat == s}"></option>
        </select>
    </label>

    <label class="form-label">Date début
        <input class="form-control" type="date" name="dateDebut" th:value="${filter.dateDebut}" />
    </label>

    <label class="form-label">Date fin
        <input class="form-control" type="date" name="dateFin" th:value="${filter.dateFin}" />
    </label>

    <label class="form-label">Montant min
        <input class="form-control" type="number" step="0.01" min="0" name="montantMin" th:value="${filter.montantMin}" />
    </label>

    <label class="form-label">Montant max
        <input class="form-control" type="number" step="0.01" min="0" name="montantMax" th:value="${filter.montantMax}" />
    </label>

    <label class="form-label">Référence facture
        <input class="form-control" type="text" name="referenceFacture" th:value="${filter.referenceFacture}" />
    </label>

    <label class="form-label">Lignes/page
        <select class="form-select" name="size" onchange="this.form.submit()">
            <option th:each="s : ${pageSizes}"
                    th:value="${s}"
                    th:text="${s}"
                    th:selected="${achats.size == s}"></option>
        </select>
    </label>

    <button class="btn btn-primary" type="submit">Filtrer</button>
    <a th:href="@{/achats/intrants}">Réinitialiser</a>
</form>

<table class="table table-hover align-middle">
    <thead>
    <tr>
        <th>ID</th>
        <th>Date</th>
        <th>Fournisseur</th>
        <th>Catégorie</th>
        <th>Intrant</th>
        <th>Quantité</th>
        <th>Montant total</th>
        <th>Statut</th>
        <th>Actions</th>
    </tr>
    </thead>
    <tbody>
    <tr th:each="achat : ${achats.content}">
        <td th:text="${achat.id}"></td>
        <td th:text="${achat.dateAchat}"></td>
        <td th:text="${achat.fournisseur != null ? achat.fournisseur.nom : '-'}"></td>
        <td th:text="${achat.categorieDepense != null ? achat.categorieDepense.code : '-'}"></td>
        <td th:text="${!#lists.isEmpty(achat.lignes) && achat.lignes[0].intrant != null ? achat.lignes[0].intrant.nom : '-'}"></td>
        <td th:text="${!#lists.isEmpty(achat.lignes) ? achat.lignes[0].quantite + ' ' + achat.lignes[0].unite : '-'}"></td>
        <td th:text="${achat.montantTotal}"></td>
        <td th:text="${achat.statutAchat}"></td>
        <td><a class="btn btn-sm btn-outline-primary" th:href="@{/achats/{id}(id=${achat.id})}">Fiche</a></td>
    </tr>
    <tr th:if="${achats.empty}">
        <td colspan="9">Aucun achat d'intrants trouvé.</td>
    </tr>
    </tbody>
</table>

<div class="pagination" th:if="${achats.totalPages > 0}">
    <a class="btn btn-secondary" th:if="${achats.hasPrevious()}"
       th:href="@{/achats/intrants(page=${achats.number - 1}, size=${achats.size}, id=${filter.id}, fournisseurId=${filter.fournisseurId}, categorieDepenseId=${filter.categorieDepenseId}, intrantId=${filter.intrantId}, statutAchat=${filter.statutAchat}, dateDebut=${filter.dateDebut}, dateFin=${filter.dateFin}, montantMin=${filter.montantMin}, montantMax=${filter.montantMax}, referenceFacture=${filter.referenceFacture})}">&laquo; Précédent</a>
    <span th:unless="${achats.hasPrevious()}" style="color:#999;">&laquo; Précédent</span>

    <span th:text="'Page ' + ${achats.number + 1} + ' sur ' + ${achats.totalPages} + ' — ' + ${achats.totalElements} + ' achat(s)'"></span>

    <a th:if="${achats.hasNext()}"
       th:href="@{/achats/intrants(page=${achats.number + 1}, size=${achats.size}, id=${filter.id}, fournisseurId=${filter.fournisseurId}, categorieDepenseId=${filter.categorieDepenseId}, intrantId=${filter.intrantId}, statutAchat=${filter.statutAchat}, dateDebut=${filter.dateDebut}, dateFin=${filter.dateFin}, montantMin=${filter.montantMin}, montantMax=${filter.montantMax}, referenceFacture=${filter.referenceFacture})}">Suivant &raquo;</a>
    <span th:unless="${achats.hasNext()}" style="color:#999;">Suivant &raquo;</span>
</div>
</main>
</body>
</html>
