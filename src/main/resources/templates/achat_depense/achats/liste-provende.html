<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" th:replace="~{fragments/layout :: layout(~{::title}, ~{::main})}">
<head>
    <title>AquaNova - Achats de provende</title>
</head>
<body>
<main>

<div class="toolbar">
    <a class="btn btn-primary" th:href="@{/achats/provende/new}"><i class="bi bi-plus-lg"></i> Nouvel achat de provende</a>
    <a class="btn btn-outline-primary" th:href="@{/aliments}">Catalogue aliments</a>
    <a class="btn btn-outline-primary" th:href="@{/achats/alevins}">Achats d'alevins</a>
    <a class="btn btn-outline-secondary" th:href="@{/achats/export-excel}"><i class="bi bi-file-earmark-spreadsheet"></i> Exporter en Excel</a>
</div>

<div class="panel">
    <div class="panel-header">
        <h5>Historique des achats de provende</h5>
        <span class="result-count"
              th:text="${achats.totalElements} + ' achat' + (${achats.totalElements} > 1 ? 's' : '') + ' trouvé' + (${achats.totalElements} > 1 ? 's' : '')"></span>
    </div>

    <form method="get" th:action="@{/achats/provende}" class="filters-bar">
        <input type="hidden" name="page" value="0" />
        <input class="form-control fc-sm" type="number" name="id" placeholder="ID" th:value="${filter.id}">
        <select class="form-select" name="fournisseurId">
            <option value="">Tous les fournisseurs</option>
            <option th:each="f : ${fournisseurs}"
                    th:value="${f.id}"
                    th:text="${f.nom}"
                    th:selected="${filter.fournisseurId == f.id}"></option>
        </select>
        <select class="form-select" name="alimentId">
            <option value="">Tous les aliments</option>
            <option th:each="a : ${aliments}"
                    th:value="${a.id}"
                    th:text="${a.nom}"
                    th:selected="${filter.alimentId == a.id}"></option>
        </select>
        <select class="form-select" name="statutAchat">
            <option value="">Tous les statuts</option>
            <option th:each="s : ${statutsAchat}"
                    th:value="${s}"
                    th:text="${s}"
                    th:selected="${filter.statutAchat == s}"></option>
        </select>
        <div class="input-group">
            <span class="input-group-text">Du</span>
            <input class="form-control" type="date" name="dateDebut" th:value="${filter.dateDebut}">
        </div>
        <div class="input-group">
            <span class="input-group-text">Au</span>
            <input class="form-control" type="date" name="dateFin" th:value="${filter.dateFin}">
        </div>
        <input class="form-control fc-sm" type="number" step="0.01" min="0" name="montantMin" placeholder="Mt. min" th:value="${filter.montantMin}">
        <input class="form-control fc-sm" type="number" step="0.01" min="0" name="montantMax" placeholder="Mt. max" th:value="${filter.montantMax}">
        <input class="form-control" type="text" name="referenceFacture" placeholder="Référence facture" th:value="${filter.referenceFacture}">
        <button class="btn btn-primary" type="submit"><i class="bi bi-search"></i> Filtrer</button>
        <a class="btn btn-outline-secondary" th:href="@{/achats/provende}"><i class="bi bi-x-circle"></i> Réinitialiser</a>
    </form>

    <div class="table-responsive">
        <table class="table table-hover align-middle">
            <thead>
            <tr>
                <th>ID</th>
                <th>Date</th>
                <th>Fournisseur</th>
                <th>Aliment</th>
                <th class="text-end">Quantité</th>
                <th class="text-end">Montant total</th>
                <th>Statut</th>
                <th class="text-end">Actions</th>
            </tr>
            </thead>
            <tbody>
            <tr th:each="achat : ${achats.content}">
                <td th:text="${achat.id}"></td>
                <td th:text="${achat.dateAchat}"></td>
                <td class="fw-semibold" th:text="${achat.fournisseur != null ? achat.fournisseur.nom : '—'}"></td>
                <td th:text="${!#lists.isEmpty(achat.lignes) && achat.lignes[0].aliment != null ? achat.lignes[0].aliment.nom : '—'}"></td>
                <td class="text-end" th:text="${!#lists.isEmpty(achat.lignes) ? achat.lignes[0].quantite + ' ' + achat.lignes[0].unite : '—'}"></td>
                <td class="text-end montant" th:text="${achat.montantTotal}"></td>
                <td><span class="badge badge-info" th:text="${achat.statutAchat}"></span></td>
                <td class="text-end">
                    <a class="btn btn-sm btn-outline-primary" th:href="@{/achats/{id}(id=${achat.id})}" title="Voir la fiche"><i class="bi bi-eye"></i></a>
                </td>
            </tr>
            <tr th:if="${achats.empty}">
                <td colspan="8" class="text-center text-secondary py-4">Aucun achat de provende ne correspond à ces critères.</td>
            </tr>
            </tbody>
        </table>
    </div>

    <div th:replace="~{fragments/tableau :: tableFooter(${achats})}"></div>
</div>
</main>
</body>
</html>
