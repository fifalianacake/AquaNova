<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Achats d'intrants</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 24px; }
        table { border-collapse: collapse; width: 100%; margin-top: 16px; }
        th, td { border: 1px solid #ddd; padding: 8px; }
        th { background: #f5f5f5; }
        .toolbar, .filters, .pagination { display: flex; gap: 10px; align-items: center; flex-wrap: wrap; margin: 12px 0; }
    </style>
</head>
<body>
<h1>Historique des achats d'intrants</h1>

<div class="toolbar">
    <a th:href="@{/achats/intrants/new}">Nouvel achat médicament / traitement</a>
    <a th:href="@{/intrants}">Catalogue intrants</a>
</div>

<form method="get" th:action="@{/achats}" class="filters">
    <input type="hidden" name="page" value="0" />

    <label>ID
        <input type="number" name="id" th:value="${filter.id}" />
    </label>

    <label>Fournisseur
        <select name="fournisseurId">
            <option value="">Tous</option>
            <option th:each="f : ${fournisseurs}"
                    th:value="${f.id}"
                    th:text="${f.nom}"
                    th:selected="${filter.fournisseurId == f.id}"></option>
        </select>
    </label>

    <label>Catégorie
        <select name="categorieDepenseId">
            <option value="">Toutes</option>
            <option th:each="c : ${categoriesDepense}"
                    th:value="${c.id}"
                    th:text="${c.code + ' - ' + c.libelle}"
                    th:selected="${filter.categorieDepenseId == c.id}"></option>
        </select>
    </label>

    <label>Intrant
        <select name="intrantId">
            <option value="">Tous</option>
            <option th:each="i : ${intrants}"
                    th:value="${i.id}"
                    th:text="${i.nom}"
                    th:selected="${filter.intrantId == i.id}"></option>
        </select>
    </label>

    <label>Statut
        <select name="statutAchat">
            <option value="">Tous</option>
            <option th:each="s : ${statutsAchat}"
                    th:value="${s}"
                    th:text="${s}"
                    th:selected="${filter.statutAchat == s}"></option>
        </select>
    </label>

    <label>Date début
        <input type="date" name="dateDebut" th:value="${filter.dateDebut}" />
    </label>

    <label>Date fin
        <input type="date" name="dateFin" th:value="${filter.dateFin}" />
    </label>

    <label>Montant min
        <input type="number" step="0.01" min="0" name="montantMin" th:value="${filter.montantMin}" />
    </label>

    <label>Montant max
        <input type="number" step="0.01" min="0" name="montantMax" th:value="${filter.montantMax}" />
    </label>

    <label>Référence facture
        <input type="text" name="referenceFacture" th:value="${filter.referenceFacture}" />
    </label>

    <label>Lignes/page
        <select name="size" onchange="this.form.submit()">
            <option th:each="s : ${pageSizes}"
                    th:value="${s}"
                    th:text="${s}"
                    th:selected="${achats.size == s}"></option>
        </select>
    </label>

    <button type="submit">Filtrer</button>
    <a th:href="@{/achats}">Réinitialiser</a>
</form>

<table>
    <thead>
    <tr>
        <th>ID</th>
        <th>Date</th>
        <th>Fournisseur</th>
        <th>Catégorie</th>
        <th>Intrant</th>
        <th>Quantité</th>
        <th>Montant total</th>
        <th>Statut</th>
        <th>Actions</th>
    </tr>
    </thead>
    <tbody>
    <tr th:each="achat : ${achats.content}">
        <td th:text="${achat.id}"></td>
        <td th:text="${achat.dateAchat}"></td>
        <td th:text="${achat.fournisseur != null ? achat.fournisseur.nom : '-'}"></td>
        <td th:text="${achat.categorieDepense != null ? achat.categorieDepense.code : '-'}"></td>
        <td th:text="${!#lists.isEmpty(achat.lignes) && achat.lignes[0].intrant != null ? achat.lignes[0].intrant.nom : '-'}"></td>
        <td th:text="${!#lists.isEmpty(achat.lignes) ? achat.lignes[0].quantite + ' ' + achat.lignes[0].unite : '-'}"></td>
        <td th:text="${achat.montantTotal}"></td>
        <td th:text="${achat.statutAchat}"></td>
        <td><a th:href="@{/achats/{id}(id=${achat.id})}">Fiche</a></td>
    </tr>
    <tr th:if="${achats.empty}">
        <td colspan="9">Aucun achat d'intrants trouvé.</td>
    </tr>
    </tbody>
</table>

<div class="pagination" th:if="${achats.totalPages > 0}">
    <a th:if="${achats.hasPrevious()}"
       th:href="@{/achats(page=${achats.number - 1}, size=${achats.size}, id=${filter.id}, fournisseurId=${filter.fournisseurId}, categorieDepenseId=${filter.categorieDepenseId}, intrantId=${filter.intrantId}, statutAchat=${filter.statutAchat}, dateDebut=${filter.dateDebut}, dateFin=${filter.dateFin}, montantMin=${filter.montantMin}, montantMax=${filter.montantMax}, referenceFacture=${filter.referenceFacture})}">&laquo; Précédent</a>
    <span th:unless="${achats.hasPrevious()}" style="color:#999;">&laquo; Précédent</span>

    <span th:text="'Page ' + ${achats.number + 1} + ' sur ' + ${achats.totalPages} + ' — ' + ${achats.totalElements} + ' achat(s)'"></span>

    <a th:if="${achats.hasNext()}"
       th:href="@{/achats(page=${achats.number + 1}, size=${achats.size}, id=${filter.id}, fournisseurId=${filter.fournisseurId}, categorieDepenseId=${filter.categorieDepenseId}, intrantId=${filter.intrantId}, statutAchat=${filter.statutAchat}, dateDebut=${filter.dateDebut}, dateFin=${filter.dateFin}, montantMin=${filter.montantMin}, montantMax=${filter.montantMax}, referenceFacture=${filter.referenceFacture})}">Suivant &raquo;</a>
    <span th:unless="${achats.hasNext()}" style="color:#999;">Suivant &raquo;</span>
</div>

</body>
</html>
