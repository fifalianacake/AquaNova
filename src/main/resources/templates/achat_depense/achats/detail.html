<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" th:replace="~{fragments/layout :: layout(~{::title}, ~{::main})}">
<head>
    <title>AquaNova - Détail de l'achat</title>
</head>
<body>
<main>

<div class="success" th:if="${success}" th:text="${success}"></div>
<div class="error" th:if="${error}" th:text="${error}"></div>

<div class="d-flex justify-content-between align-items-start flex-wrap gap-2 mb-3">
    <div>
        <h2 class="mb-1"
            th:text="${achat.categorieDepense != null ? achat.categorieDepense.libelle : 'Achat'}">Achat</h2>
        <div class="d-flex gap-2 align-items-center flex-wrap">
            <span class="badge"
                  th:classappend="${achat.statutAchat.name() == 'VALIDE'} ? 'badge-success'
                                : (${achat.statutAchat.name() == 'ANNULE'} ? 'badge-danger' : 'badge-warning')"
                  th:text="${achat.statutAchat}"></span>
            <span class="text-secondary small"
                  th:text="'Achat #' + ${achat.id} + ' · '
                           + ${achat.dateAchat != null ? #temporals.format(achat.dateAchat, 'dd/MM/yyyy') : '—'}"></span>
        </div>
    </div>
    <div class="d-flex gap-2 flex-wrap">
        <a class="btn btn-outline-secondary" th:href="@{/achats}"><i class="bi bi-arrow-left"></i> Retour</a>

        <form class="inline-form" th:if="${achat.statutAchat.name() == 'BROUILLON'}"
              method="post" th:action="@{/achats/{id}/valider(id=${achat.id})}">
            <button class="btn btn-primary" type="submit"><i class="bi bi-check-circle"></i> Valider</button>
        </form>

        <form class="inline-form" th:if="${achat.statutAchat.name() == 'BROUILLON'}"
              method="post" th:action="@{/achats/{id}/annuler(id=${achat.id})}"
              onsubmit="return confirm('Annuler cet achat ?')">
            <button class="btn btn-outline-danger" type="submit"><i class="bi bi-x-circle"></i> Annuler</button>
        </form>
    </div>
</div>

<div class="row g-3 mb-4">
    <div class="col-sm-6 col-xl-4">
        <div class="kpi-card">
            <div class="d-flex justify-content-between align-items-start">
                <div>
                    <div class="text-secondary small">Montant total</div>
                    <div class="kpi-value"
                         th:text="${#numbers.formatDecimal(achat.montantTotal, 1, 'WHITESPACE', 2, 'COMMA')} + ' Ar'">0 Ar</div>
                    <span class="small text-secondary"
                          th:text="${#lists.size(achat.lignes)} + ' ligne' + (${#lists.size(achat.lignes)} > 1 ? 's' : '') + ' d''achat'"></span>
                </div>
                <div class="kpi-icon"><i class="bi bi-cart3"></i></div>
            </div>
        </div>
    </div>

    <div class="col-sm-6 col-xl-4">
        <div class="kpi-card">
            <div class="d-flex justify-content-between align-items-start">
                <div>
                    <div class="text-secondary small">Fournisseur</div>
                    <div class="kpi-value" th:text="${achat.fournisseur != null ? achat.fournisseur.nom : '—'}">—</div>
                    <span class="small text-secondary"
                          th:text="${achat.referenceFacture != null and !achat.referenceFacture.isBlank()
                                    ? 'facture ' + achat.referenceFacture : 'aucune référence de facture'}"></span>
                </div>
                <div class="kpi-icon"><i class="bi bi-truck"></i></div>
            </div>
        </div>
    </div>
</div>

<div class="panel mb-4">
    <div class="panel-header"><h5>Informations</h5></div>
    <div class="info-grid">
        <div class="info-row">
            <div class="info-label">Date d'achat</div>
            <div class="info-value"
                 th:text="${achat.dateAchat != null ? #temporals.format(achat.dateAchat, 'dd/MM/yyyy') : '—'}">—</div>
        </div>
        <div class="info-row">
            <div class="info-label">Fournisseur</div>
            <div class="info-value">
                <a th:if="${achat.fournisseur != null}" th:href="@{/fournisseurs/{id}(id=${achat.fournisseur.id})}"
                   th:text="${achat.fournisseur.nom}">—</a>
                <span th:unless="${achat.fournisseur != null}">—</span>
            </div>
        </div>
        <div class="info-row">
            <div class="info-label">Catégorie</div>
            <div class="info-value"
                 th:text="${achat.categorieDepense != null ? achat.categorieDepense.code + ' — ' + achat.categorieDepense.libelle : '—'}">—</div>
        </div>
        <div class="info-row">
            <div class="info-label">Référence facture</div>
            <div class="info-value"
                 th:text="${achat.referenceFacture != null and !achat.referenceFacture.isBlank() ? achat.referenceFacture : '—'}">—</div>
        </div>
        <div class="info-row">
            <div class="info-label">Montant total</div>
            <div class="info-value montant"
                 th:text="${#numbers.formatDecimal(achat.montantTotal, 1, 'WHITESPACE', 2, 'COMMA')} + ' Ar'">—</div>
        </div>
        <div class="info-row">
            <div class="info-label">Statut</div>
            <div class="info-value" th:text="${achat.statutAchat}">—</div>
        </div>
        <div class="info-row info-row-full">
            <div class="info-label">Observation</div>
            <div class="info-value"
                 th:text="${achat.observation != null and !achat.observation.isBlank() ? achat.observation : 'Aucune observation.'}">—</div>
        </div>
    </div>
</div>

<div class="panel">
    <div class="panel-header">
        <h5>Lignes d'achat</h5>
        <span class="result-count"
              th:text="${#lists.size(achat.lignes)} + ' ligne' + (${#lists.size(achat.lignes)} > 1 ? 's' : '')"></span>
    </div>
    <div class="table-responsive">
        <table class="table table-hover align-middle mb-0">
            <thead>
            <tr>
                <th>Désignation</th>
                <th>Article</th>
                <th class="text-end">Quantité</th>
                <th class="text-end">Prix unitaire (Ar)</th>
                <th class="text-end">Montant (Ar)</th>
                <th>Lot créé</th>
            </tr>
            </thead>
            <tbody>
            <tr th:each="ligne : ${achat.lignes}">
                <td class="fw-semibold" th:text="${ligne.designation}"></td>
                <td th:text="${ligne.aliment != null ? ligne.aliment.nom : (ligne.espece != null ? ligne.espece.nom : '—')}"></td>
                <td class="text-end" th:text="${ligne.quantite} + ' ' + ${ligne.unite}"></td>
                <td class="text-end montant"
                    th:text="${#numbers.formatDecimal(ligne.prixUnitaire, 1, 'WHITESPACE', 2, 'COMMA')}"></td>
                <td class="text-end montant"
                    th:text="${#numbers.formatDecimal(ligne.montantLigne, 1, 'WHITESPACE', 2, 'COMMA')}"></td>
                <td>
                    <a class="btn btn-sm btn-outline-primary" th:if="${ligne.lot != null}"
                       th:href="@{/lots/{id}(id=${ligne.lot.id})}" th:text="${ligne.lot.code}"></a>
                    <span class="text-secondary" th:unless="${ligne.lot != null}">—</span>
                </td>
            </tr>
            <tr th:if="${#lists.isEmpty(achat.lignes)}">
                <td colspan="6" class="text-center text-secondary py-4">Aucune ligne d'achat.</td>
            </tr>
            </tbody>
        </table>
    </div>
</div>

</main>
</body>
</html>
