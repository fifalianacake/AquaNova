<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Achat de provende</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 24px; }
        form { max-width: 760px; }
        label { display: block; margin: 12px 0; }
        input, select, textarea { width: 100%; padding: 8px; box-sizing: border-box; }
        .error { color: #b00020; margin: 12px 0; }
        .hint { color: #666; font-size: 0.9em; }
    </style>
</head>
<body>
<h1>Saisie achat de provende (Aliment)</h1>

<p class="hint">
    L'achat est enregistré en brouillon par défaut. Le stock d'aliments est alimenté automatiquement lors de la validation de l'achat.
</p>

<div class="error" th:if="${error}" th:text="${error}"></div>

<form method="post" th:action="@{/achats/provende}" th:object="${achatProvendeForm}">
    <label>Date d'achat *
        <input type="date" th:field="*{dateAchat}" required />
    </label>

    <label>Fournisseur *
        <select th:field="*{fournisseurId}" required>
            <option value="">-- Choisir --</option>
            <option th:each="f : ${fournisseurs}" th:value="${f.id}" th:text="${f.nom}"></option>
        </select>
    </label>

    <label>Catégorie *
        <select th:field="*{categorieDepenseId}" required>
            <option value="">-- Choisir --</option>
            <option th:each="c : ${categoriesDepense}"
                    th:value="${c.id}"
                    th:text="${c.code + ' - ' + c.libelle}"></option>
        </select>
    </label>

    <label>Aliment *
        <select th:field="*{alimentId}" required>
            <option value="">-- Choisir --</option>
            <option th:each="a : ${aliments}"
                    th:value="${a.id}"
                    th:text="${a.nom}"></option>
        </select>
    </label>

    <label>Quantité *
        <input type="number" step="0.001" min="0.001" th:field="*{quantite}" required />
    </label>

    <label>Prix unitaire *
        <input type="number" step="0.01" min="0" th:field="*{prixUnitaire}" required />
    </label>

    <label>Référence facture
        <input type="text" th:field="*{referenceFacture}" />
    </label>

    <label>Observation
        <textarea rows="4" th:field="*{observation}"></textarea>
    </label>

    <label style="display:flex; align-items:center; gap:8px;">
        <input type="checkbox" th:field="*{validerDirectement}" style="width:auto;" />
        Valider directement et créer le mouvement de stock ENTREE
    </label>

    <button type="submit">Enregistrer l'achat de provende</button>
    <a th:href="@{/achats}">Annuler</a>
</form>

</body>
</html>
