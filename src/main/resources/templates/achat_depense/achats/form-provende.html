<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" th:replace="~{fragments/layout :: layout(~{::title}, ~{::main})}">
<head>
    <title>Achat de provende</title>
</head>
<body>
<main>

<h1>Saisie achat de provende (Aliment)</h1>

<p class="hint">
    L'achat est enregistré en brouillon par défaut. Le stock d'aliments est alimenté automatiquement lors de la validation de l'achat.
</p>

<div class="error" th:if="${error}" th:text="${error}"></div>

<form method="post" th:action="@{/achats/provende}" th:object="${achatProvendeForm}">
    <label class="form-label">Date d'achat *
        <input class="form-control" type="date" th:field="*{dateAchat}" required />
    </label>

    <label class="form-label">Fournisseur *
        <select class="form-select" th:field="*{fournisseurId}" required>
            <option value="">-- Choisir --</option>
            <option th:each="f : ${fournisseurs}" th:value="${f.id}" th:text="${f.nom}"></option>
        </select>
    </label>

    <label class="form-label">Catégorie *
        <select class="form-select" th:field="*{categorieDepenseId}" required>
            <option value="">-- Choisir --</option>
            <option th:each="c : ${categoriesDepense}"
                    th:value="${c.id}"
                    th:text="${c.code + ' - ' + c.libelle}"></option>
        </select>
    </label>

    <label class="form-label">Aliment *
        <select class="form-select" th:field="*{alimentId}" required>
            <option value="">-- Choisir --</option>
            <option th:each="a : ${aliments}"
                    th:value="${a.id}"
                    th:text="${a.nom}"></option>
        </select>
    </label>

    <label class="form-label">Quantité *
        <input class="form-control" type="number" step="0.001" min="0.001" th:field="*{quantite}" required />
    </label>

    <label class="form-label">Prix unitaire *
        <input class="form-control" type="number" step="0.01" min="0" th:field="*{prixUnitaire}" required />
    </label>

    <label class="form-label">Référence facture
        <input class="form-control" type="text" th:field="*{referenceFacture}" />
    </label>

    <label class="form-label">Observation
        <textarea class="form-control" rows="4" th:field="*{observation}"></textarea>
    </label>

    <label class="form-label" style="display:flex; align-items:center; gap:8px;">
        <input class="form-check-input" type="checkbox" th:field="*{validerDirectement}" style="width:auto;" />
        Valider directement et créer le mouvement de stock ENTREE
    </label>

    <button class="btn btn-primary" type="submit">Enregistrer l'achat de provende</button>
    <a class="btn btn-secondary" th:href="@{/achats}">Annuler</a>
</form>
</main>
</body>
</html>
