<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" th:replace="~{fragments/layout :: layout(~{::title}, ~{::main})}">
<head>
    <title>AquaNova - Historique Commercial</title>
</head>
<body>
<main>
    <h2>Historique Global des Transactions Commerciales</h2>

    <form th:action="@{/ventes/historique}" th:object="${filters}" method="get">
        <div>
            <label class="form-label">Client</label>
            <input class="form-control" type="text" th:field="*{client}"/>
        </div>
        <div>
            <label class="form-label">Bassin / Lot</label>
            <select class="form-select" th:field="*{idLot}">
                <option value="">-- Tous les lots --</option>
                <option th:each="l : ${lots}" th:value="${l.id}" th:text="'Lot #' + ${l.id}"></option>
            </select>
        </div>
        <div>
            <label class="form-label">Récolte d'origine</label>
            <select class="form-select" th:field="*{idRecolte}">
                <option value="">-- Toutes les récoltes --</option>
                <option th:each="r : ${recoltes}" th:value="${r.id}" th:text="'Récolte #' + ${r.id}"></option>
            </select>
        </div>
        <div>
            <label class="form-label">Statut de la Vente</label>
            <select class="form-select" th:field="*{statutId}">
                <option value="">-- Tous les statuts --</option>
                <option th:each="s : ${statuts}" th:value="${s.id}" th:text="${s.libelle}"></option>
            </select>
        </div>
        <div>
            <label class="form-label">Date Début</label>
            <input class="form-control" type="date" th:field="*{dateDebut}"/>
        </div>
        <div>
            <label class="form-label">Date Fin</label>
            <input class="form-control" type="date" th:field="*{dateFin}"/>
        </div>
        <div>
            <label class="form-label">Montant Min</label>
            <input class="form-control" type="number" step="0.01" th:field="*{montantMin}"/>
        </div>
        <div>
            <label class="form-label">Montant Max</label>
            <input class="form-control" type="number" step="0.01" th:field="*{montantMax}"/>
        </div>
        <div>
            <a th:href="@{/ventes/historique}">Réinitialiser</a>
            <button class="btn btn-primary" type="submit">Appliquer les filtres</button>
        </div>
    </form>

    <table class="table table-hover align-middle">
        <thead>
            <tr>
                <th>Date</th>
                <th>Client</th>
                <th>Récolte</th>
                <th>Lot d'origine</th>
                <th>Type Événement</th>
                <th>Poids (kg)</th>
                <th>Montant Total</th>
                <th>Statut</th>
                <th>Actions</th>
            </tr>
        </thead>
        <tbody>
            <tr th:if="${#lists.isEmpty(transactions)}">
                <td colspan="9">Aucune transaction commerciale enregistrée pour ces critères.</td>
            </tr>
            <tr th:each="v : ${transactions}">
                <td th:text="${#temporals.format(v.dateVente, 'dd/MM/yyyy')}"></td>
                <td th:text="${v.client != null ? v.client.nom : '-'}"></td>
                <td th:text="'# ' + ${v.recolte.id}"></td>
                <td th:text="${v.recolte.lot != null} ? 'Lot #' + ${v.recolte.lot.id} : '-'"></td>
                <td>VENTE</td>
                <td th:text="${v.poidsVendu} + ' kg'"></td>
                <td th:text="${v.montantTotal} + ' Ar'"></td>
                <td th:text="${v.statutVente.libelle}"></td>
                <td>
                    <a class="btn btn-sm btn-outline-primary" th:href="@{/ventes/{id}/journal(id=${v.id})}">Voir Journal</a>
                </td>
            </tr>
        </tbody>
    </table>
</main>
</body>
</html>
