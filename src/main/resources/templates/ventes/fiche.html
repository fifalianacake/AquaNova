<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" th:replace="~{fragments/layout :: layout(~{::title}, ~{::main})}">
<head>
    <title>AquaNova - Fiche Vente</title>
</head>
<body>
<main>

    <div class="fiche-container">
        <div class="fiche-header">
            <h2>Fiche de Vente #<span th:text="${vente.id}"></span></h2>
            <span th:class="'badge badge-' + ${#strings.toLowerCase(vente.statutVente.code)}" th:text="${vente.statutVente.libelle}"></span>
        </div>

        <div class="error" th:if="${erreur}" th:text="${erreur}"></div>

        <div class="info-row">
            <div class="info-label">Date de vente</div>
            <div class="info-value" th:text="${vente.dateVente}"></div>
        </div>
        <div class="info-row">
            <div class="info-label">Client</div>
            <div class="info-value fw-bold" th:text="${vente.client != null ? vente.client.nom : '-'}"></div>
        </div>
        <div class="info-row">
            <div class="info-label">Récolte d'origine</div>
            <div class="info-value" th:text="'Récolte N° ' + ${vente.recolte.id}"></div>
        </div>
        <div class="info-row">
            <div class="info-label">Lot de provenance</div>
            <div class="info-value" th:text="${vente.recolte.lot != null ? 'Lot #' + vente.recolte.lot.id : 'N/A'}"></div>
        </div>
        <div class="info-row">
            <div class="info-label">Poids total livré</div>
            <div class="info-value" th:text="${vente.poidsVendu + ' kg'}"></div>
        </div>
        <div class="info-row">
            <div class="info-label">Prix Unitaire appliqué</div>
            <div class="info-value" th:text="${vente.prixUnitaire + ' Ar / kg'}"></div>
        </div>
        <div class="info-row">
            <div class="info-label">Effectif d'individus vendu</div>
            <div class="info-value" th:text="${vente.effectifVendu != null ? vente.effectifVendu + ' pièces' : 'Non renseigné'}"></div>
        </div>
        <div class="info-row info-row-total">
            <div class="info-label text-strong">Montant Total Facturé</div>
            <div class="info-value montant" th:text="${vente.montantTotal + ' Ar'}"></div>
        </div>
        <div class="info-row">
            <div class="info-label">Observations</div>
            <div class="info-value" th:text="${vente.observation ?: 'Aucune note'}"></div>
        </div>

        <div class="btn-box">
            <a th:href="@{/ventes}" class="btn btn-secondary">Retour</a>
            
            <th:block th:if="${vente.statutVente.code.name() == 'CREEE'}">
                <a th:href="@{/ventes/{id}/edit(id=${vente.id})}" class="btn btn-outline-primary">Modifier</a>

                <form class="inline-form" th:action="@{/ventes/{id}/valider(id=${vente.id})}" method="post">
                    <button type="submit" class="btn btn-primary">Valider la vente</button>
                </form>
            </th:block>

            <form class="inline-form" th:if="${vente.statutVente.code.name() == 'VALIDEE'}"
                  th:action="@{/ventes/{id}/payer(id=${vente.id})}" method="post">
                <button type="submit" class="btn btn-primary">Marquer comme payée</button>
            </form>

            <form th:if="${vente.statutVente.code.name() != 'ANNULEE' && vente.statutVente.code.name() != 'PAYEE'}"
                  th:action="@{/ventes/{id}/annuler(id=${vente.id})}" method="post" class="btn-right"
                  onsubmit="return confirm('Confirmer l\'annulation de cette vente ? Les stocks de récolte seront restitués.')">
                <button type="submit" class="btn btn-danger">Annuler la vente</button>
            </form>
            
            <a th:if="${vente.statutVente.code.name() == 'VALIDEE' || vente.statutVente.code.name() == 'PAYEE'}"
               th:href="@{/ventes/{id}/export-pdf(id=${vente.id})}" class="btn btn-outline-secondary btn-right">
                <i class="bi bi-file-earmark-pdf"></i> Facture PDF
            </a>
        </div>
    </div>
</main>
</body>
</html>
