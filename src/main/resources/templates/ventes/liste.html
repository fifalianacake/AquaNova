<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" th:replace="~{fragments/layout :: layout(~{::title}, ~{::main})}">
<head>
    <title>AquaNova - Gestion des Ventes</title>
</head>
<body>
<main>

    <div class="toolbar">
        <a th:href="@{/ventes/new}" class="btn btn-primary"><i class="bi bi-plus-lg"></i> Saisir une vente</a>
        <a th:href="@{/ventes/dashboard}" class="btn btn-outline-primary">Dashboard</a>
        <a class="btn btn-outline-secondary"
           th:href="@{/ventes/historique/export-pdf(dateDebut=${filter.dateDebut}, dateFin=${filter.dateFin}, clientNom=${filter.client}, statutId=${filter.statutId})}">
            <i class="bi bi-file-earmark-pdf"></i> Exporter en PDF
        </a>
    </div>

    <div class="panel">
        <div class="panel-header">
            <h5>Registre des ventes</h5>
            <span class="result-count"
                  th:text="${ventes.totalElements} + ' vente' + (${ventes.totalElements} > 1 ? 's' : '') + ' trouvée' + (${ventes.totalElements} > 1 ? 's' : '')"></span>
        </div>

        <form method="get" th:action="@{/ventes}" th:object="${filter}" class="filters-bar">
            <input type="hidden" name="page" value="0" />
            <input class="form-control fc-sm" type="number" th:field="*{id}" placeholder="ID">
            <input class="form-control" type="text" th:field="*{client}" placeholder="Nom du client">
            <select class="form-select" th:field="*{idRecolte}">
                <option value="">Toutes les récoltes</option>
                <option th:each="r : ${recoltes}" th:value="${r.id}" th:text="'Récolte #' + ${r.id}"></option>
            </select>
            <select class="form-select" th:field="*{idLot}">
                <option value="">Tous les lots</option>
                <option th:each="l : ${lots}" th:value="${l.id}" th:text="${l.code}"></option>
            </select>
            <div class="input-group">
                <span class="input-group-text">Du</span>
                <input class="form-control" type="date" th:field="*{dateDebut}">
            </div>
            <div class="input-group">
                <span class="input-group-text">Au</span>
                <input class="form-control" type="date" th:field="*{dateFin}">
            </div>
            <input class="form-control fc-sm" type="number" step="0.01" min="0" th:field="*{montantMin}" placeholder="Mt. min">
            <input class="form-control fc-sm" type="number" step="0.01" min="0" th:field="*{montantMax}" placeholder="Mt. max">
            <select class="form-select" th:field="*{statutId}">
                <option value="">Tous les statuts</option>
                <option th:each="s : ${statuts}" th:value="${s.id}" th:text="${s.libelle}"></option>
            </select>
            <button type="submit" class="btn btn-primary"><i class="bi bi-search"></i> Filtrer</button>
            <a th:href="@{/ventes}" class="btn btn-outline-secondary"><i class="bi bi-x-circle"></i> Réinitialiser</a>
        </form>

        <div class="table-responsive">
            <table class="table table-hover align-middle">
                <thead>
                    <tr>
                        <th>ID</th>
                        <th>Date</th>
                        <th>Client</th>
                        <th>Récolte</th>
                        <th>Lot d'origine</th>
                        <th class="text-end">Poids vendu</th>
                        <th class="text-end">Prix unitaire</th>
                        <th class="text-end">Montant total</th>
                        <th>Statut</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:each="v : ${ventes.content}" th:onclick="|window.location.href='@{/ventes/}' + ${v.id}|">
                        <td th:text="${v.id}"></td>
                        <td th:text="${v.dateVente}"></td>
                        <td class="fw-semibold" th:text="${v.client != null ? v.client.nom : '—'}"></td>
                        <td th:text="${'Récolte #' + v.recolte.id}"></td>
                        <td th:text="${v.recolte.lot != null ? 'Lot #' + v.recolte.lot.id : '—'}"></td>
                        <td class="text-end" th:text="${v.poidsVendu + ' kg'}"></td>
                        <td class="text-end" th:text="${v.prixUnitaire + ' Ar'}"></td>
                        <td class="text-end montant" th:text="${v.montantTotal + ' Ar'}"></td>
                        <td>
                            <span th:class="'badge badge-' + ${#strings.toLowerCase(v.statutVente.code)}"
                                  th:text="${v.statutVente.libelle}"></span>
                        </td>
                    </tr>
                    <tr th:if="${ventes.empty}">
                        <td colspan="9" class="text-center text-secondary py-4">Aucune vente ne correspond à ces critères.</td>
                    </tr>
                </tbody>
            </table>
        </div>

        <div th:replace="~{fragments/tableau :: tableFooter(${ventes})}"></div>
    </div>
</main>
</body>
</html>
