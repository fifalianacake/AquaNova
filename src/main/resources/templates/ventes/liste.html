<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" th:replace="~{fragments/layout :: layout(~{::title}, ~{::main})}">
<head>
    <title>AquaNova - Gestion des Ventes</title>
</head>
<body>
<main>

    <div>
        <a th:href="@{/ventes/new}" class="btn btn-primary">Saisir une vente</a>
        <h2>Registre des Ventes Associées aux Récoltes</h2>
    </div>

    <div class="filter-box">
        <form th:action="@{/ventes}" method="get">
            <input class="form-control" type="number" name="id" placeholder="ID Vente" th:value="${currentId}" style="width: 90px;">
            <input class="form-control" type="text" name="client" placeholder="Nom Client" th:value="${currentClient}">
            <input class="form-control" type="number" name="recolteId" placeholder="ID Récolte" th:value="${currentRecolteId}" style="width: 100px;">
            <input class="form-control" type="number" name="lotId" placeholder="ID Lot d'origine" th:value="${currentLotId}" style="width: 130px;">
            <input class="form-control" type="date" name="debut" th:value="${currentDebut}">
            <input class="form-control" type="date" name="fin" th:value="${currentFin}">
            <input class="form-control" type="number" name="montantMin" step="0.01" placeholder="Montant min" th:value="${currentMontantMin}" style="width: 120px;">
            <input class="form-control" type="number" name="montantMax" step="0.01" placeholder="Montant max" th:value="${currentMontantMax}" style="width: 120px;">
            <select class="form-select" name="statutId">
                <option value="">-- Statut --</option>
                <option th:each="s : ${statuts}" th:value="${s.id}" th:text="${s.libelle}" th:selected="${s.id == currentStatutId}"></option>
            </select>
            <button type="submit" class="btn btn-primary">Filtrer</button>
        </form>
    </div>

    <table class="table table-hover align-middle">
        <thead>
            <tr>
                <th>ID</th>
                <th>Date</th>
                <th>Client</th>
                <th>Récolte</th>
                <th>Lot d'origine</th>
                <th>Poids vendu</th>
                <th>Prix unitaire</th>
                <th>Montant total</th>
                <th>Statut</th>
            </tr>
        </thead>
        <tbody>
            <tr th:each="v : ${ventes}" th:onclick="|window.location.href='@{/ventes/}' + ${v.id}|">
                <td th:text="${v.id}"></td>
                <td th:text="${v.dateVente}"></td>
                <td th:text="${v.client != null ? v.client.nom : '-'}"></td>
                <td th:text="${'Récolte #' + v.recolte.id}"></td>
                <td th:text="${v.recolte.lot != null ? 'Lot #' + v.recolte.lot.id : 'N/A'}"></td>
                <td th:text="${v.poidsVendu + ' kg'}"></td>
                <td th:text="${v.prixUnitaire + ' Ar'}"></td>
                <td th:text="${v.montantTotal + ' Ar'}" style="font-weight: bold; color: #1a628f;"></td>
                <td th:text="${v.statutVente.libelle}"></td>
            </tr>
            <tr th:if="${#lists.isEmpty(ventes)}">
                <td colspan="9" style="text-align:center; color: #777; padding: 20px;">Aucune vente enregistrée.</td>
            </tr>
        </tbody>
    </table>
</main>
</body>
</html>
