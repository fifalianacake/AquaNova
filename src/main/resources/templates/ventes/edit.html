<!DOCTYPE html>
<html lang="fr" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <title>AquaNova - Modifier Vente</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 20px;
            background-color: #f4f6f9;
        }

        .form-container {
            background: white;
            max-width: 500px;
            margin: 30px auto;
            padding: 25px;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
        }

        .form-group {
            margin-bottom: 15px;
        }

        .form-group label {
            display: block;
            margin-bottom: 5px;
            font-weight: bold;
        }

        .form-group input,
        .form-group select,
        .form-group textarea {
            width: 100%;
            padding: 8px;
            border: 1px solid #ccc;
            border-radius: 4px;
            box-sizing: border-box;
        }

        .btn-box {
            display: flex;
            justify-content: space-between;
            margin-top: 20px;
        }

        .btn {
            padding: 10px 20px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            text-decoration: none;
            display: inline-block;
            font-weight: bold;
        }

        .btn-primary {
            background-color: #007bff;
            color: white;
        }

        .btn-secondary {
            background-color: #6c757d;
            color: white;
        }

        .error {
            color: red;
            margin-bottom: 15px;
            font-weight: bold;
        }
    </style>
</head>

<body>

    <div class="form-container">
        <h2>Modification de la Vente #<span th:text="${vente.id}"></span></h2>

        <div class="error" th:if="${erreur}" th:text="${erreur}"></div>

        <form th:action="@{/ventes}" th:object="${vente}" method="post">
            <input type="hidden" th:field="*{id}">
            <input type="hidden" th:field="*{statutVente.id}">

            <div class="form-group">
                <label>Client *</label>
                <input type="text" th:field="*{client}" required>
            </div>

            <div class="form-group">
                <label>Récolte liée</label>
                <select th:field="*{recolte.id}" style="background-color: #e9ecef; pointer-events: none;">
                    <option th:value="${vente.recolte.id}"
                        th:text="'Récolte #' + ${vente.recolte.id} + ' (' + ${vente.recolte.lot.nom} + ')'"></option>
                </select>
            </div>

            <div class="form-group">
                <label>Date de la vente *</label>
                <input type="date" th:field="*{dateVente}" required>
            </div>

            <div class="form-group">
                <label>Poids vendu (kg) *</label>
                <input type="number" step="0.01" th:field="*{poidsVendu}" min="0.01" required>
            </div>

            <div class="form-group">
                <label>Prix unitaire (Ar) *</label>
                <input type="number" step="0.01" th:field="*{prixUnitaire}" min="0.01" required>
            </div>

            <div class="form-group">
                <label>Effectif vendu</label>
                <input type="number" th:field="*{effectifVendu}" min="1">
            </div>

            <div class="form-group">
                <label>Observations</label>
                <textarea th:field="*{observation}" rows="3"></textarea>
            </div>

            <div class="btn-box">
                <a th:href="@{/ventes/{id}(id=${vente.id})}" class="btn btn-secondary">Annuler</a>
                <button type="submit" class="btn btn-primary">Enregistrer les modifications</button>
            </div>
        </form>
    </div>

</body>

</html>
