<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" th:replace="~{fragments/layout :: layout(~{::title}, ~{::main})}">
<head>
    <title>AquaNova - Modifier la Vente</title>
</head>
<body>
<main>

    <div class="form-container">
        <h2>Modifier la Vente #<span th:text="${vente.id}"></span></h2>

        <div class="error" th:if="${erreur}" th:text="${erreur}"></div>

        <form th:action="@{/ventes}" th:object="${vente}" method="post">

            <input type="hidden" th:field="*{id}" />
            <input type="hidden" th:field="*{recolte.id}" />

            <div class="form-group">
                <label class="form-label">Récolte d'origine</label>
                <div class="readonly-value" th:text="'Récolte N° ' + ${vente.recolte.id} + ' [Poids total: ' + ${vente.recolte.poidsTotal} + 'kg]'"></div>
            </div>

            <div class="form-group">
                <label class="form-label">Client *</label>
                <div class="client-row">
                    <select class="form-select" th:field="*{client.id}" id="clientSelect" required>
                        <option value="">-- Sélectionner le client --</option>
                        <option th:each="c : ${clients}" th:value="${c.id}" th:text="${c.nom}"></option>
                    </select>
                    <button type="button" class="btn btn-link" onclick="ouvrirModalClient()">+ Nouveau client</button>
                </div>
            </div>

            <div class="form-group">
                <label class="form-label">Date de la vente *</label>
                <input class="form-control" type="date" th:field="*{dateVente}" required>
            </div>

            <div class="form-group">
                <label class="form-label">Poids vendu (kg) *</label>
                <input class="form-control" type="number" step="0.01" th:field="*{poidsVendu}" min="0.01" placeholder="0.00" required>
            </div>

            <div class="form-group">
                <label class="form-label">Prix unitaire (Ar) *</label>
                <input class="form-control" type="number" step="0.01" th:field="*{prixUnitaire}" min="0.01" placeholder="0.00" required>
            </div>

            <div class="form-group">
                <label class="form-label">Effectif vendu (Optionnel)</label>
                <input class="form-control" type="number" th:field="*{effectifVendu}" min="1" placeholder="Nombre de pièces">
            </div>

            <div class="form-group">
                <label class="form-label">Observation</label>
                <textarea class="form-control" th:field="*{observation}" rows="3" placeholder="Notes complémentaires..."></textarea>
            </div>

            <div class="btn-box">
                <a th:href="@{/ventes/{id}(id=${vente.id})}" class="btn btn-secondary">Retour</a>
                <button type="submit" class="btn btn-primary">Enregistrer les modifications</button>
            </div>
        </form>
    </div>

    <dialog id="modalNouveauClient">
        <h3 style="margin-top:0;">Nouveau client</h3>
        <div id="modalClientErreur" class="error" style="display:none;"></div>

        <div class="form-group">
            <label class="form-label">Nom / Raison sociale *</label>
            <input class="form-control" type="text" id="modalClientNom" placeholder="Nom du client">
        </div>

        <div class="form-group">
            <label class="form-label">Type de client *</label>
            <select class="form-select" id="modalClientType">
                <option value="">-- Choisir un type --</option>
                <option th:each="t : ${typesClient}" th:value="${t.id}" th:text="${t.libelle}"></option>
            </select>
        </div>

        <div class="form-group">
            <label class="form-label">Contact téléphonique</label>
            <input class="form-control" type="text" id="modalClientContact" placeholder="Optionnel">
        </div>

        <div class="form-group">
            <label class="form-label">Email</label>
            <input class="form-control" type="email" id="modalClientEmail" placeholder="Optionnel">
        </div>

        <div class="form-group">
            <label class="form-label">Adresse</label>
            <input class="form-control" type="text" id="modalClientAdresse" placeholder="Optionnel">
        </div>

        <div class="btn-box">
            <button type="button" class="btn btn-secondary" onclick="fermerModalClient()">Annuler</button>
            <button type="button" class="btn btn-primary" onclick="creerClientModal()">Créer le client</button>
        </div>
    </dialog>

    <script th:inline="javascript">
        /*<![CDATA[*/
        const urlCreationClient = /*[[@{/clients/api}]]*/ '/clients/api';

        function ouvrirModalClient() {
            document.getElementById('modalClientErreur').style.display = 'none';
            document.getElementById('modalNouveauClient').showModal();
        }

        function fermerModalClient() {
            document.getElementById('modalNouveauClient').close();
        }

        function creerClientModal() {
            const nom = document.getElementById('modalClientNom').value.trim();
            const typeClientId = document.getElementById('modalClientType').value;
            const contact = document.getElementById('modalClientContact').value.trim();
            const email = document.getElementById('modalClientEmail').value.trim();
            const adresse = document.getElementById('modalClientAdresse').value.trim();
            const erreurDiv = document.getElementById('modalClientErreur');
            erreurDiv.style.display = 'none';

            if (!nom || !typeClientId) {
                erreurDiv.textContent = 'Le nom et le type de client sont obligatoires.';
                erreurDiv.style.display = 'block';
                return;
            }

            const params = new URLSearchParams();
            params.append('nom', nom);
            params.append('typeClientId', typeClientId);
            if (contact) params.append('contact', contact);
            if (email) params.append('email', email);
            if (adresse) params.append('adresse', adresse);

            fetch(urlCreationClient, {
                method: 'POST',
                headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
                body: params.toString()
            })
            .then(async (res) => {
                const data = await res.json();
                if (!res.ok) {
                    throw new Error(data.error || 'Erreur lors de la création du client.');
                }
                return data;
            })
            .then((data) => {
                const select = document.getElementById('clientSelect');
                const option = document.createElement('option');
                option.value = data.id;
                option.textContent = data.nom;
                select.appendChild(option);
                select.value = data.id;

                document.getElementById('modalClientNom').value = '';
                document.getElementById('modalClientType').value = '';
                document.getElementById('modalClientContact').value = '';
                document.getElementById('modalClientEmail').value = '';
                document.getElementById('modalClientAdresse').value = '';

                fermerModalClient();
            })
            .catch((err) => {
                erreurDiv.textContent = err.message;
                erreurDiv.style.display = 'block';
            });
        }
        /*]]>*/
    </script>
</main>
</body>
</html>
