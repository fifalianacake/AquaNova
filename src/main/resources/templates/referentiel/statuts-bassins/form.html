<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" th:replace="~{fragments/layout :: layout(~{::title}, ~{::main})}">
<head>
    <title>Statut Bassin Form</title>
</head>
<body>
<main>
    <h2 th:text="${statut.id == null ? 'New Statut Bassin' : 'Edit Statut Bassin'}">Statut Bassin Form</h2>

    <div class="error" th:if="${error}" th:text="${error}"></div>

    <form class="form-panel" th:action="${statut.id == null ? '/statuts-bassins' : '/statuts-bassins/' + statut.id}"
          th:object="${statut}"
          method="post">

        <input type="hidden" th:field="*{id}" />

        <div class="mb-3">
            <label class="form-label" for="libelle">Libellé</label>
            <select class="form-select" id="libelle" th:field="*{libelle}" required>
                <option value="" disabled>Select a status...</option>
                <option th:each="libelle : ${libelles}"
                        th:value="${libelle}"
                        th:text="${libelle}">
                    LIBRE
                </option>
            </select>
        </div>

        <div class="d-flex gap-2 mt-4">
            <button class="btn btn-primary" type="submit">Enregistrer</button>
            <a class="btn btn-secondary" th:href="@{/statuts-bassins}">Retour à la liste</a>
        </div>
    </form>
</main>
</body>
</html>
