<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" th:replace="~{fragments/layout :: layout(~{::title}, ~{::main})}">
<head>
    <title>Statut Bassin Details</title>
</head>
<body>
<main>
<h2 class="mb-4">Statut Bassin Details</h2>

<table class="table table-bordered">
    <tr>
        <th>ID</th>
        <td th:text="${statut.id}">1</td>
    </tr>
    <tr>
        <th>Libelle</th>
        <td th:text="${statut.libelle}">LIBRE</td>
    </tr>
</table>

<a th:href="@{/statuts-bassins/{id}/edit(id=${statut.id})}" class="btn btn-outline-primary">Edit</a>
<a th:href="@{/statuts-bassins}" class="btn btn-secondary">Back</a>
</main>
</body>
</html>
