<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" th:replace="~{fragments/layout :: layout(~{::title}, ~{::main})}">
<head>
    <title>Référentiel - Saisie Type Bassin</title>
</head>
<body>
<main>
    <h2 th:text="${typeBassin.id == null ? 'Nouveau Type de Bassin' : 'Modifier le Type'}">Saisie Type</h2>

    <form class="form-panel" th:action="@{/types-bassins}" th:object="${typeBassin}" method="post">
        <input type="hidden" th:field="*{id}" />

        <div class="mb-3">
            <label class="form-label" for="libelle">Nom / Libellé</label>
            <input class="form-control" type="text" id="libelle" th:field="*{libelle}" required
                placeholder="Ex: Bassin Terre, Happa" />
        </div>

        <div class="d-flex gap-2 mt-4">
            <button class="btn btn-primary" type="submit">Enregistrer</button>
            <a class="btn btn-secondary" th:href="@{/types-bassins}">Retour à la liste</a>
        </div>
    </form>
</main>
</body>
</html>
