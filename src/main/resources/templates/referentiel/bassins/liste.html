<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" th:replace="~{fragments/layout :: layout(~{::title}, ~{::main})}">
<head>
    <title>Référentiel - Liste des Bassins</title>
</head>
<body>
<main>

<div class="toolbar">
    <a class="btn btn-primary" th:href="@{/bassins/new}"><i class="bi bi-plus-lg"></i> Ajouter un bassin</a>
    <a class="btn btn-outline-primary" th:href="@{/types-bassins}">Gérer les types</a>
</div>

<div class="panel">
    <div class="panel-header">
        <h5>Référentiel des bassins / happas</h5>
        <span class="result-count" th:text="${#lists.size(bassins)} + ' bassin(s)'"></span>
    </div>

    <div class="table-responsive">
        <table class="table table-hover align-middle">
            <thead>
            <tr>
                <th>ID</th>
                <th>Référence</th>
                <th>Type</th>
                <th class="text-end">Capacité (m³)</th>
                <th>Statut</th>
                <th class="text-end">Actions</th>
            </tr>
            </thead>
            <tbody>
            <tr th:each="b : ${bassins}">
                <td th:text="${b.id}"></td>
                <td class="fw-semibold" th:text="${b.reference}"></td>
                <td th:text="${b.typeBassin.libelle}"></td>
                <td class="text-end" th:text="${b.capaciteM3}"></td>
                <td>
                    <span th:text="${b.statut.libelle}"
                          th:classappend="${b.statut.libelle == T(mg.itu.aquanova.referentiel.models.LibelleStatutBassin).LIBRE ? 'badge bg-success' : (b.statut.libelle == T(mg.itu.aquanova.referentiel.models.LibelleStatutBassin).OCCUPE ? 'badge bg-warning text-dark' : 'badge bg-danger')}"></span>
                </td>
                <td class="text-end">
                    <a class="btn btn-sm btn-outline-primary" th:href="@{/bassins/{id}/edit(id=${b.id})}" title="Modifier"><i class="bi bi-pencil"></i></a>
                    <a class="btn btn-sm btn-outline-danger" th:href="@{/bassins/{id}/delete(id=${b.id})}" title="Supprimer"
                       onclick="return confirm('Voulez-vous supprimer ce bassin ?')"><i class="bi bi-trash3"></i></a>
                </td>
            </tr>
            <tr th:if="${#lists.isEmpty(bassins)}">
                <td colspan="6" class="text-center text-secondary py-4">Aucun bassin enregistré.</td>
            </tr>
            </tbody>
        </table>
    </div>
</div>
</main>
</body>
</html>
