<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" th:replace="~{fragments/layout :: layout(~{::title}, ~{::main})}">
<head>
    <title>Référentiel - Saisie Bassin</title>
</head>
<body>
<main>
    <h2 th:text="${bassin.id == null ? 'Nouveau Bassin' : 'Modifier le Bassin'}">Saisie Bassin</h2>

    <div class="error" th:if="${error}" th:text="${error}"></div>

    <form class="form-panel" th:action="@{/bassins}" th:object="${bassin}" method="post">
        <input type="hidden" th:field="*{id}" />

        <div class="mb-3">
            <label class="form-label" for="reference">Référence</label>
            <input class="form-control" type="text" id="reference" th:field="*{reference}" required
                placeholder="Ex: B-01" />
        </div>

        <div class="mb-3">
            <label class="form-label" for="typeBassin">Type de Bassin</label>
            <select class="form-select" id="typeBassin" th:field="*{typeBassin.id}" required>
                <option value="">-- Choisir un type --</option>
                <option th:each="t : ${types}" th:value="${t.id}" th:text="${t.libelle}"></option>
            </select>
        </div>

        <div class="mb-3">
            <label class="form-label" for="capaciteM3">Capacité (m³)</label>
            <input class="form-control" type="number" step="0.1" id="capaciteM3" th:field="*{capaciteM3}" required />
        </div>

        <div class="mb-3">
            <label class="form-label" for="statut">Statut du Bassin</label>
            <select class="form-select" id="statut" th:field="*{statut.id}" required>
                <option value="">-- Choisir un statut --</option>
                <option th:each="s : ${statuts}"
                        th:value="${s.id}"
                        th:text="${s.libelle}">
                </option>
            </select>
        </div>

        <div class="d-flex gap-2 mt-4">
            <button class="btn btn-primary" type="submit">Enregistrer</button>
            <a class="btn btn-secondary" th:href="@{/bassins}">Retour à la liste</a>
        </div>
    </form>
</main>
</body>
</html>
