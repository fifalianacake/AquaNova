<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" th:replace="~{fragments/layout :: layout(~{::title}, ~{::main})}">
<head>
    <title>Détails de l'Aliment</title>
</head>
<body>
<main>
    <h2>Détails de l'Aliment</h2>

    <div th:if="${aliment != null}">
        <ul>
            <li><strong>ID :</strong> <span th:text="${aliment.id}">1</span></li>
            <li><strong>Nom :</strong> <span th:text="${aliment.nom}">Nom de l'aliment</span></li>
            <li><strong>Stock Actuel :</strong> <span th:text="${stockActuel}">0</span></li>
        </ul>

        <p>
            <a class="btn btn-secondary" th:href="@{/aliments}">Retour à la liste</a> | 
            <a class="btn btn-sm btn-outline-primary" th:href="@{/aliments/{id}/edit(id=${aliment.id})}">Modifier cet aliment</a> | 
            <a class="btn btn-sm btn-outline-danger" th:href="@{/aliments/{id}/delete(id=${aliment.id})}"
               th:onclick="return confirm('Confirmer la suppression ?');">Supprimer</a>
        </p>
    </div>

    <div th:unless="${aliment != null}">
        <p>Aliment introuvable.</p>
        <p><a class="btn btn-secondary" th:href="@{/aliments}">Retour à la liste</a></p>
    </div>
</main>
</body>
</html>
