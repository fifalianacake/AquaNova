<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" th:replace="~{fragments/layout :: layout(~{::title}, ~{::main})}">
<head>
    <title>Formulaire</title>
</head>
<body>
<main>
    <h2 th:text="${aliment.id == null} ? 'Créer un aliment' : 'Modifier l\'aliment'">Formulaire</h2>

    <div class="error" th:if="${error}" th:text="${error}"></div>

    <form class="form-panel" th:action="@{/aliments}" th:object="${aliment}" method="post">

        <input type="hidden" th:field="*{id}" />

        <div class="mb-3">
            <label class="form-label" for="nom">Nom de l'aliment</label>
            <input class="form-control" type="text" id="nom" th:field="*{nom}" required />
        </div>

        <div class="mb-3">
            <label class="form-label" for="typeAliment">Type d'aliment</label>
            <select class="form-select" id="typeAliment" th:field="*{typeAliment.id}" required>
                <option value="">-- Choisir un type --</option>
                <option th:each="t : ${typesAliments}" th:value="${t.id}" th:text="${t.nom}"></option>
            </select>
        </div>

        <div class="mb-3">
            <label class="form-label" for="prixUnitaire">Prix unitaire (Ar/kg)</label>
            <input class="form-control" type="number" step="0.01" min="0" id="prixUnitaire" th:field="*{prixUnitaire}" required />
        </div>

        <div class="mb-3">
            <label class="form-label" for="description">Description</label>
            <textarea class="form-control" id="description" th:field="*{description}"></textarea>
        </div>

        <div class="d-flex gap-2 mt-4">
            <button class="btn btn-primary" type="submit">Enregistrer</button>
            <a class="btn btn-secondary" th:href="@{/aliments}">Retour à la liste</a>
        </div>
    </form>
</main>
</body>
</html>
