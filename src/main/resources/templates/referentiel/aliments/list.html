<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" th:replace="~{fragments/layout :: layout(~{::title}, ~{::main})}">
<head>
    <title>Liste des Aliments</title>
</head>
<body>
<main>
    <h2>Gestion des Aliments</h2>

    <p>
        <a class="btn btn-primary" th:href="@{/aliments/new}">+ Créer un nouvel aliment</a>
    </p>

    <form th:action="@{/aliments}" method="get">
        <label class="form-label" for="search">Rechercher par nom :</label>
        <input class="form-control" type="text" id="search" name="q" th:value="${q}" placeholder="Nom de l'aliment..." />
        <button class="btn btn-primary" type="submit">Rechercher</button>
        <a class="btn btn-secondary" th:if="${q != null}" th:href="@{/aliments}">Annuler la recherche</a>
    </form>

    <br/>

    <table class="table table-hover align-middle">
        <thead>
            <tr>
                <th>ID</th>
                <th>Nom</th>
                <th>Actions</th>
            </tr>
        </thead>
        <tbody>
            <tr th:if="${#lists.isEmpty(aliments)}">
                <td colspan="3">Aucun aliment trouvé.</td>
            </tr>
            <tr th:each="aliment : ${aliments}">
                <td th:text="${aliment.id}">1</td>
                <td th:text="${aliment.nom}">Exemple Aliment</td>
                <td>
                    <a class="btn btn-sm btn-outline-primary" th:href="@{/aliments/{id}(id=${aliment.id})}">Voir</a> | 
                    <a class="btn btn-sm btn-outline-primary" th:href="@{/aliments/{id}/edit(id=${aliment.id})}">Modifier</a> | 
                    <a class="btn btn-sm btn-outline-danger" th:href="@{/aliments/{id}/delete(id=${aliment.id})}"
                       th:onclick="return confirm('Supprimer cet aliment ?');">Supprimer</a>
                </td>
            </tr>
        </tbody>
    </table>
</main>
</body>
</html>
