<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" th:replace="~{fragments/layout :: layout(~{::title}, ~{::main})}">
<head>
    <title>Liste des Aliments</title>
</head>
<body>
<main>

<div class="toolbar">
    <a class="btn btn-primary" th:href="@{/aliments/new}"><i class="bi bi-plus-lg"></i> Créer un aliment</a>
</div>

<div class="panel">
    <div class="panel-header">
        <h5>Gestion des aliments</h5>
        <span class="result-count" th:text="${#lists.size(aliments)} + ' aliment(s)'"></span>
    </div>

    <form th:action="@{/aliments}" method="get" class="filters-bar">
        <input class="form-control" type="text" id="search" name="q" th:value="${q}" placeholder="Nom de l'aliment..." />
        <button class="btn btn-primary" type="submit"><i class="bi bi-search"></i> Filtrer</button>
        <a class="btn btn-outline-secondary" th:href="@{/aliments}"><i class="bi bi-x-circle"></i> Réinitialiser</a>
    </form>

    <div class="table-responsive">
        <table class="table table-hover align-middle">
            <thead>
            <tr>
                <th>ID</th>
                <th>Nom</th>
                <th>Type</th>
                <th class="text-end">Prix unitaire (Ar/kg)</th>
                <th class="text-end">Actions</th>
            </tr>
            </thead>
            <tbody>
            <tr th:each="aliment : ${aliments}">
                <td th:text="${aliment.id}"></td>
                <td class="fw-semibold" th:text="${aliment.nom}"></td>
                <td th:text="${aliment.typeAliment != null ? aliment.typeAliment.nom : '—'}"></td>
                <td class="text-end" th:text="${aliment.prixUnitaire != null ? aliment.prixUnitaire : '—'}"></td>
                <td class="text-end">
                    <a class="btn btn-sm btn-outline-primary" th:href="@{/aliments/{id}(id=${aliment.id})}" title="Voir"><i class="bi bi-eye"></i></a>
                    <a class="btn btn-sm btn-outline-primary" th:href="@{/aliments/{id}/edit(id=${aliment.id})}" title="Modifier"><i class="bi bi-pencil"></i></a>
                    <a class="btn btn-sm btn-outline-danger" th:href="@{/aliments/{id}/delete(id=${aliment.id})}" title="Supprimer"
                       onclick="return confirm('Supprimer cet aliment ?');"><i class="bi bi-trash3"></i></a>
                </td>
            </tr>
            <tr th:if="${#lists.isEmpty(aliments)}">
                <td colspan="5" class="text-center text-secondary py-4">Aucun aliment trouvé.</td>
            </tr>
            </tbody>
        </table>
    </div>
</div>
</main>
</body>
</html>
