<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" th:replace="~{fragments/layout :: layout(~{::title}, ~{::main})}">
<head>
    <title>AquaNova - Alertes actives</title>
</head>
<body>
<main>

<div class="success" th:if="${success}" th:text="${success}"></div>
<div class="error" th:if="${error}" th:text="${error}"></div>

<div class="toolbar">
    <a class="btn btn-outline-primary" th:href="@{/alertes/historique}">
        <i class="bi bi-clock-history"></i> Historique des alertes
    </a>
    <a class="btn btn-outline-secondary" th:href="@{/parametres-systeme}">
        <i class="bi bi-sliders"></i> Configurer les seuils
    </a>
</div>

<div class="panel">
    <div class="panel-header">
        <h5>Alertes actives</h5>
        <span class="result-count"
              th:text="${alertes.totalElements} + ' alerte' + (${alertes.totalElements} > 1 ? 's' : '') + ' active' + (${alertes.totalElements} > 1 ? 's' : '')
                       + (${nbCritiques} > 0 ? ' · ' + ${nbCritiques} + ' critique' + (${nbCritiques} > 1 ? 's' : '') : '')"></span>
    </div>

    <form method="get" th:action="@{/alertes}" class="filters-bar">
        <input type="hidden" name="page" value="0" />
        <select class="form-select" name="moduleSource">
            <option value="">Tous les modules</option>
            <option th:each="m : ${moduleSources}"
                    th:value="${m}"
                    th:text="${m}"
                    th:selected="${filter.moduleSource == m}"></option>
        </select>
        <select class="form-select" name="typeAlerte">
            <option value="">Tous les types</option>
            <option th:each="t : ${typesAlerte}"
                    th:value="${t}"
                    th:text="${t}"
                    th:selected="${filter.typeAlerte == t}"></option>
        </select>
        <select class="form-select" name="niveauCriticite">
            <option value="">Toutes les criticités</option>
            <option th:each="n : ${niveauxCriticite}"
                    th:value="${n}"
                    th:text="${n}"
                    th:selected="${filter.niveauCriticite == n}"></option>
        </select>
        <select class="form-select" name="statut">
            <option value="">Tous les statuts</option>
            <option th:each="s : ${statutsAlerte}"
                    th:value="${s}"
                    th:text="${s}"
                    th:selected="${filter.statut == s}"></option>
        </select>
        <div class="input-group">
            <span class="input-group-text">Du</span>
            <input class="form-control" type="date" name="dateDebut" th:value="${filter.dateDebut}">
        </div>
        <div class="input-group">
            <span class="input-group-text">Au</span>
            <input class="form-control" type="date" name="dateFin" th:value="${filter.dateFin}">
        </div>
        <select class="form-select" name="lotId">
            <option value="">Tous les lots</option>
            <option th:each="l : ${lots}"
                    th:value="${l.id}"
                    th:text="${l.code}"
                    th:selected="${filter.lotId == l.id}"></option>
        </select>
        <select class="form-select" name="bassinId">
            <option value="">Tous les bassins</option>
            <option th:each="b : ${bassins}"
                    th:value="${b.id}"
                    th:text="${b.reference}"
                    th:selected="${filter.bassinId == b.id}"></option>
        </select>
        <button type="submit" class="btn btn-primary"><i class="bi bi-search"></i> Filtrer</button>
        <a th:href="@{/alertes}" class="btn btn-outline-secondary"><i class="bi bi-x-circle"></i> Réinitialiser</a>
    </form>

    <div class="table-responsive">
        <table class="table table-hover align-middle">
            <thead>
            <tr>
                <th th:replace="~{fragments/tableau :: sortableHeader(${alertes}, 'dateCreation', 'Date création', '')}"></th>
                <th th:replace="~{fragments/tableau :: sortableHeader(${alertes}, 'moduleSource', 'Module', '')}"></th>
                <th th:replace="~{fragments/tableau :: sortableHeader(${alertes}, 'typeAlerte', 'Type', '')}"></th>
                <th th:replace="~{fragments/tableau :: sortableHeader(${alertes}, 'niveauCriticite', 'Criticité', '')}"></th>
                <th th:replace="~{fragments/tableau :: sortableHeader(${alertes}, 'statut', 'Statut', '')}"></th>
                <th>Entité concernée</th>
                <th>Message</th>
                <th class="text-end">Actions</th>
            </tr>
            </thead>
            <tbody>
            <tr th:each="a : ${alertes.content}">
                <td th:text="${#temporals.format(a.dateCreation, 'dd/MM/yyyy HH:mm')}"></td>
                <td th:text="${a.moduleSource}"></td>
                <td th:text="${a.typeAlerte}"></td>
                <td>
                    <span class="badge"
                          th:text="${a.niveauCriticite}"
                          th:classappend="${a.niveauCriticite.name() == 'CRITIQUE' ? 'badge-danger' : (a.niveauCriticite.name() == 'AVERTISSEMENT' ? 'badge-warning' : 'badge-info')}">
                    </span>
                </td>
                <td>
                    <span class="badge"
                          th:text="${a.statut}"
                          th:classappend="${a.statut.name() == 'EN_COURS' ? 'badge-warning' : 'badge-info'}">
                    </span>
                </td>
                <td th:text="${a.lot != null ? 'Lot ' + a.lot.code
                              : (a.bassin != null ? 'Bassin ' + a.bassin.reference
                              : (a.aliment != null ? 'Aliment ' + a.aliment.nom : '—'))}"></td>
                <td th:text="${a.message}"></td>
                <td class="text-end">
                    <a class="btn btn-sm btn-outline-primary" th:href="@{/alertes/{id}(id=${a.id})}" title="Voir le détail">
                        <i class="bi bi-eye"></i>
                    </a>
                    <form class="inline-form" method="post" th:action="@{/alertes/{id}/en-cours(id=${a.id})}"
                          th:if="${a.statut.name() == 'ACTIVE'}">
                        <button class="btn btn-sm btn-outline-secondary" type="submit" title="Prendre en charge">
                            <i class="bi bi-play-circle"></i>
                        </button>
                    </form>
                </td>
            </tr>
            <tr th:if="${alertes.empty}">
                <td colspan="8" class="text-center text-secondary py-4">Aucune alerte active. Tout va bien.</td>
            </tr>
            </tbody>
        </table>
    </div>

    <div th:replace="~{fragments/tableau :: tableFooter(${alertes})}"></div>
</div>
</main>
</body>
</html>
