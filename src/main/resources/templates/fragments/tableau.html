<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="fr">
<body>

<!-- ══════════════════════════════════════════════════════════════════
     Fragment : en-tête de colonne triable.
     Affiche le libellé et une flèche indiquant le sens de tri actif (▲/▼),
     ou une flèche neutre sinon. Le clic (js-sort-link, cf. /js/aquanova.js)
     bascule asc → desc → asc sur ce champ et revient à la page 0, en
     préservant les filtres et la taille de page courants.
     th:replace substitue tout le <th> appelant : les classes CSS (ex. alignement
     à droite) se passent donc via le paramètre "classe", pas sur la balise hôte.
     Usage : <th th:replace="~{fragments/tableau :: sortableHeader(${maPage}, 'dateVente', 'Date', '')}"></th>
             <th th:replace="~{fragments/tableau :: sortableHeader(${maPage}, 'montant', 'Montant (Ar)', 'text-end')}"></th>
     ══════════════════════════════════════════════════════════════════ -->
<th th:fragment="sortableHeader(page, champ, libelle, classe)"
    th:with="tri=${page.pageable.sort.getOrderFor(champ)},
             sens=${tri != null and tri.direction.name() == 'ASC' ? 'desc' : 'asc'},
             classeTri=${tri == null ? '' : (' sorted-' + #strings.toLowerCase(tri.direction.name()))}"
    th:class="${'js-sort-link' + (#strings.isEmpty(classe) ? '' : ' ' + classe) + classeTri}"
    th:attr="data-sort-field=${champ},data-sort-dir=${sens}">
    <span th:text="${libelle}">Colonne</span>
    <i class="bi sort-icon"
       th:classappend="${tri == null} ? 'bi-arrow-down-up'
                        : (${tri.direction.name() == 'ASC'} ? 'bi-sort-up' : 'bi-sort-down')"></i>
</th>

<!-- ══════════════════════════════════════════════════════════════════
     Fragment : pied de tableau standard.
     "Lignes par page" à gauche, compteur + pagination numérotée à droite.
     La navigation (js-page-link / js-page-size) préserve les filtres via
     l'URL courante (cf. /js/aquanova.js).
     Usage : <div th:replace="~{fragments/tableau :: tableFooter(${maPage})}"></div>
     ══════════════════════════════════════════════════════════════════ -->
<div class="table-footer" th:fragment="tableFooter(page)">
    <div class="d-flex align-items-center gap-2">
        <span class="text-secondary small">Lignes par page</span>
        <select class="form-select form-select-sm w-auto js-page-size" aria-label="Lignes par page">
            <option th:each="s : ${pageSizes}" th:value="${s}" th:text="${s}"
                    th:selected="${page.size == s}"></option>
        </select>
    </div>

    <div class="d-flex align-items-center gap-3">
        <span class="text-secondary small"
              th:text="${page.totalElements} + ' résultat' + (${page.totalElements} > 1 ? 's' : '')"></span>

        <ul class="pagination-nav" th:if="${page.totalPages > 1}"
            th:with="debut=${page.number - 2 < 0 ? 0 : page.number - 2},
                     fin=${page.number + 2 > page.totalPages - 1 ? page.totalPages - 1 : page.number + 2}">
            <li th:classappend="${page.first} ? 'disabled'">
                <a href="#" class="js-page-link" th:attr="data-page=${page.number - 1}">&laquo;</a>
            </li>
            <li th:each="i : ${#numbers.sequence(debut, fin)}"
                th:classappend="${i == page.number} ? 'active'">
                <a href="#" class="js-page-link" th:attr="data-page=${i}" th:text="${i + 1}">1</a>
            </li>
            <li th:classappend="${page.last} ? 'disabled'">
                <a href="#" class="js-page-link" th:attr="data-page=${page.number + 1}">&raquo;</a>
            </li>
        </ul>
    </div>
</div>

</body>
</html>
