<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="fr">
<body>

<!-- ══════════════════════════════════════════════════════════════════
     Fragment : pied de tableau standard.
     "Lignes par page" à gauche, compteur + pagination numérotée à droite.
     La navigation (js-page-link / js-page-size) préserve les filtres via
     l'URL courante (cf. /js/aquanova.js).
     Usage : <div th:replace="~{fragments/tableau :: tableFooter(${maPage})}"></div>
     ══════════════════════════════════════════════════════════════════ -->
<div class="table-footer" th:fragment="tableFooter(page)">
    <div class="d-flex align-items-center gap-2">
        <span class="text-secondary small">Lignes par page</span>
        <select class="form-select form-select-sm w-auto js-page-size" aria-label="Lignes par page">
            <option th:each="s : ${pageSizes}" th:value="${s}" th:text="${s}"
                    th:selected="${page.size == s}"></option>
        </select>
    </div>

    <div class="d-flex align-items-center gap-3">
        <span class="text-secondary small"
              th:text="${page.totalElements} + ' résultat' + (${page.totalElements} > 1 ? 's' : '')"></span>

        <ul class="pagination-nav" th:if="${page.totalPages > 1}"
            th:with="debut=${page.number - 2 < 0 ? 0 : page.number - 2},
                     fin=${page.number + 2 > page.totalPages - 1 ? page.totalPages - 1 : page.number + 2}">
            <li th:classappend="${page.first} ? 'disabled'">
                <a href="#" class="js-page-link" th:attr="data-page=${page.number - 1}">&laquo;</a>
            </li>
            <li th:each="i : ${#numbers.sequence(debut, fin)}"
                th:classappend="${i == page.number} ? 'active'">
                <a href="#" class="js-page-link" th:attr="data-page=${i}" th:text="${i + 1}">1</a>
            </li>
            <li th:classappend="${page.last} ? 'disabled'">
                <a href="#" class="js-page-link" th:attr="data-page=${page.number + 1}">&raquo;</a>
            </li>
        </ul>
    </div>
</div>

</body>
</html>
