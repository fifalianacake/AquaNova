<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="fr" th:fragment="layout(title, content)">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1"/>
    <title th:replace="${title}">AquaNova</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"/>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet"/>
    <link rel="preconnect" href="https://fonts.googleapis.com"/>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@500;600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet"/>
    <link th:href="@{/css/aquanova.css}" rel="stylesheet"/>
</head>
<body>

<div class="app-shell">

    <!-- ── Sidebar de navigation ── -->
    <nav class="sidebar">
        <a class="sidebar-brand" th:href="@{/}" title="AquaNova">
            <span class="brand-badge"><i class="bi bi-water"></i></span>
            <span class="sidebar-label">AquaNova</span>
        </a>

        <div class="sidebar-nav">
            <div th:each="section, it : ${menuNavigation}" class="sidebar-section">
                <button type="button" class="sidebar-section-toggle"
                        data-bs-toggle="collapse"
                        th:attr="data-bs-target='#nav-section-' + ${it.index}"
                        th:title="${section.libelle}"
                        th:classappend="${section.ouvert} ? '' : 'collapsed'">
                    <i th:class="'bi ' + ${section.icone}"></i>
                    <span class="sidebar-label" th:text="${section.libelle}">Section</span>
                    <i class="bi bi-chevron-down chev"></i>
                </button>
                <div class="collapse" th:classappend="${section.ouvert} ? 'show'"
                     th:id="'nav-section-' + ${it.index}">
                    <a th:each="item : ${section.sousItems}"
                       th:href="@{${item.url}}"
                       class="sidebar-link"
                       th:classappend="${item.actif} ? 'active'"
                       th:text="${item.libelle}">Lien</a>
                </div>
            </div>
        </div>

        <div class="sidebar-footer">
            <a th:href="@{/logout}" class="sidebar-link" title="Déconnexion">
                <i class="bi bi-box-arrow-right"></i><span class="sidebar-label ms-2">Déconnexion</span>
            </a>
        </div>
    </nav>

    <!-- Voile sombre : sur mobile, la sidebar s'ouvre par-dessus le contenu. -->
    <div class="sidebar-backdrop" id="sidebarBackdrop"></div>

    <!-- ── Zone principale ── -->
    <div class="app-main">
        <header class="topbar">
            <button type="button" class="sidebar-toggle" id="sidebarToggle"
                    aria-label="Afficher ou masquer le menu">
                <i class="bi bi-list"></i>
            </button>
            <span class="fw-semibold text-secondary">Gestion de pisciculture</span>
            <span class="user-chip" th:if="${session.user != null}">
                <i class="bi bi-person-circle"></i>
                <span>
                    <span th:text="${session.user.name}">Utilisateur</span>
                    <small class="text-secondary" th:if="${session.role != null}"
                           th:text="'(' + ${session.role} + ')'"></small>
                </span>
            </span>
            <a th:if="${session.user == null}" th:href="@{/login}" class="btn btn-sm btn-outline-primary">
                Se connecter
            </a>
        </header>

        <div class="page-body" th:insert="${content}"></div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script th:src="@{/js/aquanova.js}"></script>
</body>
</html>
