<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" th:replace="~{fragments/layout :: layout(~{::title}, ~{::main})}">
<head>
    <title>AquaNova - Liste des Types d'Aliments</title>
</head>
<body>
<main>
<h2>Liste des Types d'Aliments</h2>

<a class="btn btn-primary" href="/types-aliments/new">Ajouter</a>

<table class="table table-hover align-middle">
    <tr>
        <th>ID</th>
        <th>Nom</th>
        <th>Actions</th>
    </tr>

<tr th:each="t : ${types}">
    <td th:text="${t.id}"></td>
    <td th:text="${t.nom}"></td>

    <td>
        <a class="btn btn-sm btn-outline-primary" th:href="@{/types-aliments/{id}(id=${t.id})}">
            Edit
        </a>

        <a class="btn btn-sm btn-outline-danger" th:href="@{/types-aliments/{id}/delete(id=${t.id})}">
            Delete
        </a>
    </td>
</tr>

</table>
</main>
</body>
</html>
