<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" th:replace="~{fragments/layout :: layout(~{::title}, ~{::main})}">
<head>
    <title>AquaNova - Form Type Aliment</title>
</head>
<body>
<main>
    <h2>Form Type Aliment</h2>

    <div class="error" th:if="${error}" th:text="${error}"></div>

    <form class="form-panel" action="/types-aliments" method="post" th:object="${type}">
        <input type="hidden" th:field="*{id}" />

        <div class="mb-3">
            <label class="form-label" for="nom">Nom</label>
            <input class="form-control" type="text" id="nom" th:field="*{nom}" />
        </div>

        <div class="d-flex gap-2 mt-4">
            <button class="btn btn-primary" type="submit">Enregistrer</button>
            <a class="btn btn-secondary" th:href="@{/types-aliments}">Retour à la liste</a>
        </div>
    </form>
</main>
</body>
</html>
