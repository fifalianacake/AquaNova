<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Liste des Maintenances et Pannes</title>
</head>
<body>

    <h1>Maintenances & Pannes</h1>
    
    <p>
        <a th:href="@{/maintenances/new}">+ Nouvelle Intervention</a>
    </p>

    <fieldset>
        <legend>Filtres de recherche</legend>
        <form th:action="@{/maintenances}" th:object="${filter}" method="get">
            <div>
                <label>ID Intervention :</label>
                <input type="number" th:field="*{id}">
            </div>
            <div>
                <label>ID Équipement :</label>
                <input type="number" th:field="*{idEquipement}">
            </div>
            <div>
                <label>ID Utilisateur / Technicien :</label>
                <input type="number" th:field="*{idUser}">
            </div>
            <div>
                <label>ID Catégorie :</label>
                <input type="number" th:field="*{idCategorieMaintenance}">
            </div>
            <div>
                <label>Statut Intervention :</label>
                <select th:field="*{statutIntervention}">
                    <option value="">Tous</option>
                    <option th:each="statut : ${T(mg.itu.aquanova.sanitaire_equipement.models.StatutInterventionEnum).values()}"
                            th:value="${statut}" th:text="${statut}"></option>
                </select>
            </div>
            <div>
                <label>Coût exact :</label>
                <input type="number" step="0.01" th:field="*{cout}">
            </div>
            <div>
                <label>Date Maintenance (Début) :</label>
                <input type="date" th:field="*{debutDateMaintenance}">
            </div>
            <div>
                <label>Date Maintenance (Fin) :</label>
                <input type="date" th:field="*{finDateMaintenance}">
            </div>
            <div>
                <label>Date Résolution (Début) :</label>
                <input type="date" th:field="*{debutDateResolution}">
            </div>
            <div>
                <label>Date Résolution (Fin) :</label>
                <input type="date" th:field="*{finDateResolution}">
            </div>
            <br>
            <div>
                <button type="submit">Filtrer</button>
                <a th:href="@{/maintenances}">Réinitialiser</a>
            </div>
        </form>
    </fieldset>

    <br>

    <table border="1">
        <thead>
            <tr>
                <th>ID</th>
                <th>Date</th>
                <th>Équipement</th>
                <th>Catégorie</th>
                <th>Statut</th>
                <th>Coût</th>
                <th>Date Résolution</th>
                <th>Actions</th>
            </tr>
        </thead>
        <tbody>
            <tr th:each="m : ${maintenances}">
                <td th:text="${m.id}">1</td>
                <td th:text="${m.dateMaintenance}">2026-03-15</td>
                <td th:text="${m.equipement != null ? 'Équipement #' + m.equipement.id : '-'}">Sonde A</td>
                <td th:text="${m.categorieMaintenance != null ? m.categorieMaintenance.libelle : '-'}">Préventive</td>
                <td th:text="${m.statutIntervention}">OUVERTE</td>
                <td th:text="${m.cout != null ? m.cout + ' €' : '0.00 €'}">150 €</td>
                <td th:text="${m.dateResolution != null ? m.dateResolution : '-'}">-</td>
                <td>
                    <a th:href="@{/maintenances/{id}(id=${m.id})}">Détails</a> | 
                    <a th:href="@{/maintenances/delete/{id}(id=${m.id})}" onclick="return confirm('Confirmer la suppression ?')">Supprimer</a>
                </td>
            </tr>
            <tr th:if="${#lists.isEmpty(maintenances)}">
                <td colspan="8">Aucune maintenance trouvée.</td>
            </tr>
        </tbody>
    </table>

    <div th:if="${page.totalPages > 0}">
        <p>
            Page <span th:text="${page.number + 1}">1</span> sur <span th:text="${page.totalPages}">5</span>
        </p>
        <div>
            <a th:href="@{/maintenances(page=${page.number - 1})}" th:if="${page.hasPrevious()}">Précédent</a>
            <a th:href="@{/maintenances(page=${page.number + 1})}" th:if="${page.hasNext()}">Suivant</a>
        </div>
    </div>

</body>
</html>
