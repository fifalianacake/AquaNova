<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" th:replace="~{fragments/layout :: layout(~{::title}, ~{::main})}">
<head>
    <title>AquaNova - Liste des Stades de Croissance</title>
</head>
<body>
<main>

<div class="toolbar">
    <a class="btn btn-primary" href="/stade-croissance/new"><i class="bi bi-plus-lg"></i> Ajouter un stade</a>
</div>

<div class="panel">
    <div class="panel-header">
        <h5>Liste des stades de croissance</h5>
        <span class="result-count" th:text="${#lists.size(stades)} + ' stade(s)'"></span>
    </div>

    <div class="table-responsive">
        <table class="table table-hover align-middle">
            <thead>
            <tr>
                <th>ID</th>
                <th>Nom</th>
                <th class="text-end">Poids Min</th>
                <th class="text-end">Poids Max</th>
                <th class="text-end">Actions</th>
            </tr>
            </thead>
            <tbody>
            <tr th:each="s : ${stades}">
                <td th:text="${s.id}"></td>
                <td class="fw-semibold" th:text="${s.nom}"></td>
                <td class="text-end" th:text="${s.poidsMin}"></td>
                <td class="text-end" th:text="${s.poidsMax}"></td>
                <td class="text-end">
                    <a class="btn btn-sm btn-outline-primary" th:href="@{/stade-croissance/{id}(id=${s.id})}" title="Modifier"><i class="bi bi-pencil"></i></a>
                    <a class="btn btn-sm btn-outline-danger" th:href="@{/stade-croissance/{id}/delete(id=${s.id})}" title="Supprimer"><i class="bi bi-trash3"></i></a>
                </td>
            </tr>
            <tr th:if="${#lists.isEmpty(stades)}">
                <td colspan="5" class="text-center text-secondary py-4">Aucun stade de croissance enregistré.</td>
            </tr>
            </tbody>
        </table>
    </div>
</div>
</main>
</body>
</html>
