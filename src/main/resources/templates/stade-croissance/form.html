<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" th:replace="~{fragments/layout :: layout(~{::title}, ~{::main})}">
<head>
    <title>AquaNova - Form Stade Croissance</title>
</head>
<body>
<main>
    <h2>Form Stade Croissance</h2>

    <div class="error" th:if="${error}" th:text="${error}"></div>

    <form class="form-panel" action="/stade-croissance" method="post" th:object="${stade}">
        <input type="hidden" th:field="*{id}" />

        <div class="mb-3">
            <label class="form-label" for="nom">Nom</label>
            <input class="form-control" type="text" id="nom" th:field="*{nom}" />
        </div>

        <div class="mb-3">
            <label class="form-label" for="poidsMin">Poids Min (g)</label>
            <input class="form-control" type="number" step="0.01" min="0" id="poidsMin" th:field="*{poidsMin}" />
        </div>

        <div class="mb-3">
            <label class="form-label" for="poidsMax">Poids Max (g)</label>
            <input class="form-control" type="number" step="0.01" min="0" id="poidsMax" th:field="*{poidsMax}" />
        </div>

        <div class="d-flex gap-2 mt-4">
            <button class="btn btn-primary" type="submit">Enregistrer</button>
            <a class="btn btn-secondary" th:href="@{/stade-croissance}">Retour à la liste</a>
        </div>
    </form>
</main>
</body>
</html>
