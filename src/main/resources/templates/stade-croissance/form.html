<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" th:replace="~{fragments/layout :: layout(~{::title}, ~{::main})}">
<head>
    <title>AquaNova - Form Stade Croissance</title>
</head>
<body>
<main>
<h2>Form Stade Croissance</h2>

<p th:if="${error}" th:text="${error}" style="color: red;"></p>

<form action="/stade-croissance" method="post" th:object="${stade}">
    <input type="hidden" th:field="*{id}" />

    Nom :
    <input class="form-control" type="text" th:field="*{nom}" />
    <br/>

    Poids Min :
    <input class="form-control" type="number" step="0.01" th:field="*{poidsMin}" />
    <br/>

    Poids Max :
    <input class="form-control" type="number" step="0.01" th:field="*{poidsMax}" />
    <br/>

    <button class="btn btn-primary" type="submit">Save</button>
</form>
</main>
</body>
</html>
