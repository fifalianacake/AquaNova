<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>

<body>
    <h1>Details du paramètre système</h1>

    <div th:if="${parametre != null}">
        <p><strong>ID :</strong> <span th:text="${parametre.id}"></span></p>
        <p><strong>Code :</strong> <span th:text="${parametre.code}"></span></p>
        <p><strong>Libelle :</strong> <span th:text="${parametre.libelle}"></span></p>
        <p><strong>Valeur :</strong> <span th:text="${parametre.valeur}"></span></p>
        <p><strong>Type de valeur :</strong> <span th:text="${parametre.typeValeur}"></span></p>
        <p><strong>Description :</strong> <span th:text="${parametre.description}"></span></p>
    </div>

    <div th:if="${parametre == null}">
        <p>Paramètre introuvable.</p>
    </div>

    <p>
        <a th:href="@{/parametres-systeme}">Retour à la liste</a>
        |
        <a th:if="${parametre != null}" th:href="@{'/parametres-systeme/' + ${parametre.id} + '/edit'}">Modifier</a>
    </p>
</body>

</html>
