<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" th:replace="~{fragments/layout :: layout(~{::title}, ~{::main})}">
<head>
    <title>Document</title>
</head>
<body>
<main>
    <h1 th:text="${parametre.id == null ? 'Creer un paramètre système' : 'Modifier un paramètre système'}"></h1>

    <p th:if="${error}" th:text="${error}" style="color: red;"></p>

    <form th:action="@{${parametre.id == null} ? '/parametres-systeme' : '/parametres-systeme/' + ${parametre.id}}"
        th:object="${parametre}" method="post">
        <div>
            <label class="form-label" for="code">Code</label>
            <input class="form-control" type="text" id="code" th:field="*{code}">
        </div>

        <div>
            <label class="form-label" for="libelle">Libelle</label>
            <input class="form-control" type="text" id="libelle" th:field="*{libelle}">
        </div>

        <div>
            <label class="form-label" for="valeur">Valeur</label>
            <input class="form-control" type="text" id="valeur" th:field="*{valeur}">
        </div>

        <div>
            <label class="form-label" for="typeValeur">Type de valeur</label>
            <select class="form-select" id="typeValeur" th:field="*{typeValeur}">
                <option value="" disabled>-- Choisir un type --</option>
                <option th:each="type : ${typesValeur}" th:value="${type}" th:text="${type}">
                </option>
            </select>
        </div>

        <div>
            <label class="form-label" for="description">Description</label>
            <textarea class="form-control" id="description" th:field="*{description}"></textarea>
        </div>

        <div>
            <button class="btn btn-primary" type="submit">Enregistrer</button>
            <a class="btn btn-secondary" th:href="@{/parametres-systeme}">Retour à la liste</a>
        </div>
    </form>
</main>
</body>
</html>
