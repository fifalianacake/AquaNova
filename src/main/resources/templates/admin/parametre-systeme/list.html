<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" th:replace="~{fragments/layout :: layout(~{::title}, ~{::main})}">
<head>
    <title>Liste des paramètres système</title>
</head>
<body>
<main>
    <h1>Liste des paramètres système</h1>

    <p class="error" th:if="${error}" th:text="${error}"></p>

    <p>
        <a class="btn btn-primary" th:href="@{/parametres-systeme/new}">Creer un nouveau paramètre</a>
    </p>

    <table class="table table-hover align-middle">
        <thead>
            <tr>
                <th>ID</th>
                <th>Code</th>
                <th>Libelle</th>
                <th>Valeur</th>
                <th>Type</th>
                <th>Description</th>
                <th>Actions</th>
            </tr>
        </thead>
        <tbody>
            <tr th:each="parametre : ${parametres}">
                <td th:text="${parametre.id}"></td>
                <td th:text="${parametre.code}"></td>
                <td th:text="${parametre.libelle}"></td>
                <td th:text="${parametre.valeur}"></td>
                <td th:text="${parametre.typeValeur}"></td>
                <td th:text="${parametre.description}"></td>
                <td>
                    <a class="btn btn-sm btn-outline-primary" th:href="@{'/parametres-systeme/' + ${parametre.id}}">Details</a>
                    |
                    <a class="btn btn-sm btn-outline-primary" th:href="@{'/parametres-systeme/' + ${parametre.id} + '/edit'}">Modifier</a>
                    |
                    <a class="btn btn-sm btn-outline-danger" th:href="@{'/parametres-systeme/' + ${parametre.id} + '/delete'}"
                        onclick="return confirm('Supprimer ce paramètre ?');">Supprimer</a>
                </td>
            </tr>
        </tbody>
    </table>
</main>
</body>
</html>
