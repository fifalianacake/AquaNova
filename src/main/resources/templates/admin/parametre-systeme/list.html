<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" th:replace="~{fragments/layout :: layout(~{::title}, ~{::main})}">
<head>
    <title>Liste des paramètres système</title>
</head>
<body>
<main>

<div class="toolbar">
    <a class="btn btn-primary" th:href="@{/parametres-systeme/new}"><i class="bi bi-plus-lg"></i> Créer un paramètre</a>
</div>

<p class="error" th:if="${error}" th:text="${error}"></p>

<div class="panel">
    <div class="panel-header">
        <h5>Liste des paramètres système</h5>
        <span class="result-count" th:text="${#lists.size(parametres)} + ' paramètre(s)'"></span>
    </div>

    <div class="table-responsive">
        <table class="table table-hover align-middle">
            <thead>
            <tr>
                <th>ID</th>
                <th>Code</th>
                <th>Libellé</th>
                <th>Valeur</th>
                <th>Type</th>
                <th>Description</th>
                <th class="text-end">Actions</th>
            </tr>
            </thead>
            <tbody>
            <tr th:each="parametre : ${parametres}">
                <td th:text="${parametre.id}"></td>
                <td class="fw-semibold" th:text="${parametre.code}"></td>
                <td th:text="${parametre.libelle}"></td>
                <td th:text="${parametre.valeur}"></td>
                <td th:text="${parametre.typeValeur}"></td>
                <td th:text="${parametre.description}"></td>
                <td class="text-end">
                    <a class="btn btn-sm btn-outline-primary" th:href="@{'/parametres-systeme/' + ${parametre.id}}" title="Voir"><i class="bi bi-eye"></i></a>
                    <a class="btn btn-sm btn-outline-primary" th:href="@{'/parametres-systeme/' + ${parametre.id} + '/edit'}" title="Modifier"><i class="bi bi-pencil"></i></a>
                    <a class="btn btn-sm btn-outline-danger" th:href="@{'/parametres-systeme/' + ${parametre.id} + '/delete'}" title="Supprimer"
                       onclick="return confirm('Supprimer ce paramètre ?');"><i class="bi bi-trash3"></i></a>
                </td>
            </tr>
            <tr th:if="${#lists.isEmpty(parametres)}">
                <td colspan="7" class="text-center text-secondary py-4">Aucun paramètre enregistré.</td>
            </tr>
            </tbody>
        </table>
    </div>
</div>
</main>
</body>
</html>
