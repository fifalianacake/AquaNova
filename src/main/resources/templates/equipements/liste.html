<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<body>
    <h1>Parc Matériel</h1>
    <a href="/equipements/new">+ Nouvel Équipement</a>
    
    <table border="1">
        <thead>
            <tr>
                <th>ID</th><th>Nom</th><th>Type</th><th>Statut</th><th>Bassin</th><th>Installation</th><th>Action</th>
            </tr>
        </thead>
        <tbody>
            <tr th:each="e : ${equipements}">
                <td th:text="${e.id}"></td>
                <td th:text="${e.nom}"></td>
                <td th:text="${e.typeEquipement.libelle}"></td>
                <td th:text="${e.statut}"></td>
                <td th:text="${e.bassin != null ? e.bassin.nom : 'Général'}"></td>
                <td th:text="${e.dateInstallation}"></td>
                <td>
                    <a th:href="@{'/equipements/' + ${e.id}}">Voir</a>
                    <form th:action="@{'/equipements/delete/' + ${e.id}}" method="post" style="display:inline;">
                        <button type="submit" onclick="return confirm('Confirmer la suppression ?')">Supprimer</button>
                    </form>
                </td>
            </tr>
        </tbody>
    </table>
</body>
</html>
